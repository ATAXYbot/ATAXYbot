                              subjectsMap[subjName] = { id: 'sub_' + subjName, name: subjName, icon: subjName === 'Physics' ? '⚛️' : (subjName === 'Biology' ? '🌿' : '⚗️'), chapters: [] };
                          }
                          const chapterNode = { id: chap.id, name: chap.name, topics: [] };
                          const chapTopics = topics.filter(t => t.chapter_id === chap.id);
                          
                          chapTopics.forEach(top => {
                              const topicNode = { id: top.id, name: top.name, questions: [] };
                              const topQuestions = questions.filter(q => q.topic_id === top.id || q.topic === top.name);
                              
                              topQuestions.forEach(q => {
                                  matchedQuestionIds.add(q.id);
                                  let parsedOpts = q.options || q.option_a ? [q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean) : null;
                                  if (!parsedOpts) {
                                      parsedOpts = q.options;
                                      if (typeof parsedOpts === 'string') { try { parsedOpts = JSON.parse(parsedOpts); } catch (e) { parsedOpts = []; } }
                                  }
                                  if (!Array.isArray(parsedOpts) || parsedOpts.length === 0) parsedOpts = ['A', 'B', 'C', 'D'];
                                  
                                  let correctIdx = q.correct_answer;
                                  if (correctIdx === undefined && q.correct_option) {
                                      correctIdx = ['A', 'B', 'C', 'D'].indexOf(q.correct_option);
                                  }
                                  if (correctIdx === undefined) correctIdx = q.correct || 0;

                                  topicNode.questions.push({ id: q.id, text: q.question_text || q.question, imageUrl: q.image_url ? q.image_url.replace('kwzpnupjtvfrevpwfaao.supabase.co', 'supabase-proxy.thevoicesession.workers.dev') : null, options: parsedOpts, correctOption: ['A','B','C','D'][correctIdx] || 'A', correct: correctIdx, explanation: q.explanation, difficulty: q.difficulty, ncert: true, accuracy: 'N/A' });
                              });
                              if (topicNode.questions.length > 0) { chapterNode.topics.push(topicNode); }
                          });
                          if (chapterNode.topics.length > 0) { subjectsMap[subjName].chapters.push(chapterNode); }
                      });

                      // Process unmatched questions so none are ever lost
                      const unmatchedQuestions = questions.filter(q => !matchedQuestionIds.has(q.id));
                      unmatchedQuestions.forEach((q, idx) => {
                          const subjName = q.subject || 'Mixed Subjects';
                          const chapName = q.chapter || 'Mixed Chapters';
                          const topName = q.topic || 'Mixed Topics';
                          
                          if (!subjectsMap[subjName]) {
                              subjectsMap[subjName] = { id: 'sub_unm_' + subjName, name: subjName, icon: '📂', chapters: [] };
                          }
                          let chapterNode = subjectsMap[subjName].chapters.find(c => c.name === chapName);
                          if (!chapterNode) {
                              chapterNode = { id: 'chap_unm_' + chapName, name: chapName, topics: [] };
                              subjectsMap[subjName].chapters.push(chapterNode);
                          }
                          let topicNode = chapterNode.topics.find(t => t.name === topName);
                          if (!topicNode) {
                              topicNode = { id: 'top_unm_' + topName, name: topName, questions: [] };
                              chapterNode.topics.push(topicNode);
                          }

                          let parsedOpts = q.options || q.option_a ? [q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean) : null;
                          if (!parsedOpts) {
                              parsedOpts = q.options || q.Options || q.options_array;
                              if (typeof parsedOpts === 'string') { try { parsedOpts = JSON.parse(parsedOpts); } catch (e) { parsedOpts = []; } }
                          }
                          if (!Array.isArray(parsedOpts) || parsedOpts.length === 0) parsedOpts = ['A', 'B', 'C', 'D'];
                          
                          let correctIdx = q.correct_answer;
                          if (correctIdx === undefined && q.correct_option) {
                              correctIdx = ['A', 'B', 'C', 'D'].indexOf(q.correct_option);
                          }
                          if (correctIdx === undefined) correctIdx = q.correct || 0;

                          topicNode.questions.push({ 
                              id: q.id || `q_unm_${idx}`, 
                              text: q.question_text || q.question || 'Unnamed Question', 
                              imageUrl: q.image_url ? q.image_url.replace('kwzpnupjtvfrevpwfaao.supabase.co', 'supabase-proxy.thevoicesession.workers.dev') : null,
                              options: parsedOpts, 
                              correctOption: ['A','B','C','D'][correctIdx] || 'A',
                              correct: correctIdx, 
                              explanation: q.explanation || q.Explanation || 'No explanation', 
                              difficulty: q.difficulty || 'Medium', 
                              ncert: true, accuracy: 'N/A' 
                          });
                      });

                      let finalData = Object.values(subjectsMap);

                      if (finalData.length > 0) {
                          setQbankData(finalData);
                      } else {
                          setQbankError("Connected to Supabase, but no questions were found.");
                          setQbankData(ALIEN_QBANK);
                      }
                  } catch (e) {
                      console.error("Backend Fetch Error:", e);
                      let errorMsg = e.message;
                      if (errorMsg === "Failed to fetch" || errorMsg.includes("NetworkError")) {
                          errorMsg = "Database connection blocked. Mobile networks (like Jio/Airtel) sometimes block Supabase domains on cellular data. Please try using WiFi or a VPN.";
                      }
                      setQbankError(errorMsg);
                      setQbankData(ALIEN_QBANK); // Fallback to local hardcoded data on error
                  }
              };
              fetchSupabaseData();
          }, []);

          useEffect(() => {
              if (!activePracticeChapter) {
                  setLoadedQuestions([]);
                  setCurrentQuestionIndex(0);
                  return;
              }

              const loadQuestions = () => {
                  setQuestionsLoading(true);
                  setCurrentQuestionIndex(0);

                  let allQuestions = [];
                  let gIdx = 1;
                  if (activePracticeChapter.topics) {
                      activePracticeChapter.topics.forEach(t => {
                          if (t.questions) {
                              t.questions.forEach(q => allQuestions.push({ ...q, globalIndex: gIdx++, topicId: t.id, topicName: t.name }));
                          }
                      });
                  }
                  
                  if (allQuestions.length > 0) {
                      setLoadedQuestions(allQuestions);
                  } else {
                      setLoadedQuestions([]);
                  }
                  setQuestionsLoading(false);
              };

              loadQuestions();
          }, [activePracticeChapter]);

          useEffect(() => { setPracticeSelectedTopic(null); setPracticeShowPalette(false); }, [activePracticeChapter]);
          useEffect(() => {
              const loadNeetprepData = async () => {
                  // Try to restore from localStorage first
                  const savedData = localStorage.getItem('ataxy_neetprep_data');
                  if (savedData) {
                      try {
                          setNeetprepData(JSON.parse(savedData));
                      } catch (e) {
                          console.error('Failed to parse saved NEETPrep data');
                      }
                  }
                  
                  // Then try to fetch fresh data from backend
                  const url = neetprepAuthToken ? 'http://localhost:5000/api/neetprep/data' : `http://localhost:5000/api/neetprep/data?identifier=${encodeURIComponent(neetprepUser)}`;
                  if (!neetprepAuthToken && !neetprepUser) return;
                  try {
                      const response = await fetch(url, {
                          headers: neetprepAuthToken ? { 'Authorization': `Bearer ${neetprepAuthToken}` } : {}
                      });
                      const payload = await response.json();
                      if (response.ok) {
                          setNeetprepData(payload.data || payload);
                          localStorage.setItem('ataxy_neetprep_data', JSON.stringify(payload.data || payload));
                      }
                  } catch (error) {
                      console.error('Failed to fetch NEETPrep data from backend');
                  }
              };
              loadNeetprepData();
          }, [neetprepAuthToken, neetprepUser]);

          const openNeetprepModal = () => {
              setNeetprepStatus('');
              setShowNeetprepModal(true);
          };

          const sendNeetprepOtp = async (e) => {
              e.preventDefault();
              if (!neetprepLoginInput.trim()) {
                  setNeetprepStatus('Enter your NEETPrep email or phone to continue.');
                  return;
              }
              try {
                  const response = await fetch('http://localhost:5000/api/neetprep/request-otp', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ identifier: neetprepLoginInput.trim() })
                  });
                  const data = await response.json();
                  setNeetprepStatus(data.message || 'OTP request sent.');
              } catch (error) {
                  setNeetprepStatus('Unable to send OTP. Backend may not be running.');
              }
          };

          const verifyNeetprepOtp = async (e) => {
              e.preventDefault();
              if (!neetprepOtpInput.trim()) {
                  setNeetprepStatus('Enter the OTP code to verify your NEETPrep connection.');
                  return;
              }
              try {
                  const response = await fetch('http://localhost:5000/api/neetprep/verify-otp', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ identifier: neetprepLoginInput.trim(), otp: neetprepOtpInput.trim() })
                  });
                  const data = await response.json();
                  if (!response.ok) {
                      setNeetprepStatus(data.message || 'OTP verification failed.');
                      return;
                  }
                  setNeetprepConnected(true);
                  setNeetprepUser(data.user?.identifier || neetprepLoginInput.trim());
                  setNeetprepAuthToken(data.token || '');
                  setNeetprepStatus('Connected to NEETPrep. Loading courses...');
                  setNeetprepOtpInput('');

                  // Fetch and store course data
                  const r2 = await fetch(`http://localhost:5000/api/neetprep/data?identifier=${encodeURIComponent(neetprepLoginInput.trim())}`);
                  if (r2.ok) {
                      const d = await r2.json();
                      setNeetprepData(d.data || null);
                      localStorage.setItem('ataxy_neetprep_data', JSON.stringify(d.data || null));
                      setNeetprepStatus('✅ Connected to NEETPrep! Courses loaded.');
                      setTimeout(() => setShowNeetprepModal(false), 1000);
                  } else {
                      setNeetprepStatus('⚠️ Connected but courses failed to load');
                  }
              } catch (error) {
                  setNeetprepStatus('Unable to verify OTP. Backend may not be running.');
              }
          };

          const disconnectNeetprep = async () => {
              try {
                  await fetch('http://localhost:5000/api/neetprep/disconnect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ identifier: neetprepUser || neetprepLoginInput.trim() }) });
              } catch (e) { /* ignore */ }
              setNeetprepConnected(false);
              setNeetprepUser('');
              setNeetprepAuthToken('');
              setNeetprepData(null);
              localStorage.removeItem('ataxy_neetprep_connected');
              localStorage.removeItem('ataxy_neetprep_user');
              localStorage.removeItem('ataxy_neetprep_token');
              localStorage.removeItem('ataxy_neetprep_data');
          };

          const handleBack = () => {
            if (activePracticeChapter) setActivePracticeChapter(null);
            else if (activePracticeSubject) setActivePracticeSubject(null);
            else if (activePracticeFile) setActivePracticeFile(null);
            else if (activePracticeBatch) setActivePracticeBatch(null);
          };

          if (!isVerified) return <Gatekeeper onVerify={(user) => { setTgUser(user); setIsVerified(true); }} />;

          // --- VIEWS ---
          const renderHomeView = () => {
             const currentTargets = targetsData[selectedDate] || [];
             const toggleTarget = (id) => { const u = currentTargets.map(t => t.id === id ? {...t, done: !t.done} : t); setTargetsData({...targetsData, [selectedDate]: u}); };
             const removeTarget = (id) => { const u = currentTargets.filter(t => t.id !== id); setTargetsData({...targetsData, [selectedDate]: u}); };
             const addTarget = (e) => { e.preventDefault(); if(!newTarget.trim()) return; const u = [...currentTargets, { id: Date.now(), text: newTarget, done: false }]; setTargetsData({...targetsData, [selectedDate]: u}); setNewTarget(""); };

             return ( 
             <div className="pb-24 pt-[60px] animate-in fade-in">
                 <div className="bg-blue-600 p-6 rounded-3xl shadow-lg text-white mx-4 mb-6 relative overflow-hidden mt-4">
                     <div className="relative z-10 flex justify-between items-center">
                         <div><h2 className="text-2xl font-bold">Hello, {tgUser.first_name}! 👋</h2><p className="text-blue-100 text-sm mt-1">Ready to crack your goals?</p></div>
                         <div className="h-12 w-12 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold text-xl shadow-inner uppercase">{tgUser.first_name[0]}</div>
                     </div>
                 </div>
                 
                 <div className="px-5 space-y-6">
                     <div className="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
                         <div className="flex justify-between items-center mb-4">
                             <h3 className="font-bold text-gray-800 dark:text-gray-200 text-lg flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-500"></i> Daily Targets</h3>
                             <input type="date" min="2026-01-01" max="2126-12-31" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-bold px-3 py-1.5 rounded outline-none border border-blue-100 dark:border-blue-800 cursor-pointer" />
                         </div>
                         <div className="space-y-2 mb-4 min-h-[60px]">
                             {currentTargets.length === 0 ? <p className="text-xs text-gray-400 italic text-center py-2">No targets set. Add one below!</p> : currentTargets.map(t => (
                                 <div key={t.id} className={`flex items-center justify-between p-2 rounded-lg transition-colors ${t.done ? 'bg-gray-50 dark:bg-gray-800 opacity-60' : 'bg-white border border-gray-100 dark:border-gray-800'}`}>
                                     <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => toggleTarget(t.id)}>
                                        <div className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 ${t.done ? 'bg-green-500 border-green-500' : 'border-gray-300 dark:border-gray-600'}`}>{t.done && <i className="fa-solid fa-check text-white text-[10px]"></i>}</div>
                                        <span className={`text-sm font-medium ${t.done ? 'line-through text-gray-500' : 'text-gray-800 dark:text-gray-200'}`}>{t.text}</span>
                                     </div>
                                     <button onClick={() => removeTarget(t.id)} className="text-red-500 p-2 hover:bg-red-50 rounded-lg"><i className="fa-solid fa-trash text-sm"></i></button>
                                 </div>
                             ))}
                         </div>
                         <form onSubmit={addTarget} className="flex gap-2 border-t border-gray-100 dark:border-gray-800 pt-4 mt-2">
                             <input type="text" value={newTarget} onChange={(e) => setNewTarget(e.target.value)} placeholder={`Add goal for ${selectedDate}...`} className="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 dark:text-white" />
                             <button type="submit" className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-md"><i className="fa-solid fa-plus"></i></button>
                         </form>
                     </div>
                     <div className="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
                         <div className="flex items-center justify-between mb-4">
                             <div className="flex items-center gap-3">
                                 <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-red-500 to-pink-500 text-white flex items-center justify-center shadow-md"><i className="fa-solid fa-graduation-cap text-lg"></i></div>
                                 <div>
                                     <h3 className="font-bold text-gray-900 dark:text-white">NEETPrep Connect</h3>
                                     <p className="text-xs text-gray-500 dark:text-gray-400">Login with your NEETPrep account and enable question + video sync.</p>
                                 </div>
                             </div>
                             <button onClick={openNeetprepModal} className={`px-4 py-2 rounded-xl font-bold text-xs ${neetprepConnected ? 'bg-green-600 text-white' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                                 {neetprepConnected ? 'Connected' : 'Connect'}
                             </button>
                         </div>
                         {neetprepConnected && (
                             <div className="rounded-2xl bg-green-50 dark:bg-green-900/20 p-3 text-sm text-green-700 dark:text-green-200 mb-3">
                                 Connected as <span className="font-bold">{neetprepUser}</span>
                             </div>
                         )}
                         {neetprepData ? (
                             <>
                                 <div className="grid grid-cols-3 gap-3 text-center text-sm">
                                     <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl">
                                         <div className="font-bold text-blue-600 dark:text-blue-400">{neetprepData.batches.length}</div>
                                         <div className="text-gray-500 dark:text-gray-400">Batches</div>
                                     </div>
                                     <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl">
                                         <div className="font-bold text-blue-600 dark:text-blue-400">{neetprepData.videos.length}</div>
                                         <div className="text-gray-500 dark:text-gray-400">Videos</div>
                                     </div>
                                     <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl">
                                         <div className="font-bold text-blue-600 dark:text-blue-400">{neetprepData.questions.length}</div>
                                         <div className="text-gray-500 dark:text-gray-400">Questions</div>
                                     </div>
                                 </div>
                                 {neetprepData.backupUrl && (
                                     <div className="mt-3 text-xs text-blue-600 dark:text-blue-400">
                                         Backup: <a href={neetprepData.backupUrl} target="_blank" rel="noreferrer" className="underline">Cloudinary</a>
                                     </div>
                                 )}
                                 {neetprepData.fetchedAt && (
                                     <div className="mt-2 text-xs text-gray-500 dark:text-gray-400">Last synced: {new Date(neetprepData.fetchedAt).toLocaleString()}</div>
                                 )}
                             </>
                         ) : (
                             <p className="text-xs text-gray-500 dark:text-gray-400">Your NEETPrep data will load after login.</p>
                         )}
                     </div>
                 </div>
             </div> 
             );
          };

          // --- NEETPREP PRACTICE ENGINE ---
          const renderQuestionsView = () => {
             if (activePracticeChapter) {
                 const selectedTopic = practiceSelectedTopic;
                 const attempts = practiceAttempts;
                 const showPalette = practiceShowPalette;
                 const allQuestions = loadedQuestions;
                 
                 let displayedQuestions = selectedTopic ? allQuestions.filter(q => q.topicName === selectedTopic) : allQuestions;
                 
                 if (questionFilter === 'bookmarked') {
                     displayedQuestions = displayedQuestions.filter(q => bookmarks.includes(q.id));
                 } else if (questionFilter === 'incorrect') {
                     displayedQuestions = displayedQuestions.filter(q => {
                         const ansIdx = attempts[q.id];
                         return ansIdx !== undefined && ['A', 'B', 'C', 'D'][ansIdx] !== q.correctOption;
                     });
                 }

                 const safeQuestionIndex = Math.min(currentQuestionIndex, Math.max(0, displayedQuestions.length - 1));
                 const currentQuestion = displayedQuestions[safeQuestionIndex];

                 const triggerHaptic = (type = 'light') => {
                     if (window.Telegram?.WebApp?.HapticFeedback) {
                         if (type === 'success') window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                         else if (type === 'error') window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                         else window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                     }
                 };

                 const toggleBookmark = (qId) => {
                     setBookmarks(prev => prev.includes(qId) ? prev.filter(id => id !== qId) : [...prev, qId]);
                     triggerHaptic('light');
                 };

                 const handleAttempt = (qId, optionIdx) => {
                     const options = ['A', 'B', 'C', 'D'];
                     const selectedOption = options[optionIdx];
                     const isCorrect = currentQuestion && selectedOption === currentQuestion.correctOption;
                     setPracticeAttempts({...attempts, [qId]: optionIdx});
                     if (isCorrect) triggerHaptic('success');
                     else triggerHaptic('error');
                 };

                 const handleClear = (qId) => {
                     const newAttempts = {...attempts};
                     delete newAttempts[qId];
                     setPracticeAttempts(newAttempts);
                 };

                 const handleNext = () => {
                     if (safeQuestionIndex < displayedQuestions.length - 1) {
                         setCurrentQuestionIndex(safeQuestionIndex + 1);
                         setTimeout(() => {
                             document.querySelector('[data-qa-card]')?.scrollIntoView({behavior: 'smooth', block: 'center'});
                         }, 50);
                     }
                 };

                 const handlePrevious = () => {
                     if (safeQuestionIndex > 0) {
                         setCurrentQuestionIndex(safeQuestionIndex - 1);
                         setTimeout(() => {
                             document.querySelector('[data-qa-card]')?.scrollIntoView({behavior: 'smooth', block: 'center'});
                         }, 50);
                     }
                 };

                 const scrollToQuestion = (idx) => {
                     setPracticeShowPalette(false);
                     setCurrentQuestionIndex(idx);
                     setTimeout(() => {
                         document.querySelector('[data-qa-card]')?.scrollIntoView({behavior: 'smooth', block: 'center'});
                     }, 50);
                 };

                 if (questionsLoading) {
                     return (
                         <div className="pb-24 pt-[60px] px-5 animate-in fade-in min-h-screen flex items-center justify-center">
                             <div className="text-center">
                                 <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                                 <p className="text-gray-600 dark:text-gray-400 font-medium">Loading questions...</p>
                             </div>
                         </div>
                     );
                 }

                 const isAnswered = currentQuestion ? attempts[currentQuestion.id] !== undefined : false;
                 const selectedOptionIdx = currentQuestion ? attempts[currentQuestion.id] : -1;
                 const isCorrect = currentQuestion && isAnswered && ['A', 'B', 'C', 'D'][selectedOptionIdx] === currentQuestion.correctOption;

                 return (
                     <div className="pb-32 pt-[60px] animate-in slide-in-from-right relative min-h-screen bg-gray-50 dark:bg-gray-950">
                         <div className="px-4 pb-3 flex items-center gap-3 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20 pt-4">
                             <button onClick={handleBack} className="w-10 h-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-900 dark:text-white"><i className="fa-solid fa-arrow-left"></i></button>
                             <div className="flex-1">
                                 <h2 className="text-lg font-bold text-gray-900 dark:text-white leading-tight line-clamp-1">{activePracticeChapter.name}</h2>
                                 <p className="text-[10px] text-gray-500">Question {displayedQuestions.length > 0 ? safeQuestionIndex + 1 : 0} of {displayedQuestions.length}</p>
                             </div>
                         </div>

                         <div className="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 py-3">
                             <div className="flex flex-col gap-2 overflow-y-auto max-h-40 no-scrollbar mb-4 pb-1">
                                 <button 
                                     onClick={() => { setPracticeSelectedTopic(null); setCurrentQuestionIndex(0); }} 
                                     className={`w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold transition-colors border shadow-sm flex justify-between items-center ${!practiceSelectedTopic ? 'bg-[#0eb582] text-white border-[#0eb582]' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700'}`}
                                 >
                                     <span>All Topics</span>
                                 </button>
                                 {activePracticeChapter.topics?.map((t, idx) => (
                                     <button 
                                         key={idx}
                                         onClick={() => { setPracticeSelectedTopic(t.name); setCurrentQuestionIndex(0); }}
                                         className={`w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold transition-colors border shadow-sm flex justify-between items-center ${practiceSelectedTopic === t.name ? 'bg-[#0eb582] text-white border-[#0eb582]' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700'}`}
                                     >
                                         <span>{t.name}</span>
                                         <span className="text-[10px] bg-black/10 dark:bg-white/10 px-2 py-0.5 rounded-full">{t.questions?.length || 0} Qs</span>
                                     </button>
                                 ))}
                             </div>
                             
                             <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-1">
                                 <button onClick={() => {setQuestionFilter('all'); setCurrentQuestionIndex(0);}} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border shadow-sm ${questionFilter === 'all' ? 'bg-[#0eb582] text-white border-[#0eb582]' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700'}`}><i className="fa-solid fa-list-ol mr-1"></i> All Qs</button>
                                 <button onClick={() => {setQuestionFilter('bookmarked'); setCurrentQuestionIndex(0);}} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border shadow-sm ${questionFilter === 'bookmarked' ? 'bg-yellow-500 text-white border-yellow-500' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700'}`}><i className="fa-solid fa-bookmark mr-1"></i> Bookmarked</button>
                                 <button onClick={() => {setQuestionFilter('incorrect'); setCurrentQuestionIndex(0);}} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border shadow-sm ${questionFilter === 'incorrect' ? 'bg-red-500 text-white border-red-500' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700'}`}><i className="fa-solid fa-times-circle mr-1"></i> Incorrect</button>
                             </div>

                             <div className="flex justify-between items-center mb-2">
                                 <span className="text-xs font-bold text-gray-600 dark:text-gray-400">Progress</span>
                                 <div className="flex items-center gap-3">
                                     <span className="text-xs font-bold text-gray-900 dark:text-white">{displayedQuestions.length > 0 ? safeQuestionIndex + 1 : 0}/{displayedQuestions.length}</span>
                                     <button onClick={() => setPracticeShowPalette(true)} className="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors flex items-center justify-center bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded-lg">
                                         <i className="fa-solid fa-grip text-base"></i>
                                     </button>
                                 </div>
                             </div>
                             <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                                 <div className="bg-[#0eb582] h-2 rounded-full transition-all" style={{width: `${displayedQuestions.length > 0 ? ((safeQuestionIndex + 1) / displayedQuestions.length) * 100 : 0}%`}}></div>
                             </div>
                         </div>

                         <div data-qa-card className="px-4 mt-5 max-w-2xl mx-auto">
                             {displayedQuestions.length === 0 ? (
                                 <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden py-12 text-center px-4">
                                     <div className="w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400 text-2xl"><i className="fa-solid fa-box-open"></i></div>
                                     <h3 className="font-bold text-gray-900 dark:text-white mb-2">No questions found</h3>
                                     <p className="text-sm text-gray-500 mb-4">No questions match your current filters.</p>
                                     <button onClick={() => {setQuestionFilter('all'); setPracticeSelectedTopic(null);}} className="bg-[#0eb582] text-white font-bold text-sm px-4 py-2 rounded-xl">Clear Filters</button>
                                 </div>
                             ) : (
                             <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
                                 <div className="p-5">
                                     <div className="flex justify-between items-start gap-3 mb-4">
                                         <h3 className="font-bold text-gray-900 dark:text-white leading-relaxed text-base">
                                             Q{safeQuestionIndex + 1}. {currentQuestion.text}
                                         </h3>
                                         <button onClick={() => toggleBookmark(currentQuestion.id)} className={`shrink-0 p-1 text-xl transition-all active:scale-90 ${bookmarks.includes(currentQuestion.id) ? 'text-yellow-500 drop-shadow-sm' : 'text-gray-300 dark:text-gray-700 hover:text-gray-400'}`}>
                                             <i className={`fa-${bookmarks.includes(currentQuestion.id) ? 'solid' : 'regular'} fa-bookmark`}></i>
                                         </button>
                                     </div>
                                     {currentQuestion.imageUrl && (
                                         <div className="mb-4 rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-800 flex items-center justify-center max-h-64">
                                             <img src={currentQuestion.imageUrl} alt="Question Image" className="w-full h-full object-contain" onError={(e) => {e.target.style.display = 'none'}} />
                                         </div>
                                     )}
                                     <div className="flex flex-col border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden mb-5">
                                         {currentQuestion.options.map((opt, idx) => {
                                             const isSelected = selectedOptionIdx === idx;
                                             const isCorrectChoice = ['A', 'B', 'C', 'D'][idx] === currentQuestion.correctOption;
                                             let bg = "bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700";
                                             let numBg = "border-r border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-500";
                                             if (isAnswered) {
                                                 if (isCorrectChoice) {
                                                     bg = "bg-[#e6f4ea] dark:bg-green-900/40 text-[#1e7e34] dark:text-green-300 font-bold";
                                                     numBg = "border-r border-[#cce8d6] dark:border-green-800 bg-[#cce8d6] dark:bg-green-800 text-[#1e7e34] dark:text-green-200 font-bold";
                                                 } else if (isSelected) {
                                                     bg = "bg-[#fce8e6] dark:bg-red-900/40 text-[#c5221f] dark:text-red-300 font-bold";
                                                     numBg = "border-r border-[#fad2cf] dark:border-red-800 bg-[#fad2cf] dark:bg-red-800 text-[#c5221f] dark:text-red-200 font-bold";
                                                 } else {
                                                     bg = "opacity-50 bg-white dark:bg-gray-800";
                                                 }
                                             }
                                             return (
                                                 <button key={idx} disabled={isAnswered} onClick={() => handleAttempt(currentQuestion.id, idx)} className={`np-grid-btn w-full text-left flex items-stretch transition-all ${bg} disabled:cursor-not-allowed`}>
                                                     <div className={`w-10 flex items-center justify-center shrink-0 font-bold text-sm ${numBg}`}>{['A', 'B', 'C', 'D'][idx]}</div>
                                                     <div className="p-3.5 text-sm w-full">{opt}</div>
                                                 </button>
                                             );
                                         })}
                                     </div>
                                 </div>
                                 {isAnswered && (
                                     <div className={`p-4 border-t ${isCorrect ? 'bg-[#e6f4ea] dark:bg-green-900/30 border-[#cce8d6] dark:border-green-800' : 'bg-[#fce8e6] dark:bg-red-900/30 border-[#fad2cf] dark:border-red-800'} animate-in fade-in`}>
                                         <div className="flex items-center gap-2 mb-3">
                                             <i className={`fa-solid ${isCorrect ? 'fa-check-circle text-green-600 dark:text-green-400' : 'fa-times-circle text-red-600 dark:text-red-400'} text-lg`}></i>
                                             <span className={`font-bold text-sm ${isCorrect ? 'text-green-700 dark:text-green-300' : 'text-red-700 dark:text-red-300'}`}>
                                                 {isCorrect ? 'Correct!' : 'Incorrect'}
                                             </span>
                                         </div>
                                         <button onClick={() => handleClear(currentQuestion.id)} className="text-xs font-bold text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white p-1">
                                             <i className="fa-solid fa-rotate-left"></i> Clear Answer
                                         </button>
                                     </div>
                                 )}
                                 
                                 <div className="border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/40 p-3 flex justify-between items-center transition-colors">
                                     <button onClick={() => setShowNoteInput(prev => ({...prev, [currentQuestion.id]: !prev[currentQuestion.id]}))} className="text-xs font-bold text-blue-600 dark:text-blue-400 hover:text-blue-700 transition-colors flex items-center gap-1.5">
                                         <i className="fa-solid fa-pen-to-square"></i> {questionNotes[currentQuestion.id] ? 'Edit Notes' : 'Add Notes'}
                                     </button>
                                     {questionNotes[currentQuestion.id] && !showNoteInput[currentQuestion.id] && (
                                         <span className="text-[10px] bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-500 px-2 py-0.5 rounded font-bold"><i className="fa-solid fa-note-sticky"></i> Note Attached</span>
                                     )}
                                 </div>
                                 {showNoteInput[currentQuestion.id] && (
                                     <div className="p-3 bg-yellow-50 dark:bg-yellow-900/10 border-t border-yellow-200 dark:border-yellow-800/30 animate-in fade-in">
                                         <textarea
                                             value={questionNotes[currentQuestion.id] || ''}
                                             onChange={(e) => setQuestionNotes(prev => ({...prev, [currentQuestion.id]: e.target.value}))}
                                             placeholder="Write down concepts, formulas, or why you got this wrong..."
                                             className="w-full bg-white dark:bg-gray-900 border border-yellow-200 dark:border-yellow-800/50 rounded-xl text-sm text-gray-800 dark:text-gray-200 focus:border-yellow-400 dark:focus:border-yellow-500 focus:ring-0 p-3 placeholder-gray-400 dark:placeholder-gray-500 resize-none h-24 outline-none shadow-inner"
                                         ></textarea>
                                     </div>
                                 )}
                             </div>
                             )}
                         </div>
                         <div className="fixed bottom-0 w-full max-w-md bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-4 flex gap-3 z-[45] shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                             <button onClick={handlePrevious} disabled={safeQuestionIndex === 0} className="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                 <i className="fa-solid fa-arrow-left"></i> Back
                             </button>
                             <button onClick={handleNext} disabled={safeQuestionIndex >= displayedQuestions.length - 1} className="flex-1 bg-[#0eb582] text-white hover:bg-[#0a9565] disabled:opacity-50 disabled:cursor-not-allowed font-bold py-3 rounded-xl flex items-center justify-center gap-2 shadow-md transition-colors">
                                 Next <i className="fa-solid fa-arrow-right"></i>
                             </button>
                         </div>
                         {showPalette && (
                             <div className="fixed inset-0 bg-black/60 z-[99999] flex flex-col justify-end animate-in fade-in" onClick={() => setPracticeShowPalette(false)}>
                                 <div className="bg-white dark:bg-gray-900 rounded-t-3xl p-5 max-h-[70vh] overflow-y-auto w-full max-w-md mx-auto" onClick={e => e.stopPropagation()}>
                                     <div className="flex justify-between items-center mb-5">
                                         <h3 className="font-bold text-gray-900 dark:text-white text-lg">Question Palette</h3>
                                         <button onClick={() => setPracticeShowPalette(false)} className="text-gray-500 w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700"><i className="fa-solid fa-xmark"></i></button>
                                     </div>
                                     <div className="grid grid-cols-6 gap-2">
                                         {displayedQuestions.map((q, qIdx) => {
                                             const isAns = attempts[q.id] !== undefined;
                                             const selectedIdx = attempts[q.id];
                                             const isCorrect = isAns && ['A', 'B', 'C', 'D'][selectedIdx] === q.correctOption;
                                             let bgClass = "bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700";
                                             if (isAns) bgClass = isCorrect ? "bg-[#0eb582] text-white" : "bg-red-500 text-white";
                                             return (
                                                 <button key={q.id} onClick={() => scrollToQuestion(qIdx)} className={`w-full aspect-square rounded-lg flex items-center justify-center font-bold text-sm shadow-sm transition-all ${bgClass} ${safeQuestionIndex === qIdx ? 'ring-2 ring-blue-500' : ''}`}>
                                                     {qIdx + 1}
                                                 </button>
                                             );
                                         })}
                                     </div>
                                 </div>
                             </div>
                         )}
                     </div>
                 );
             }

             if (activePracticeSubject) {
                 return (
                     <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center text-gray-700 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-2xl font-black text-gray-900 dark:text-white">{activePracticeSubject.name}</h2>
                         </div>
                         <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider text-xs">Chapter Selection</h3>
                         <div className="space-y-3">
                             {activePracticeSubject.chapters && activePracticeSubject.chapters.length > 0 ? (
                                 activePracticeSubject.chapters.map((chap, i) => (
                                     <div key={i} onClick={() => { setActivePracticeChapter(chap); setCurrentTab('questions'); }} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex justify-between items-center shadow-sm cursor-pointer hover:border-[#0eb582] hover:shadow-md transition-all">
                                         <div>
                                             <h4 className="font-bold text-sm text-gray-900 dark:text-white">{chap.name}</h4>
                                             <p className="text-[10px] font-bold text-[#d49a4e] mt-1 bg-orange-50 dark:bg-orange-900/20 inline-block px-2 py-0.5 rounded">{chap.topics?.length || 0} Topics</p>
                                         </div>
                                         <i className="fa-solid fa-chevron-right text-gray-400"></i>
                                     </div>
                                 ))
                             ) : (
                                 <p className="text-sm text-gray-500 text-center mt-8">No chapters available</p>
                             )}
                         </div>
                     </div>
                 );
             }

             if (activePracticeFile) {
                 return (
                     <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center text-gray-700 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-2xl font-black text-gray-900 dark:text-white">{activePracticeFile.name} Subjects</h2>
                         </div>
                         
                         {qbankError && (
                             <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-5 shadow-sm text-sm text-red-800 dark:text-red-200">
                                 <div className="font-bold flex items-center gap-2 mb-2">
                                     <i className="fa-solid fa-triangle-exclamation"></i> Supabase Connection Issue
                                 </div>
                                 <p className="mb-2 opacity-90">{qbankError}</p>
                             </div>
                         )}

                         <div className="grid grid-cols-2 gap-3">
                             {qbankData.length > 0 ? qbankData.map(sub => (
                                 <div key={sub.id} onClick={() => setActivePracticeSubject(sub)} className="bg-white dark:bg-gray-900 p-5 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm cursor-pointer hover:border-[#0eb582] hover:shadow-md transition-all flex flex-col items-center justify-center text-center">
                                     <span className="text-4xl mb-2">{sub.icon}</span>
                                     <h3 className="font-bold text-gray-900 dark:text-white mt-2">{sub.name}</h3>
                                     <p className="text-[10px] text-gray-500 mt-1">{sub.chapters?.length || 0} Chapters</p>
                                 </div>
                             )) : (
                                 <p className="text-sm text-gray-500 text-center col-span-2 py-8">Loading subjects...</p>
                             )}
                         </div>
                     </div>
                 );
             }

             if (activePracticeBatch) {
                 return (
                     <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center text-gray-700 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-2xl font-black text-gray-900 dark:text-white">{activePracticeBatch.name} Files</h2>
                         </div>
                         <div className="space-y-3">
                             {activePracticeBatch.files.map((file, i) => (
                                 <div key={i} onClick={() => setActivePracticeFile(file)} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex items-center gap-4 shadow-sm cursor-pointer hover:border-[#0eb582] hover:shadow-md transition-all">
                                     <div className="w-12 h-12 rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-500 flex items-center justify-center text-xl"><i className="fa-solid fa-file-lines"></i></div>
                                     <div className="flex-1">
                                         <h3 className="font-bold text-lg text-gray-900 dark:text-white">{file.name}</h3>
                                         <p className="text-xs text-gray-500">Practice Modules</p>
                                     </div>
                                     <i className="fa-solid fa-chevron-right text-gray-400"></i>
                                 </div>
                             ))}
                         </div>
                     </div>
                 );
             }

             const PRACTICE_BATCHES = [
                 { id: 'pb_allen', name: 'Allen Module', files: [{ id: 'pf_race', name: 'Race' }] }
             ];

             return (
                 <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                     <div className="flex justify-between items-center mb-6">
                         <h2 className="text-2xl font-black text-gray-900 dark:text-white">Practice Hub</h2>
                     </div>
                     <div className="space-y-4">
                         {PRACTICE_BATCHES.map(batch => (
                             <div key={batch.id} onClick={() => setActivePracticeBatch(batch)} className="bg-gradient-to-br from-[#0eb582] to-[#0ba875] p-5 rounded-2xl shadow-sm text-white cursor-pointer hover:shadow-md transition-all relative overflow-hidden">
                                 <div className="relative z-10">
                                     <h3 className="text-xl font-bold mb-1">{batch.name}</h3>
                                     <p className="text-sm text-white/80">{batch.files.length} Files Available</p>
                                 </div>
                                 <i className="fa-solid fa-layer-group absolute -right-4 -bottom-4 text-6xl text-white/20"></i>
                             </div>
                         ))}
                     </div>
                 </div>
             );
          };

          // --- PROFILE & PERFORMANCE ---
          const renderProfileView = () => {
             const perf = JSON.parse(localStorage.getItem('ataxy_practice_perf') || '{}');
             const watched = JSON.parse(localStorage.getItem('ataxy_lectures') || '[]');
             
             const totalAttempted = Object.keys(perf).length;
             let totalCorrect = 0;
             qbankData.forEach(sub => sub.chapters.forEach(chap => chap.topics?.forEach(top => top.questions.forEach(q => {
                 if(perf[q.id] === q.correct) totalCorrect++;
             }))));
             const accuracy = totalAttempted > 0 ? Math.round((totalCorrect/totalAttempted)*100) : 0;

             const handlePdfUpload = async (e) => {
                 const file = e.target.files[0];
                 if(!file) return;
                 setIsUploadingPdf(true);
                 const formData = new FormData();
                 formData.append('pdf', file);
                 
                 try {
                     const res = await fetch('http://localhost:5000/api/qbank/upload', {
                         method: 'POST',
                         body: formData
                     });
                     const data = await res.json();
                     if(data.ok) {
                         setQbankData(data.data);
                         alert("PDF processed and added to QBank successfully!");
                     } else {
                         alert("Error processing PDF: " + data.error);
                     }
                 } catch(err) {
                     alert("Network error during upload.");
                 }
                 setIsUploadingPdf(false);
                 e.target.value = ''; // Reset input
             };

             return (
             <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                 <div className="text-center mb-8">
                     <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full mx-auto flex items-center justify-center text-4xl font-black mb-4 uppercase shadow-inner">{tgUser.first_name[0]}</div>
                     <h2 className="text-2xl font-black text-gray-900 dark:text-white">{tgUser.first_name}</h2>
                     <p className="text-sm text-gray-500 mt-1">ATAXY UID: {tgUser.id}</p>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">Performance Dashboard</h3>
                 <div className="grid grid-cols-2 gap-3 mb-3">
                     <div className="bg-white dark:bg-gray-900 p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm flex flex-col justify-center items-center text-center">
                         <div className="w-10 h-10 bg-blue-50 dark:bg-blue-900/30 text-blue-500 rounded-full flex items-center justify-center text-lg mb-2"><i className="fa-solid fa-video"></i></div>
                         <h4 className="font-bold text-gray-900 dark:text-white text-xl">{watched.length}</h4>
                         <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">Lectures Watched</p>
                     </div>
                     <div className="bg-white dark:bg-gray-900 p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm flex flex-col justify-center items-center text-center">
                         <div className="w-10 h-10 bg-green-50 dark:bg-green-900/30 text-green-500 rounded-full flex items-center justify-center text-lg mb-2"><i className="fa-solid fa-bullseye"></i></div>
                         <h4 className="font-bold text-gray-900 dark:text-white text-xl">{accuracy}%</h4>
                         <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">{totalCorrect}/{totalAttempted} Correct</p>
                     </div>
                 </div>

                 <div className="mb-6 bg-white dark:bg-gray-900 p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm flex items-center justify-between cursor-pointer hover:border-yellow-500 dark:hover:border-yellow-500 transition-colors" onClick={() => alert("Bookmark viewer coming soon!")}>
                     <div className="flex items-center gap-4">
                         <div className="w-10 h-10 bg-yellow-50 dark:bg-yellow-900/30 text-yellow-500 rounded-full flex items-center justify-center text-lg"><i className="fa-solid fa-bookmark"></i></div>
                         <div className="text-left">
                             <h4 className="font-bold text-gray-900 dark:text-white text-base">Saved Bookmarks</h4>
                             <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">{bookmarks.length} Questions</p>
                         </div>
                     </div>
                     <i className="fa-solid fa-chevron-right text-gray-400"></i>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">Admin Tools</h3>
                 <div className="bg-gradient-to-r from-[#0eb582] to-[#0ba875] p-5 rounded-2xl shadow-sm text-white mb-6 relative overflow-hidden">
                     <div className="relative z-10">
                         <h4 className="font-bold text-lg mb-1">Add Books / PDFs</h4>
                         <p className="text-xs text-white/80 mb-4">Upload a PDF. AI will automatically extract and categorize questions into the Practice Hub.</p>
                         <label className={`bg-white text-[#0eb582] font-bold text-sm px-4 py-2.5 rounded-xl cursor-pointer shadow-sm flex items-center justify-center gap-2 w-max ${isUploadingPdf ? 'opacity-70 pointer-events-none' : ''}`}>
                             {isUploadingPdf ? <><i className="fa-solid fa-spinner fa-spin"></i> Processing PDF...</> : <><i className="fa-solid fa-file-pdf"></i> Upload PDF</>}
                             <input type="file" accept="application/pdf" className="hidden" onChange={handlePdfUpload} disabled={isUploadingPdf} />
                         </label>
                     </div>
                     <i className="fa-solid fa-robot absolute -right-4 -bottom-4 text-6xl text-white/10"></i>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">App Settings</h3>
                 <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm mb-6">
                     <div className="p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer" onClick={() => setIsDarkMode(!isDarkMode)}>
                         <div className="flex items-center gap-3 text-gray-800 dark:text-gray-200"><i className={`fa-solid ${isDarkMode ? 'fa-moon text-yellow-400' : 'fa-sun text-orange-500'} w-5`}></i> <span className="font-medium">Dark Mode</span></div>
                         <div className={`w-12 h-6 rounded-full flex items-center p-1 transition-colors duration-300 ${isDarkMode ? 'bg-blue-600' : 'bg-gray-300 dark:bg-gray-600'}`}>
                             <div className={`w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm ${isDarkMode ? 'translate-x-6' : ''}`}></div>
                         </div>
                     </div>
                 </div>
             </div>
             );
          };

          return (
            <div className="min-h-screen font-sans max-w-md mx-auto relative overflow-hidden bg-gray-50 dark:bg-gray-950">
              
              {activePdf && <PDFViewer url={activePdf} title="Course Material" onClose={() => setActivePdf(null)} />}
              {activePracticeChapter && currentTab === 'questions' ? renderQuestionsView() : (
                <>
                  {currentTab === 'home' && renderHomeView()}
                  {currentTab === 'chat' && <ChatView user={tgUser} />}
                  {currentTab === 'ai' && <AIMentorView />}
                  {currentTab === 'questions' && renderQuestionsView()}
                  {currentTab === 'profile' && renderProfileView()}
                  
                  {/* Bottom Navigation */}
                  <div className="fixed bottom-0 w-full max-w-md bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 flex justify-around pb-5 pt-3 z-[45] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] overflow-x-auto">
                    <button onClick={() => { setCurrentTab('home'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'home' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-house text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Home</span></button>
                    <button onClick={() => { setCurrentTab('chat'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'chat' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-message text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Chat</span></button>
                    <button onClick={() => { setCurrentTab('ai'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'ai' ? 'text-purple-500' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-robot text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">AI</span></button>
                    <button onClick={() => { setCurrentTab('questions'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'questions' ? 'text-[#0eb582]' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-file-pen text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Practice</span></button>
                    <button onClick={() => { setCurrentTab('profile'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'profile' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-user text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Me</span></button>
                  </div>
                </>
              )}
              {showNeetprepModal && (
                  <div className="fixed inset-0 bg-black/60 z-[99999] flex items-center justify-center p-4" onClick={() => setShowNeetprepModal(false)}>
                      <div className="w-full max-w-md bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-2xl border border-gray-200 dark:border-gray-800" onClick={(e) => e.stopPropagation()}>
                          <div className="flex items-center justify-between mb-4">
                              <div>
                                  <h3 className="text-xl font-bold text-gray-900 dark:text-white">NEETPrep Login</h3>
                                  <p className="text-xs text-gray-500 dark:text-gray-400">Use your official NEETPrep account to connect.</p>
                              </div>
                            <button onClick={() => setShowNeetprepModal(false)} className="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300"><i className="fa-solid fa-xmark"></i></button>
                          </div>
                          <form onSubmit={sendNeetprepOtp} className="space-y-4">
                              <div>
                                  <label className="text-xs uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">NEETPrep Email / Phone</label>
                                  <input value={neetprepLoginInput} onChange={(e) => setNeetprepLoginInput(e.target.value)} type="text" placeholder="Enter your NEETPrep email or phone" className="mt-2 w-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl px-4 py-3 text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />
                              </div>
                              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700">Send OTP</button>
                              <div className="border-t border-gray-200 dark:border-gray-800 pt-4">
                                  <label className="text-xs uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">OTP Code</label>
                                  <input value={neetprepOtpInput} onChange={(e) => setNeetprepOtpInput(e.target.value)} type="text" placeholder="Enter OTP received on NEETPrep" className="mt-2 w-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl px-4 py-3 text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />
                                  <button type="button" onClick={verifyNeetprepOtp} className="mt-4 w-full bg-green-600 text-white py-3 rounded-2xl font-bold hover:bg-green-700">Verify OTP</button>
                              </div>
                              {neetprepStatus && <p className="text-sm text-gray-600 dark:text-gray-300">{neetprepStatus}</p>}
                              {neetprepConnected && <button type="button" onClick={disconnectNeetprep} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold hover:bg-red-700">Disconnect NEETPrep</button>}
                          </form>
                      </div>
                  </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
