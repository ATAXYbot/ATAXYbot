                                         </div>
                                         <div className="text-sm text-gray-800 dark:text-gray-200 font-medium line-clamp-2">{item.q.text}</div>
                                         <div className="mt-2 text-[11px] text-gray-500 dark:text-gray-400">{item.isCorrect ? 'Correct' : 'Incorrect'} — Selected: {(item.optionIdx + 10).toString(36).toUpperCase()}</div>
                                     </div>
                                 ))}
                             </div>
                         ) : (
                             <p className="text-sm text-gray-500 dark:text-gray-400">No practice activity yet. Open a chapter and attempt questions to see your analysis here.</p>
                         )}
                     </div>

                     <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3">Topic-wise Questions</h3>
                     <div className="space-y-3">
                         {(activePracticeSubject || ALIEN_QBANK[0]).chapters.length > 0 ? (
                             (activePracticeSubject || ALIEN_QBANK[0]).chapters.map((chap, i) => (
                                 <div key={i} onClick={() => setActivePracticeChapter(chap)} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex justify-between items-center shadow-sm cursor-pointer hover:border-blue-300 transition-colors">
                                     <div>
                                         <h4 className="font-bold text-sm text-gray-900 dark:text-white">{chap.name}</h4>
                                         <p className="text-[10px] font-bold text-blue-500 mt-1 bg-blue-50 dark:bg-blue-900/20 inline-block px-2 py-0.5 rounded">{chap.topics.length} Topics</p>
                                     </div>
                                     <button className="bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-xs font-bold px-4 py-2 rounded-lg border border-blue-100 dark:border-blue-900/50">Solve</button>
                                 </div>
                             ))
                         ) : (
                             <p className="text-sm text-gray-500 text-center mt-8">Chapters adding soon...</p>
                         )}
                     </div>
                 </div>
             );
          };

          // --- 🆕 PROFILE & SETTINGS VIEW ---
          const renderPerformanceView = () => {
             const totalLectures = VIDEOS.length;
             const watchedCount = watchedLectureIds.length;
             const watchedPercent = totalLectures ? Math.round((watchedCount / totalLectures) * 100) : 0;
             const practiceActivity = getAllPracticeActivities();
             const totalPracticeAttempts = practiceActivity.length;
             const totalPracticeCorrect = practiceActivity.filter(item => item.isCorrect).length;
             const practiceAccuracy = totalPracticeAttempts ? Math.round((totalPracticeCorrect / totalPracticeAttempts) * 100) : 0;

             return (
               <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                 <div className="flex items-center gap-3 mb-5">
                    <button onClick={() => setShowPerformance(false)} className="w-10 h-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-900 dark:text-white flex items-center justify-center">
                      <i className="fa-solid fa-arrow-left"></i>
                    </button>
                    <div>
                        <h2 className="text-2xl font-black text-gray-900 dark:text-white">Performance Overview</h2>
                        <p className="text-sm text-gray-500 dark:text-gray-400">Track batch progress and practice analytics.</p>
                    </div>
                 </div>

                 <div className="flex gap-2 mb-5">
                    <button onClick={() => setPerformanceTab('batch')} className={`flex-1 px-4 py-3 rounded-2xl text-sm font-bold transition-colors ${performanceTab === 'batch' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-800'}`}>
                        Batch
                    </button>
                    <button onClick={() => setPerformanceTab('practice')} className={`flex-1 px-4 py-3 rounded-2xl text-sm font-bold transition-colors ${performanceTab === 'practice' ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-800'}`}>
                        Practice
                    </button>
                 </div>

                 {performanceTab === 'batch' ? (
                    <div className="space-y-4">
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white dark:bg-gray-900 rounded-3xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
                               <p className="text-xs uppercase tracking-[0.3em] text-gray-400 dark:text-gray-500 font-bold">Lectures watched</p>
                               <p className="text-3xl font-black text-gray-900 dark:text-white mt-2">{watchedCount}</p>
                               <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">{watchedPercent}% of {totalLectures}</p>
                            </div>
                            <div className="bg-white dark:bg-gray-900 rounded-3xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
                               <p className="text-xs uppercase tracking-[0.3em] text-gray-400 dark:text-gray-500 font-bold">Batch progress</p>
                               <div className="mt-3 h-3 rounded-full bg-gray-200 dark:bg-gray-800 overflow-hidden">
                                   <div className="h-full bg-blue-600" style={{ width: `${watchedPercent}%` }}></div>
                               </div>
                               <p className="text-xs text-gray-500 dark:text-gray-400 mt-2">Continue attending more lectures to improve your completion score.</p>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-900 rounded-3xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
                            <h3 className="font-bold text-gray-900 dark:text-white mb-3">Batch Summary</h3>
                            <p className="text-sm text-gray-500 dark:text-gray-400">This section updates each time you open a lecture and helps you track batch progress.</p>
                        </div>
                    </div>
                 ) : (
                    <div className="space-y-4">
                       <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white dark:bg-gray-900 rounded-3xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
                               <p className="text-xs uppercase tracking-[0.3em] text-gray-400 dark:text-gray-500 font-bold">Attempted</p>
                               <p className="text-3xl font-black text-gray-900 dark:text-white mt-2">{totalPracticeAttempts}</p>
                            </div>
                            <div className="bg-white dark:bg-gray-900 rounded-3xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
                               <p className="text-xs uppercase tracking-[0.3em] text-gray-400 dark:text-gray-500 font-bold">Accuracy</p>
                               <p className="text-3xl font-black text-gray-900 dark:text-gray-100 mt-2">{practiceAccuracy}%</p>
                            </div>
                       </div>
                       <div className="bg-white dark:bg-gray-900 rounded-3xl p-4 shadow-sm border border-gray-200 dark:border-gray-800">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-gray-900 dark:text-white">Practice Activity</h3>
                                <span className="text-xs text-gray-500 dark:text-gray-400">Latest</span>
                            </div>
                            {practiceActivity.length ? (
                               <div className="space-y-3">
                                   {practiceActivity.slice(0, 6).map((item, idx) => (
                                      <div key={idx} className="rounded-2xl border border-gray-100 dark:border-gray-800 p-3">
                                          <div className="text-xs text-gray-400 dark:text-gray-500 mb-1">{item.q.subjectName} • {item.q.chapterName}</div>
                                          <div className="font-medium text-gray-900 dark:text-gray-100 text-sm line-clamp-2">{item.q.text}</div>
                                          <div className="mt-2 flex items-center justify-between text-[11px] text-gray-500 dark:text-gray-400">
                                             <span>{item.isCorrect ? 'Correct' : 'Incorrect'}</span>
                                             <span>{new Date(item.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                          </div>
                                      </div>
                                   ))}
                               </div>
                            ) : (
                               <p className="text-sm text-gray-500 dark:text-gray-400">No practice activity yet. Attempt questions to fill this report.</p>
                            )}
                       </div>
                    </div>
                 )}
               </div>
             );
          };

          const renderProfileView = () => (
             showPerformance ? renderPerformanceView() : (
             <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                 <div className="text-center mb-8">
                     <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full mx-auto flex items-center justify-center text-4xl font-black mb-4 shadow-lg uppercase">{tgUser.first_name[0]}</div>
                     <h2 className="text-2xl font-black text-gray-900 dark:text-white">{tgUser.first_name}</h2>
                     <p className="text-sm text-gray-500 mt-1">ATAXY UID: {tgUser.id}</p>
                 </div>

                 <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm mb-6">
                     <div onClick={() => setShowPerformance(true)} className="p-4 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer">
                         <div className="flex items-center gap-3 text-gray-800 dark:text-gray-200"><i className="fa-solid fa-chart-line text-blue-500 w-5"></i> <span className="font-medium">My Performance</span></div>
                         <i className="fa-solid fa-chevron-right text-gray-400 text-sm"></i>
                     </div>
                     
                     <div className="p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer" onClick={() => setIsDarkMode(!isDarkMode)}>
                         <div className="flex items-center gap-3 text-gray-800 dark:text-gray-200"><i className={`fa-solid ${isDarkMode ? 'fa-moon text-yellow-400' : 'fa-sun text-orange-500'} w-5`}></i> <span className="font-medium">Dark Mode</span></div>
                         <div className={`w-12 h-6 rounded-full flex items-center p-1 transition-colors duration-300 ${isDarkMode ? 'bg-blue-600' : 'bg-gray-300 dark:bg-gray-600'}`}>
                             <div className={`w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm ${isDarkMode ? 'translate-x-6' : ''}`}></div>
                         </div>
                     </div>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">Community</h3>
                 <div onClick={() => setShowChat(true)} className="bg-gradient-to-r from-blue-600 to-indigo-600 p-5 rounded-2xl text-white shadow-md flex items-center justify-between cursor-pointer hover:scale-[1.02] transition-transform">
                     <div>
                         <h4 className="font-bold text-lg mb-1"><i className="fa-solid fa-users-rays"></i> Global Discussion</h4>
                         <p className="text-xs text-blue-100">Join 10k+ students solving doubts live.</p>
                     </div>
                     <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm"><i className="fa-solid fa-arrow-right"></i></div>
                 </div>
             </div>
          ));

          return (
            <div className="min-h-screen font-sans max-w-md mx-auto relative overflow-hidden bg-gray-50 dark:bg-gray-950">
              
              {showChat && <DiscussionView onBack={() => setShowChat(false)} user={tgUser} />}
              {activePdf && <PDFViewer url={activePdf} title="Course Material" onClose={() => setActivePdf(null)} />}

              {!showChat && (activeVideo ? renderVideoPlayerView() : 
               activeChapter && currentTab === 'batches' ? renderChapterDetailView() : 
               activeSubject && currentTab === 'batches' ? renderSubjectDetailView() : 
               activeBatch && currentTab === 'batches' ? renderBatchDetailView() : (
                <>
                  {currentTab === 'home' && renderHomeView()}
                  {currentTab === 'batches' && renderBatchesView()}
                  {currentTab === 'questions' && renderQuestionsView()}
                  {currentTab === 'profile' && renderProfileView()}
                  
                  {/* Modern Bottom Nav */}
                  <div className="fixed bottom-0 w-full max-w-md bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 flex justify-around pb-5 pt-3 z-[45]">
                    <button onClick={() => { setCurrentTab('home'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 w-full transition-colors ${currentTab === 'home' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                      <i className="fa-solid fa-house text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Home</span>
                    </button>
                    <button onClick={() => { setCurrentTab('batches'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 w-full transition-colors ${currentTab === 'batches' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                      <i className="fa-solid fa-book-open text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Batches</span>
                    </button>
                    <button onClick={() => { setCurrentTab('questions'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 w-full transition-colors ${currentTab === 'questions' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                      <i className="fa-solid fa-file-pen text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Practice</span>
                    </button>
                    <button onClick={() => { setCurrentTab('profile'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 w-full transition-colors ${currentTab === 'profile' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                      <i className="fa-solid fa-user text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Profile</span>
                    </button>
                  </div>
                </>
              ))}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
