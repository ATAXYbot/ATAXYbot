<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATAXY Learning</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; scrollbar-width: none; 
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            touch-action: manipulation;
        }
        .yt-wrapper iframe { pointer-events: none !important; transform: scale(1.08); }
        .watermark-marquee {
            animation: moveWatermark 20s linear infinite alternate;
            pointer-events: none;
        }
        @keyframes moveWatermark {
            0% { transform: translate(-10%, -10%) rotate(-20deg); }
            100% { transform: translate(10%, 10%) rotate(-20deg); }
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
        input[type=range].custom-slider {
            -webkit-appearance: none; appearance: none; 
            width: 100%; height: 100%; background: transparent; 
            outline: none; margin: 0; padding: 0; cursor: pointer;
        }
        input[type=range].custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 24px; height: 24px; background: transparent; cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 scroll-smooth">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // =========================================================================
        // ⬇️ ADD YOUR PRACTICE QUESTIONS HERE (ALIEN PLATFORM QBANK) ⬇️
        // =========================================================================
        const ALIEN_QBANK = [
            {
                subjectId: "phy",
                subjectName: "Physics",
                icon: "⚛️",
                chapters: [
                    {
                        id: "chap_kinematics",
                        name: "Kinematics 1D",
                        topics: [
                            {
                                id: "top_distance",
                                name: "Distance & Displacement",
                                questions: [
                                    { id: "q1", text: "A particle moves from A to B in a semicircular path of radius R. The ratio of distance to displacement is:", options: ["π/2", "π", "2/π", "1"], correct: 0 },
                                    { id: "q2", text: "Displacement can be:", options: ["Positive only", "Negative only", "Zero only", "Positive, negative or zero"], correct: 3 },
                                    { id: "q3", text: "Which of the following is a scalar quantity?", options: ["Displacement", "Distance", "Velocity", "Acceleration"], correct: 1 }
                                ]
                            },
                            {
                                id: "top_speed",
                                name: "Average Speed & Velocity",
                                questions: [
                                    { id: "q4", text: "A car covers first half of total distance with speed v1 and second half with v2. The average speed is:", options: ["(v1+v2)/2", "√(v1*v2)", "2v1v2/(v1+v2)", "v1v2/(v1+v2)"], correct: 2 },
                                    { id: "q5", text: "If a body covers equal displacements in equal intervals of time, it is moving with:", options: ["Uniform velocity", "Uniform acceleration", "Variable velocity", "Retardation"], correct: 0 }
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                subjectId: "chem",
                subjectName: "Chemistry",
                icon: "⚗️",
                chapters: [
                    {
                        id: "chap_mole",
                        name: "Mole Concept",
                        topics: [
                            {
                                id: "top_mole_1",
                                name: "Basic Mole Calculations",
                                questions: [
                                    { id: "q7", text: "The number of atoms in 0.1 mol of a triatomic gas is: (NA = 6.02x10^23)", options: ["6.026 x 10^22", "1.806 x 10^23", "3.600 x 10^23", "1.806 x 10^22"], correct: 1 }
                                ]
                            }
                        ]
                    }
                ]
            },
            {
                subjectId: "bio",
                subjectName: "Biology",
                icon: "🌿",
                chapters: [] 
            }
        ];

        // ==========================================
        // 📚 BATCHES DATA
        // ==========================================
        const BATCHES = [
          { id: 1, name: "Arjuna JEE 2025", target: "Class 11 + JEE", price: "Free", color: "bg-blue-600", students: "120k+" },
          { id: 6, name: "Yakeen NEET 2.0 2025", target: "Dropper + NEET", price: "Free", color: "bg-purple-600", students: "250k+", subBatches: [
            { id: 61, name: "Legend Batch", target: "Phase 1", color: "bg-purple-500" }
          ]},
        ];

        const SUBJECTS = [
          { id: 'phy', name: "Physics", icon: "⚛️", chapters: 30 },
          { id: 'chem_phys', name: "Physical Chemistry", icon: "⚗️", chapters: 12 },
        ];

        const CHAPTERS = [
          { id: 'phy_3', subjectId: 'phy', name: 'Kinematics 1D', count: "8 Lectures" },
          { id: 'pc_1', subjectId: 'chem_phys', name: 'Some Basic Concepts of Chemistry (Mole Concept)', count: "8 Lectures" },
        ];

        const VIDEOS = [
          { id: 101, chapterId: 'pc_1', title: "L-01 : Atomic Mass & Molecular Mass", duration: "2h 31m", date: "05 May", url: "https://youtu.be/cyKkmGYJ-yE?si=61eDK7jgSndsNOup" },
        ];


        // ==========================================
        // 🔒 PERSISTENT GATEKEEPER
        // ==========================================
        const Gatekeeper = ({ onVerify }) => {
            const [step, setStep] = useState(0);
            const [verifying, setVerifying] = useState(false);
            const [isCheckingSaved, setIsCheckingSaved] = useState(true);
            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || { first_name: "Student", id: "1001", username: "student" };

            useEffect(() => {
                const savedState = localStorage.getItem('ataxy_verified');
                if (savedState === 'true') onVerify(tgUser);
                else setIsCheckingSaved(false);
            }, []);

            const handleVerify = () => {
                setVerifying(true);
                setTimeout(() => {
                    localStorage.setItem('ataxy_verified', 'true');
                    setVerifying(false);
                    onVerify(tgUser);
                }, 1500);
            };

            if (isCheckingSaved) return <div className="min-h-screen bg-gray-900"></div>;

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-center text-white">
                    <div className="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center text-4xl mb-6 shadow-[0_0_30px_rgba(37,99,235,0.5)]">
                        <i className="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h1 className="text-3xl font-black mb-2">ATAXY Learning</h1>
                    <p className="text-gray-400 mb-8 text-sm">Welcome, {tgUser.first_name}! Complete these steps to access your batches.</p>

                    <div className="w-full space-y-4 max-w-sm">
                        <div className={`p-4 rounded-xl border flex items-center justify-between transition-all ${step >= 1 ? 'bg-green-500/10 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                            <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${step >= 1 ? 'bg-green-500 text-white' : 'bg-gray-800'}`}>1</div>
                                <div className="text-left"><h3 className="font-bold">ATAXY Mentor</h3><p className="text-xs text-gray-400">Official Channel</p></div>
                            </div>
                            <button onClick={() => { window.open("https://t.me/ATAXYmentor", "_blank"); setStep(Math.max(step, 1)); }} className={`px-4 py-2 rounded-lg font-bold text-sm ${step >= 1 ? 'bg-green-500/20 text-green-500' : 'bg-blue-600 text-white'}`}>
                                {step >= 1 ? 'Joined' : 'Join'}
                            </button>
                        </div>
                        <div className={`p-4 rounded-xl border flex items-center justify-between transition-all ${step >= 2 ? 'bg-green-500/10 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                            <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${step >= 2 ? 'bg-green-500 text-white' : 'bg-gray-800'}`}>2</div>
                                <div className="text-left"><h3 className="font-bold">Discussion Group</h3><p className="text-xs text-gray-400">Doubt Solving</p></div>
                            </div>
                            <button onClick={() => { window.open("https://t.me/ATAXYmentorDiscussion", "_blank"); setStep(2); }} disabled={step < 1} className={`px-4 py-2 rounded-lg font-bold text-sm ${step >= 2 ? 'bg-green-500/20 text-green-500' : step < 1 ? 'bg-gray-700 text-gray-500' : 'bg-blue-600 text-white'}`}>
                                {step >= 2 ? 'Joined' : 'Join'}
                            </button>
                        </div>
                    </div>
                    <div className="mt-10 w-full max-w-sm">
                        <button onClick={handleVerify} disabled={step < 2 || verifying} className={`w-full py-4 rounded-xl font-black text-lg transition-all shadow-lg ${step === 2 && !verifying ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:scale-105' : 'bg-gray-800 text-gray-500'}`}>
                            {verifying ? <i className="fa-solid fa-spinner fa-spin"></i> : "Verify & Login"}
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🚀 SECURE PDF VIEWER
        // ==========================================
        const PDFViewer = ({ url, title, onClose }) => {
            return (
                <div className="fixed inset-0 z-[99999] bg-black flex flex-col animate-in fade-in">
                    <div className="bg-gray-900 pt-[60px] pb-4 px-4 flex items-center gap-4 text-white shadow-md">
                        <button onClick={onClose} className="w-10 h-10 bg-white/10 rounded-full hover:bg-white/20"><i className="fa-solid fa-arrow-left"></i></button>
                        <h2 className="font-bold text-sm line-clamp-1">{title}</h2>
                    </div>
                    <div className="flex-grow w-full bg-white relative">
                        <iframe src={`https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`} className="w-full h-full border-none pointer-events-auto" />
                        <div className="absolute top-0 right-0 w-16 h-12 bg-transparent z-10"></div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 🚀 SMART PRACTICE QUESTION CARD (NEETPREP REPLICA)
        // ==========================================
        const QuestionCard = ({ q, attemptIdx, onAttempt, onClear }) => {
            const isAnswered = attemptIdx !== undefined;

            return (
                <div id={`question-card-${q.id}`} className="bg-white dark:bg-gray-900 p-5 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm mb-4 scroll-mt-[120px]">
                    <div className="flex justify-between items-start mb-4">
                        <p className="font-bold text-gray-900 dark:text-white leading-relaxed text-sm"><span className="text-blue-500 mr-1">Q{q.globalIndex}.</span> {q.text}</p>
                        <span className="bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-[10px] px-2 py-1 rounded font-bold ml-2 whitespace-nowrap line-clamp-1 max-w-[100px] shrink-0">{q.topicName}</span>
                    </div>
                    
                    <div className="space-y-2">
                        {q.options.map((opt, idx) => {
                            let btnClass = "bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700";
                            let icon = null;
                            
                            if (isAnswered) {
                                if (idx === q.correct) {
                                    btnClass = "bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border-green-500 ring-1 ring-green-500";
                                    icon = <i className="fa-solid fa-check-circle text-green-500 absolute right-4 top-1/2 -translate-y-1/2 text-lg"></i>;
                                } else if (idx === attemptIdx && idx !== q.correct) {
                                    btnClass = "bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 border-red-500 ring-1 ring-red-500";
                                    icon = <i className="fa-solid fa-xmark-circle text-red-500 absolute right-4 top-1/2 -translate-y-1/2 text-lg"></i>;
                                } else {
                                    btnClass = "bg-gray-50 dark:bg-gray-800/50 text-gray-400 dark:text-gray-600 border-gray-100 dark:border-gray-800 opacity-50";
                                }
                            }

                            return (
                                <button key={idx} disabled={isAnswered} onClick={() => onAttempt(q.id, idx)} className={`w-full text-left p-3.5 rounded-xl border transition-all font-medium text-sm flex gap-3 relative ${btnClass}`}>
                                    <span className={`font-bold ${isAnswered && idx===q.correct ? 'text-green-600 dark:text-green-500' : isAnswered && idx===attemptIdx ? 'text-red-600 dark:text-red-500' : 'text-gray-400'}`}>{(idx + 10).toString(36).toUpperCase()}.</span> 
                                    <span className="pr-8">{opt}</span>
                                    {icon}
                                </button>
                            );
                        })}
                    </div>
                    {isAnswered && (
                        <div className="mt-4 flex justify-between items-center border-t border-gray-100 dark:border-gray-800 pt-3 animate-in fade-in">
                            <button className="text-xs bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 border border-blue-100 dark:border-blue-900/50"><i className="fa-solid fa-lightbulb"></i> View Solution</button>
                            <button onClick={() => onClear(q.id)} className="text-xs text-gray-500 hover:text-red-500 dark:text-gray-400 font-bold px-3 py-1.5 rounded-lg transition-colors border border-transparent hover:border-red-100 dark:hover:border-red-900/50"><i className="fa-solid fa-rotate-left"></i> Clear Attempt</button>
                        </div>
                    )}
                </div>
            )
        }

        // ==========================================
        // 🚀 UNIVERSAL VIDEO PLAYER
        // ==========================================
        const UniversalPlayer = ({ src, poster, title, onBack, user }) => {
          const isYouTube = src && (src.includes("youtu.be") || src.includes("youtube.com"));
          const ytId = isYouTube ? src.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/)?.[2] : null;

          const videoRef = useRef(null);
          const ytPlayerDivRef = useRef(null);
          const ytPlayerRef = useRef(null);
          const ytIntervalRef = useRef(null);
          
          const [isPlaying, setIsPlaying] = useState(false);
          const [isBuffering, setIsBuffering] = useState(false);
          const [progress, setProgress] = useState(0);
          const [currentTime, setCurrentTime] = useState("00:00");
          const [duration, setDuration] = useState("00:00");
          
          const [showControls, setShowControls] = useState(true);
          const [playerMode, setPlayerMode] = useState('normal'); 
          const [showSettings, setShowSettings] = useState(false);
          const [settingMenu, setSettingMenu] = useState('main'); 
          const [playbackSpeed, setPlaybackSpeed] = useState(1);
          const [seekFeedback, setSeekFeedback] = useState(null); 
          const [isSpeeding, setIsSpeeding] = useState(false);
          const [ytInitCover, setYtInitCover] = useState(isYouTube);
          
          const controlsTimerRef = useRef(null);
          const tapTimerRef = useRef(null);
          const longPressTimerRef = useRef(null);
          const lastTapRef = useRef({ time: 0, x: 0, y: 0 });
          const wasSpeeding = useRef(false);

          const formatTime = (sec) => {
            if (isNaN(sec) || sec === Infinity) return "00:00";
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = Math.floor(sec % 60);
            if (h > 0) return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          const enginePlay = () => isYouTube ? ytPlayerRef.current?.playVideo() : videoRef.current?.play();
          const enginePause = () => isYouTube ? ytPlayerRef.current?.pauseVideo() : videoRef.current?.pause();
          const engineGetTime = () => isYouTube ? (ytPlayerRef.current?.getCurrentTime() || 0) : (videoRef.current?.currentTime || 0);
          const engineGetDuration = () => isYouTube ? (ytPlayerRef.current?.getDuration() || 0) : (videoRef.current?.duration || 0);
          const engineSeek = (sec) => {
              if (isYouTube && ytPlayerRef.current) ytPlayerRef.current.seekTo(sec, true);
              else if (videoRef.current) videoRef.current.currentTime = sec;
          };
          const engineSetSpeed = (rate) => {
              if (isYouTube && ytPlayerRef.current) ytPlayerRef.current.setPlaybackRate(rate);
              else if (videoRef.current) videoRef.current.playbackRate = rate;
              setPlaybackSpeed(rate);
          };

          useEffect(() => {
              if (!isYouTube || !src) return;
              const initYT = () => {
                  if (ytPlayerRef.current) return; 
                  ytPlayerRef.current = new window.YT.Player(ytPlayerDivRef.current, {
                      videoId: ytId,
                      playerVars: { controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0, playsinline: 1, showinfo: 0, iv_load_policy: 3 },
                      events: {
                          onReady: (e) => {
                              setDuration(formatTime(e.target.getDuration()));
                              ytIntervalRef.current = setInterval(() => {
                                  if (ytPlayerRef.current && ytPlayerRef.current.getCurrentTime) {
                                      const cur = ytPlayerRef.current.getCurrentTime();
                                      const tot = ytPlayerRef.current.getDuration();
                                      if (tot > 0) setProgress((cur / tot) * 100);
                                      setCurrentTime(formatTime(cur));
                                  }
                              }, 500);
                          },
                          onStateChange: (e) => {
                              if (e.data === window.YT.PlayerState.PLAYING) {
                                  setIsPlaying(true); setIsBuffering(false);
                                  setDuration(formatTime(e.target.getDuration()));
                                  setTimeout(() => setYtInitCover(false), 2500);
                              } else if (e.data === window.YT.PlayerState.PAUSED) {
                                  setIsPlaying(false);
                              } else if (e.data === window.YT.PlayerState.BUFFERING) {
                                  setIsBuffering(true);
                              }
                          }
                      }
                  });
              };

              if (!window.YT) {
                  const tag = document.createElement('script');
                  tag.src = "https://www.youtube.com/iframe_api";
                  window.onYouTubeIframeAPIReady = initYT;
                  document.head.appendChild(tag);
              } else initYT();

              return () => { clearInterval(ytIntervalRef.current); if (ytPlayerRef.current?.destroy) ytPlayerRef.current.destroy(); };
          }, [isYouTube, ytId, src]);

          const resetControlsTimer = () => {
             setShowControls(true);
             if (controlsTimerRef.current) clearTimeout(controlsTimerRef.current);
             controlsTimerRef.current = setTimeout(() => {
                 const isActuallyPlaying = isYouTube ? (ytPlayerRef.current?.getPlayerState() === 1) : (!videoRef.current?.paused);
                 if (isActuallyPlaying && !showSettings) setShowControls(false);
             }, 3000);
          };

          useEffect(() => { resetControlsTimer(); return () => clearTimeout(controlsTimerRef.current); }, [isPlaying, showSettings]);

          const togglePlay = (e) => {
            if(e) e.stopPropagation();
            if(!src) return;
            if (isPlaying) { enginePause(); setIsPlaying(false); } 
            else { enginePlay(); setIsPlaying(true); }
            resetControlsTimer();
          };

          const handleMP4TimeUpdate = () => {
            if (isYouTube || !videoRef.current) return;
            const current = videoRef.current.currentTime;
            const total = videoRef.current.duration;
            if (total > 0) setProgress((current / total) * 100);
            setCurrentTime(formatTime(current));
          };

          const handleSeekInteract = (e) => {
              e.stopPropagation();
              if(!src) return;
              const rect = e.currentTarget.getBoundingClientRect();
              const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
              let pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); 
              engineSeek(pos * engineGetDuration());
              setProgress(pos * 100);
              resetControlsTimer();
          };

          const handlePointerDown = (e) => {
             if(!src) return;
             wasSpeeding.current = false;
             lastTapRef.current.x = e.clientX || (e.touches && e.touches.length > 0 ? e.touches[0].clientX : 0);
             lastTapRef.current.y = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);

             longPressTimerRef.current = setTimeout(() => {
                 if (isPlaying) { engineSetSpeed(2.0); setIsSpeeding(true); setShowControls(false); wasSpeeding.current = true; }
             }, 400);
          };

          const handlePointerUp = (e) => {
             if (longPressTimerRef.current) clearTimeout(longPressTimerRef.current);
             if (isSpeeding) { engineSetSpeed(playbackSpeed); setIsSpeeding(false); return; }
             if(!src || wasSpeeding.current) return;

             const now = Date.now();
             const x = e.clientX || (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientX : lastTapRef.current.x);
             const y = e.clientY || (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientY : lastTapRef.current.y);
             const isLeftHalf = playerMode === 'landscape' ? (y < window.innerHeight / 2) : (x < window.innerWidth / 2);

             if (now - lastTapRef.current.time < 300) {
                 clearTimeout(tapTimerRef.current); 
                 const curTime = engineGetTime();
                 engineSeek(isLeftHalf ? Math.max(0, curTime - 5) : Math.min(engineGetDuration(), curTime + 5));
                 setSeekFeedback(isLeftHalf ? 'left' : 'right');
                 setTimeout(() => setSeekFeedback(null), 500);
                 lastTapRef.current.time = 0; 
             } else {
                 lastTapRef.current.time = now;
                 tapTimerRef.current = setTimeout(() => {
                     setShowControls(prev => { const next = !prev; if (next) resetControlsTimer(); return next; });
                 }, 300);
             }
          };

          const handlePointerCancel = () => {
             if (longPressTimerRef.current) clearTimeout(longPressTimerRef.current);
             if (isSpeeding) { engineSetSpeed(playbackSpeed); setIsSpeeding(false); }
          };

          const getContainerClasses = () => {
              if (playerMode === 'landscape') return "fixed top-1/2 left-1/2 w-[100vh] h-[100vw] -translate-x-1/2 -translate-y-1/2 rotate-90 z-[99999] bg-black flex items-center justify-center overflow-hidden touch-none";
              if (playerMode === 'fullscreen') return "fixed inset-0 w-screen h-screen z-[99999] bg-black flex items-center justify-center overflow-hidden touch-none";
              return "w-full aspect-video bg-black relative flex items-center justify-center overflow-hidden touch-none";
          };

          return (
            <div className={getContainerClasses()}>
              {!src ? (
                 <div className="w-full h-full flex flex-col items-center justify-center bg-gray-900 text-white p-6 text-center z-0">
                     <i className="fa-solid fa-video-slash text-4xl mb-3 text-gray-500"></i>
                     <h2 className="font-bold">Lecture not uploaded yet</h2>
                 </div>
              ) : isYouTube ? (
                 <div className="w-full h-full pointer-events-none yt-wrapper z-0 overflow-hidden relative">
                     <div ref={ytPlayerDivRef} className="w-full h-full"></div>
                     {ytInitCover && (
                         <div className="absolute inset-0 bg-black z-20 flex items-center justify-center transition-opacity duration-500">
                             <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                         </div>
                     )}
                 </div>
              ) : (
                 <video ref={videoRef} src={src} poster={poster} className="w-full h-full object-contain pointer-events-none z-0" playsInline onTimeUpdate={handleMP4TimeUpdate} onLoadedMetadata={() => setDuration(formatTime(videoRef.current.duration))} onWaiting={() => setIsBuffering(true)} onPlaying={() => setIsBuffering(false)} />
              )}

              <div className="absolute inset-0 pointer-events-none z-[5] overflow-hidden flex items-center justify-center opacity-30 mix-blend-overlay">
                  <div className="watermark-marquee whitespace-nowrap text-white/50 text-2xl font-black select-none tracking-widest drop-shadow-md">
                      {user?.first_name || 'ATAXY'} • UID:{user?.id || 'TEST'} • {user?.first_name || 'ATAXY'}
                  </div>
              </div>

              <div className="absolute inset-0 z-10 cursor-pointer" onPointerDown={handlePointerDown} onPointerUp={handlePointerUp} onPointerLeave={handlePointerCancel} onPointerCancel={handlePointerCancel} onContextMenu={(e) => e.preventDefault()}></div>

              {/* Fixed pt-[60px] collision prevention */}
              <div className={`absolute top-0 left-0 right-0 p-3 pt-[60px] z-40 transition-opacity duration-300 flex justify-between items-start pointer-events-none bg-gradient-to-b from-black/80 to-transparent pb-10 ${showControls || playerMode === 'normal' ? 'opacity-100' : 'opacity-0'}`}>
                 <div className="flex items-center gap-3">
                     <button onPointerDown={(e) => { e.stopPropagation(); onBack(); }} className="w-10 h-10 bg-black/40 text-white rounded-full flex items-center justify-center pointer-events-auto hover:bg-blue-600 transition-colors backdrop-blur-sm shadow-md">
                         <i className="fa-solid fa-arrow-left"></i>
                     </button>
                     <h2 className="text-white font-semibold text-sm line-clamp-1 drop-shadow-md max-w-[200px]">{title}</h2>
                 </div>
              </div>

              {isSpeeding && <div className="absolute top-20 left-0 right-0 flex justify-center z-40 pointer-events-none animate-in slide-in-from-top-2"><div className="bg-black/80 text-white text-xs font-bold px-4 py-2 rounded-full flex items-center gap-2 shadow-lg"><span>Fast forwarding at 2x</span><i className="fa-solid fa-forward"></i></div></div>}
              {seekFeedback === 'left' && <div className="absolute left-10 top-1/2 -translate-y-1/2 bg-black/50 text-white p-5 rounded-full flex flex-col items-center animate-pulse pointer-events-none z-40"><i className="fa-solid fa-backward text-2xl mb-1"></i><span className="text-xs font-bold">-5s</span></div>}
              {seekFeedback === 'right' && <div className="absolute right-10 top-1/2 -translate-y-1/2 bg-black/50 text-white p-5 rounded-full flex flex-col items-center animate-pulse pointer-events-none z-40"><i className="fa-solid fa-forward text-2xl mb-1"></i><span className="text-xs font-bold">+5s</span></div>}
              {isBuffering && !ytInitCover && <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"><div className="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>}

              <div className={`absolute inset-0 flex items-center justify-center transition-opacity duration-300 z-30 pointer-events-none ${showControls && !isSpeeding && src ? 'opacity-100' : 'opacity-0'}`}>
                <button onClick={togglePlay} className="w-16 h-16 bg-black/50 rounded-full flex items-center justify-center backdrop-blur-sm hover:bg-blue-600 transition-colors shadow-lg pointer-events-auto">
                  {isPlaying ? <i className="fa-solid fa-pause text-white text-2xl"></i> : <i className="fa-solid fa-play text-white text-2xl ml-1"></i>}
                </button>
              </div>

              <div className={`absolute bottom-0 left-0 right-0 transition-opacity duration-300 z-[60] bg-gradient-to-t from-black via-black/80 to-transparent pt-16 pb-3 px-4 flex flex-col gap-2 pointer-events-none ${showControls && !isSpeeding && src ? 'opacity-100' : 'opacity-0'} ${playerMode !== 'normal' ? 'px-8 pb-6' : ''}`}>
                <div className="w-full h-8 relative flex items-center group cursor-pointer pointer-events-auto" onPointerDown={handleSeekInteract} onPointerMove={(e) => { if(e.buttons > 0) handleSeekInteract(e); }}>
                    <div className="w-full h-1 bg-white/30 rounded-full relative pointer-events-none transition-all group-hover:h-1.5">
                        <div className="absolute h-full bg-blue-600 rounded-full" style={{width: `${progress}%`}}></div>
                        <div className="absolute w-3.5 h-3.5 bg-blue-600 rounded-full top-1/2 -translate-y-1/2 -translate-x-1/2 shadow opacity-0 group-hover:opacity-100 transition-opacity" style={{left: `${progress}%`}}></div>
                    </div>
                </div>

                <div className="flex items-center justify-between text-white pointer-events-auto">
                  <div className="flex items-center gap-4">
                    <button onClick={togglePlay} className="hover:text-blue-500 transition-colors p-2 -ml-2">
                      {isPlaying ? <i className="fa-solid fa-pause text-lg"></i> : <i className="fa-solid fa-play text-lg"></i>}
                    </button>
                    <div className="text-xs font-medium opacity-90 tracking-wide font-mono">
                      {currentTime} <span className="opacity-60 mx-1">/</span> {duration}
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    <div className="relative">
                        <button onClick={() => { setShowSettings(!showSettings); setSettingMenu('main'); }} className="hover:text-blue-500 transition-colors p-2">
                            <i className="fa-solid fa-gear text-base"></i>
                        </button>
                        {showSettings && (
                            <div className="absolute bottom-12 right-0 bg-black/95 rounded-xl p-2 w-48 shadow-2xl border border-white/10 z-50 animate-in fade-in zoom-in-95 backdrop-blur-md">
                                {settingMenu === 'main' && (
                                    <div className="flex flex-col gap-1">
                                        <button onClick={()=>setSettingMenu('speed')} className="w-full text-left px-3 py-3 text-sm hover:bg-white/10 rounded-lg flex items-center justify-between">
                                            <div className="flex items-center gap-3"><i className="fa-solid fa-gauge-high text-gray-400 w-4"></i> Playback Speed</div>
                                            <div className="text-gray-400 text-xs flex items-center gap-1">{playbackSpeed === 1 ? 'Normal' : `${playbackSpeed}x`} <i className="fa-solid fa-chevron-right text-[10px]"></i></div>
                                        </button>
                                    </div>
                                )}
                                {settingMenu === 'speed' && (
                                    <div className="flex flex-col max-h-[250px] overflow-y-auto">
                                        <button onClick={()=>setSettingMenu('main')} className="w-full text-left px-3 py-3 text-sm hover:bg-white/10 rounded-lg flex items-center gap-3 border-b border-white/10 mb-1 font-bold text-gray-300">
                                            <i className="fa-solid fa-arrow-left"></i> Speed
                                        </button>
                                        {[0.5, 0.75, 1, 1.25, 1.5, 1.75, 2].map(speed => (
                                            <button key={speed} onClick={() => { engineSetSpeed(speed); setShowSettings(false); resetControlsTimer(); }} className="w-full text-left px-4 py-2.5 text-sm hover:bg-white/10 rounded flex items-center justify-between">
                                                <span>{speed === 1 ? 'Normal' : `${speed}x`}</span>
                                                {playbackSpeed === speed && <i className="fa-solid fa-check text-blue-500"></i>}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    <button onClick={() => setPlayerMode(m => m === 'landscape' ? 'normal' : 'landscape')} className={`hover:text-blue-500 p-2 ${playerMode === 'landscape' ? 'text-blue-500' : ''}`}>
                        <i className="fa-solid fa-rotate text-base"></i>
                    </button>
                    <button onClick={() => setPlayerMode(m => m === 'fullscreen' ? 'normal' : 'fullscreen')} className={`hover:text-blue-500 p-2 -mr-2 ${playerMode === 'fullscreen' ? 'text-blue-500' : ''}`}>
                      <i className={`fa-solid ${playerMode === 'fullscreen' ? 'fa-compress' : 'fa-expand'} text-base`}></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // 🚀 LIVE DISCUSSION UI
        // ==========================================
        const DiscussionView = ({ onBack, user }) => {
            const [msg, setMsg] = useState('');
            const [showProfile, setShowProfile] = useState(null);
            const [chats, setChats] = useState(() => {
                const stored = localStorage.getItem('ataxy_discussion');
                if (stored) {
                    try { return JSON.parse(stored); } catch (err) { console.warn(err); }
                }
                return [
                    { id: 1, name: "Rahul Singh", tgId: "8472910", username: "rahul_s", text: "Bhai mole concept ka DPP 2 ka answer key hai kisi ke paas?", time: "10:12 AM" },
                    { id: 2, name: "ATAXY Mentor", admin: true, tgId: "00001", username: "ataxy_admin", text: "Focus on your studies guys. Next live class starts at 2 PM.", time: "10:20 AM" }
                ];
            });

            useEffect(() => {
                const syncChats = (event) => {
                    if (event.key === 'ataxy_discussion' && event.newValue) {
                        try { setChats(JSON.parse(event.newValue)); } catch (err) { console.warn(err); }
                    }
                };
                window.addEventListener('storage', syncChats);
                return () => window.removeEventListener('storage', syncChats);
            }, []);

            useEffect(() => {
                localStorage.setItem('ataxy_discussion', JSON.stringify(chats));
            }, [chats]);

            const sendMsg = (e) => {
                e.preventDefault();
                if (!msg.trim()) return;
                const message = { id: Date.now(), name: user.first_name, tgId: user.id || "00000", username: user.username || "student", text: msg, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
                setChats(prev => [...prev, message]);
                setMsg('');
            };

            return (
                <div className="fixed inset-0 bg-gray-50 dark:bg-gray-950 z-[9999] flex flex-col animate-in slide-in-from-bottom">
                    <div className="bg-white dark:bg-gray-900 px-4 py-3 flex items-center gap-3 shadow-sm border-b border-gray-200 dark:border-gray-800 pt-[60px]">
                        <button onClick={onBack} className="w-10 h-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-900 dark:text-white"><i className="fa-solid fa-arrow-left text-lg"></i></button>
                        <div>
                            <h2 className="font-bold text-gray-900 dark:text-white leading-tight">Global Discussion</h2>
                            <p className="text-[10px] text-green-500 font-bold tracking-wide">1,240 Online</p>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {chats.map((c, i) => (
                            <div key={i} className={`flex flex-col ${c.name === user.first_name ? 'items-end' : 'items-start'}`}>
                                <span onClick={() => setShowProfile(c)} className="text-[10px] text-gray-500 dark:text-gray-400 mb-1 ml-1 font-bold flex items-center gap-1 cursor-pointer hover:underline">
                                    {c.name} {c.admin && <i className="fa-solid fa-circle-check text-blue-500"></i>}
                                </span>
                                <div className={`max-w-[80%] p-3 rounded-2xl shadow-sm ${c.name === user.first_name ? 'bg-blue-600 text-white rounded-tr-sm' : c.admin ? 'bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 text-gray-800 dark:text-gray-200 rounded-tl-sm' : 'bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-800 dark:text-gray-200 rounded-tl-sm'}`}>
                                    <p className="text-sm">{c.text}</p>
                                    <div className={`text-[9px] mt-1 text-right ${c.name === user.first_name ? 'text-blue-200' : 'text-gray-400 dark:text-gray-500'}`}>{c.time}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <form onSubmit={sendMsg} className="bg-white dark:bg-gray-900 p-3 border-t border-gray-200 dark:border-gray-800 flex gap-2 pb-6">
                        <input value={msg} onChange={e => setMsg(e.target.value)} type="text" placeholder="Type a message..." className="flex-1 bg-gray-100 dark:bg-gray-800 border-none rounded-full px-4 py-2.5 text-sm focus:ring-0 focus:outline-none text-gray-900 dark:text-white" />
                        <button type="submit" className="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 shadow-md"><i className="fa-solid fa-paper-plane text-sm"></i></button>
                    </form>

                    {showProfile && (
                        <div className="fixed inset-0 bg-black/50 z-[99999] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowProfile(null)}>
                            <div className="bg-white dark:bg-gray-900 rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl border border-gray-200 dark:border-gray-800" onClick={e=>e.stopPropagation()}>
                                <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-black mb-4 uppercase shadow-inner">{showProfile.name[0]}</div>
                                <h3 className="text-xl font-black text-gray-900 dark:text-white flex items-center justify-center gap-1">
                                    {showProfile.name} {showProfile.admin && <i className="fa-solid fa-circle-check text-blue-500 text-sm"></i>}
                                </h3>
                                <p className="text-blue-500 font-bold text-sm mt-1">@{showProfile.username}</p>
                                <p className="text-gray-500 dark:text-gray-400 text-xs mt-2 bg-gray-100 dark:bg-gray-800 py-1 px-3 rounded-lg inline-block">UID: {showProfile.tgId}</p>
                                <button onClick={() => setShowProfile(null)} className="mt-6 w-full py-3 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-900 dark:text-white font-bold rounded-xl transition-colors">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        // ==========================================
        // 🚀 MAIN APPLICATION
        // ==========================================
        function App() {
          const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('ataxy_theme') === 'dark');
          useEffect(() => {
              if (isDarkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('ataxy_theme', 'dark'); } 
              else { document.documentElement.classList.remove('dark'); localStorage.setItem('ataxy_theme', 'light'); }
          }, [isDarkMode]);

          const [isVerified, setIsVerified] = useState(localStorage.getItem('ataxy_verified') === 'true');
          const [tgUser, setTgUser] = useState(window.Telegram?.WebApp?.initDataUnsafe?.user || { first_name: "Student", id: "1001" });
          
          const [currentTab, setCurrentTab] = useState('home');
          const [activeBatch, setActiveBatch] = useState(null);
          const [activeSubBatch, setActiveSubBatch] = useState(null);
          const [activeSubject, setActiveSubject] = useState(null);
          const [activeChapter, setActiveChapter] = useState(null);
          const [activeVideo, setActiveVideo] = useState(null);
          
          // Practice State
          const [activePlatform, setActivePlatform] = useState(null);
          const [activePracticeSubject, setActivePracticeSubject] = useState(null);
          const [activePracticeChapter, setActivePracticeChapter] = useState(null);
          const [practiceAttempts, setPracticeAttempts] = useState(() => {
              const stored = localStorage.getItem('ataxy_practice_attempts');
              return stored ? JSON.parse(stored) : {};
          });
          const [watchedLectureIds, setWatchedLectureIds] = useState(() => {
              const stored = localStorage.getItem('ataxy_watched_lectures');
              return stored ? JSON.parse(stored) : [];
          });
          const [showPerformance, setShowPerformance] = useState(false);
          const [performanceTab, setPerformanceTab] = useState('batch');
          
          const [activePdf, setActivePdf] = useState(null); 
          const [showChat, setShowChat] = useState(false);

          // Real Calendar Target State
          const getTodayStr = () => new Date().toISOString().split('T')[0];
          const [selectedDate, setSelectedDate] = useState(getTodayStr());
          const [targetsData, setTargetsData] = useState(() => JSON.parse(localStorage.getItem('ataxy_targets')) || {});
          const [newTarget, setNewTarget] = useState("");

          useEffect(() => { localStorage.setItem('ataxy_targets', JSON.stringify(targetsData)); }, [targetsData]);

          useEffect(() => {
              if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
          }, []);

          useEffect(() => {
              localStorage.setItem('ataxy_practice_attempts', JSON.stringify(practiceAttempts));
          }, [practiceAttempts]);

          useEffect(() => {
              localStorage.setItem('ataxy_watched_lectures', JSON.stringify(watchedLectureIds));
          }, [watchedLectureIds]);

          useEffect(() => {
              if (activeVideo && activeVideo.id && !watchedLectureIds.includes(activeVideo.id)) {
                  setWatchedLectureIds(prev => [...prev, activeVideo.id]);
              }
          }, [activeVideo]);

          const handleBack = () => {
            if (activeVideo) setActiveVideo(null);
            else if (activeChapter) setActiveChapter(null);
            else if (activeSubject) setActiveSubject(null);
            else if (activeSubBatch) setActiveSubBatch(null);
            else if (activeBatch) { setActiveBatch(null); setCurrentTab('batches'); }
            
            else if (activePracticeChapter) setActivePracticeChapter(null);
            else if (activePracticeSubject) setActivePracticeSubject(null);
            else if (activePlatform) setActivePlatform(null);
          };

          const findPracticeQuestionById = (qId) => {
              for (const subject of ALIEN_QBANK) {
                  for (const chapter of subject.chapters) {
                      for (const topic of chapter.topics) {
                          const question = topic.questions.find(q => q.id === qId);
                          if (question) {
                              return {
                                  ...question,
                                  topicId: topic.id,
                                  topicName: topic.name,
                                  chapterId: chapter.id,
                                  chapterName: chapter.name,
                                  subjectId: subject.subjectId,
                                  subjectName: subject.subjectName
                              };
                          }
                      }
                  }
              }
              return null;
          };

          const getAllPracticeActivities = () => {
              return Object.entries(practiceAttempts)
                .map(([qId, attempt]) => {
                    const question = findPracticeQuestionById(qId);
                    if (!question) return null;
                    return {
                        q: question,
                        optionIdx: attempt.optionIdx,
                        time: attempt.time,
                        isCorrect: attempt.optionIdx === question.correct
                    };
                })
                .filter(Boolean)
                .sort((a, b) => b.time - a.time);
          };

          const handlePracticeAttempt = (chapterId, qId, optionIdx) => {
              setPracticeAttempts(prev => ({ ...prev, [qId]: { chapterId, optionIdx, time: Date.now() } }));
          };

          const handlePracticeClear = (qId) => {
              setPracticeAttempts(prev => {
                  const next = { ...prev };
                  delete next[qId];
                  return next;
              });
          };

          if (!isVerified) return <Gatekeeper onVerify={(user) => { setTgUser(user); setIsVerified(true); }} />;

          // --- 📚 BATCH DETAIL VIEWS ---
          const renderVideoPlayerView = () => {
            if (!activeVideo) return null;
            return (
              <div className="bg-white dark:bg-gray-950 min-h-screen animate-in slide-in-from-bottom duration-300 pb-10">
                <UniversalPlayer src={activeVideo.url} poster={`https://picsum.photos/seed/${activeVideo.id}/800/450`} title={activeVideo.title} onBack={handleBack} user={tgUser} />
                <div className="p-5 pt-5">
                  <h1 className="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-2">{activeVideo.title}</h1>
                  <div className="flex gap-3 mb-5">
                      <button onClick={() => setActivePdf("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf")} className="flex-1 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 text-red-600 dark:text-red-400 font-bold py-2.5 rounded-xl border border-red-100 dark:border-red-900/50 flex items-center justify-center gap-2 text-sm transition-colors shadow-sm">
                          <i className="fa-solid fa-file-pdf"></i> Class Notes
                      </button>
                      <button onClick={() => setActivePdf("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf")} className="flex-1 bg-indigo-50 dark:bg-indigo-900/20 hover:bg-indigo-100 dark:hover:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 font-bold py-2.5 rounded-xl border border-indigo-100 dark:border-indigo-900/50 flex items-center justify-center gap-2 text-sm transition-colors shadow-sm">
                          <i className="fa-solid fa-pen-to-square"></i> Solve DPP
                      </button>
                  </div>
                  <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 text-sm uppercase tracking-wider">Study Materials</h3>
                  <div className="space-y-3">
                    <div onClick={() => setActivePdf("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf")} className="flex items-center justify-between p-3.5 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl cursor-pointer">
                      <div className="flex items-center gap-3.5">
                          <div className="w-10 h-10 rounded-lg bg-rose-50 dark:bg-rose-900/30 text-rose-500 flex items-center justify-center"><i className="fa-solid fa-file-lines text-xl"></i></div>
                          <div><span className="font-bold text-sm text-gray-800 dark:text-gray-200 block">Class Notes</span><span className="text-[10px] text-gray-500">PDF</span></div>
                      </div>
                      <button className="w-8 h-8 rounded-full bg-gray-50 dark:bg-gray-800 text-blue-600 dark:text-blue-400 flex items-center justify-center border border-gray-200 dark:border-gray-700"><i className="fa-solid fa-download text-xs"></i></button>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderChapterDetailView = () => { 
            const chapterVideos = VIDEOS.filter(v => v.chapterId === activeChapter.id); 
            return ( 
              <div className="pb-24 animate-in slide-in-from-right bg-gray-50 dark:bg-gray-950 min-h-screen"> 
                <div className="bg-white dark:bg-gray-900 pt-[60px] px-4 pb-4 shadow-sm sticky top-0 z-10 flex items-center gap-3 border-b border-gray-200 dark:border-gray-800"> 
                  <button onClick={handleBack} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800"><i className="fa-solid fa-arrow-left text-lg text-gray-800 dark:text-gray-200"></i></button> 
                  <h2 className="font-bold text-lg text-gray-900 dark:text-white line-clamp-1">{activeChapter.name}</h2> 
                </div> 
                <div className="px-4 mt-5"> 
                  <h3 className="font-bold text-gray-500 uppercase text-xs tracking-wider mb-3 px-1">All Lectures</h3>
                  {chapterVideos.map((vid) => ( 
                    <div key={vid.id} className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-3.5 shadow-sm flex flex-col mb-4"> 
                      <div className="flex gap-4">
                          <div onClick={() => setActiveVideo(vid)} className="w-36 h-24 bg-gray-900 rounded-xl relative flex items-center justify-center shrink-0 cursor-pointer overflow-hidden group">
                              <img src={`https://picsum.photos/seed/${vid.id}/400/200`} className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-500" />
                              <i className="fa-solid fa-circle-play text-white text-3xl z-10 opacity-90 group-hover:text-blue-500 transition-colors"></i>
                              <span className="absolute bottom-1.5 right-1.5 bg-black/80 text-white text-[10px] font-bold px-1.5 py-0.5 rounded shadow">{vid.duration}</span>
                          </div>
                          <div className="flex flex-col justify-between flex-1 py-0.5">
                              <div>
                                  <h3 onClick={() => setActiveVideo(vid)} className="font-bold text-[13px] text-gray-900 dark:text-white line-clamp-2 cursor-pointer leading-snug">{vid.title}</h3>
                                  <div className="text-[10px] text-gray-500 mt-1 flex items-center gap-1"><i className="fa-regular fa-calendar"></i> {vid.date}</div>
                              </div>
                          </div>
                      </div>
                    </div> 
                  ))} 
                </div> 
              </div> 
            ); 
          };

          const renderSubjectDetailView = () => { 
            const subjectChapters = CHAPTERS.filter(c => c.subjectId === activeSubject.id); 
            return ( <div className="pb-24 animate-in slide-in-from-right"><div className="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 pt-[60px] px-4 pb-4 shadow-sm sticky top-0 z-10"><div className="flex items-center gap-3"><button onClick={handleBack} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800"><i className="fa-solid fa-arrow-left text-lg text-gray-800 dark:text-gray-200"></i></button><h2 className="font-bold text-xl text-gray-900 dark:text-white flex items-center gap-2">{activeSubject.icon} {activeSubject.name}</h2></div></div><div className="px-4 mt-5 space-y-3">{subjectChapters.map(chapter => ( <div key={chapter.id} onClick={() => setActiveChapter(chapter)} className="bg-white dark:bg-gray-900 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center justify-between cursor-pointer hover:border-blue-200 dark:hover:border-blue-900 transition-colors"><div className="flex items-center gap-4"><div className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 h-12 w-12 rounded-xl flex items-center justify-center border border-blue-100 dark:border-blue-900"><i className="fa-regular fa-folder-open text-xl"></i></div><div><h3 className="font-bold text-gray-900 dark:text-white text-sm leading-snug">{chapter.name}</h3><p className="text-xs text-gray-500 mt-1 flex items-center gap-1"><i className="fa-solid fa-play text-[8px]"></i> {chapter.count}</p></div></div><div className="w-8 h-8 rounded-full bg-gray-50 dark:bg-gray-800 flex items-center justify-center text-gray-400 shrink-0"><i className="fa-solid fa-chevron-right"></i></div></div> ))}</div></div> ); 
          };

          const renderBatchDetailView = () => { 
            const isSubBatchMode = activeBatch.subBatches && !activeSubBatch; 
            const currentHeader = activeSubBatch || activeBatch; 
            return ( <div className="pb-24 animate-in slide-in-from-right"><div className={`${currentHeader.color || activeBatch.color} pt-[60px] pb-10 px-5 text-white shadow-md rounded-b-[2.5rem]`}><div className="flex items-center gap-3 mb-6"><button onClick={handleBack} className="bg-white/20 hover:bg-white/30 transition-colors w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm"><i className="fa-solid fa-arrow-left"></i></button><h2 className="font-bold text-lg line-clamp-1">{currentHeader.name}</h2></div><h1 className="text-3xl font-black mb-1">{isSubBatchMode ? 'Select Section' : 'Subjects'}</h1><p className="text-white/80 text-sm">Choose a subject to view lectures</p></div><div className="px-4 mt-6 space-y-3">{isSubBatchMode ? ( activeBatch.subBatches.map(sub => ( <div key={sub.id} onClick={() => setActiveSubBatch(sub)} className="bg-white dark:bg-gray-900 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center justify-between cursor-pointer"><div className="flex items-center gap-4"><div className={`h-14 w-14 rounded-xl flex items-center justify-center text-white shadow-inner ${sub.color}`}><i className="fa-solid fa-layer-group text-2xl"></i></div><div><h3 className="font-bold text-gray-900 dark:text-white text-lg">{sub.name}</h3><p className="text-xs text-gray-500 mt-0.5">{sub.target}</p></div></div><div className="w-8 h-8 rounded-full bg-gray-50 dark:bg-gray-800 flex items-center justify-center text-gray-400"><i className="fa-solid fa-chevron-right"></i></div></div> )) ) : ( SUBJECTS.map(sub => ( <div key={sub.id} onClick={() => setActiveSubject(sub)} className="bg-white dark:bg-gray-900 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center justify-between cursor-pointer"><div className="flex items-center gap-4"><div className="text-3xl bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-900/50 h-14 w-14 rounded-xl flex items-center justify-center shadow-sm">{sub.icon}</div><div><h3 className="font-bold text-gray-900 dark:text-white text-lg">{sub.name}</h3><p className="text-xs text-gray-500 mt-0.5">{sub.chapters} Chapters available</p></div></div><div className="w-8 h-8 rounded-full bg-gray-50 dark:bg-gray-800 flex items-center justify-center text-gray-400"><i className="fa-solid fa-chevron-right"></i></div></div> )) )}</div></div> ); 
          };

          const renderBatchesView = () => ( <div className="pb-24 pt-[60px] px-4 animate-in fade-in"><h2 className="text-2xl font-black text-gray-900 dark:text-white mb-1 px-1">My Study Batches</h2><p className="text-gray-500 dark:text-gray-400 text-sm mb-6 px-1">Select a batch to access lectures and notes</p><div className="space-y-4">{BATCHES.map(batch => ( <div key={batch.id} onClick={() => setActiveBatch(batch)} className="bg-white dark:bg-gray-900 rounded-3xl shadow-sm border border-gray-200 dark:border-gray-800 overflow-hidden cursor-pointer"><div className={`${batch.color} h-2.5 w-full`}></div><div className="p-5"><div className="flex justify-between items-start mb-3"><span className="bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-900/50 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">{batch.price}</span><span className="text-xs text-gray-500 font-medium flex items-center gap-1.5"><i className="fa-solid fa-users text-[10px]"></i> {batch.students}</span></div><h3 className="text-xl font-bold text-gray-900 dark:text-white">{batch.name}</h3><p className="text-gray-500 text-sm mt-1 mb-5">{batch.target}</p><button className="w-full bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-blue-600 dark:text-blue-400 font-bold py-3 rounded-xl border border-gray-200 dark:border-gray-700 flex items-center justify-center gap-2 transition-colors">Go to Batch <i className="fa-solid fa-arrow-right text-xs"></i></button></div></div> ))}</div></div> );
          
          const renderHomeView = () => {
             const currentTargets = targetsData[selectedDate] || [];
             
             const toggleTarget = (id) => {
                 const updated = currentTargets.map(t => t.id === id ? {...t, done: !t.done} : t);
                 setTargetsData({...targetsData, [selectedDate]: updated});
             };
             const addTarget = (e) => { 
                 e.preventDefault(); 
                 if(!newTarget.trim()) return; 
                 const updated = [...currentTargets, { id: Date.now(), text: newTarget, done: false }];
                 setTargetsData({...targetsData, [selectedDate]: updated});
                 setNewTarget(""); 
             };

             return ( 
             <div className="pb-24 pt-[60px] animate-in fade-in">
                 <div className="bg-blue-600 p-6 rounded-3xl shadow-lg text-white mx-4 mb-6 relative overflow-hidden">
                     <div className="relative z-10 flex justify-between items-center">
                         <div>
                             <h2 className="text-2xl font-bold">Hello, {tgUser.first_name}! 👋</h2>
                             <p className="text-blue-100 text-sm mt-1">Ready to crack your goals?</p>
                         </div>
                         <div className="h-12 w-12 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold text-xl shadow-inner uppercase">{tgUser.first_name[0]}</div>
                     </div>
                 </div>
                 
                 <div className="px-5 space-y-6">
                     {/* 📅 INTERACTIVE CALENDAR TARGETS */}
                     <div className="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
                         <div className="flex justify-between items-center mb-4">
                             <h3 className="font-bold text-gray-800 dark:text-gray-200 text-lg flex items-center gap-2">
                                 <i className="fa-regular fa-calendar-check text-blue-500"></i> Daily Targets
                             </h3>
                             <div className="relative">
                                 <input 
                                     type="date" 
                                     min="2026-01-01" max="2126-12-31" 
                                     value={selectedDate} 
                                     onChange={(e) => setSelectedDate(e.target.value)}
                                     className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-bold px-3 py-1.5 rounded outline-none border border-blue-100 dark:border-blue-800 cursor-pointer"
                                 />
                             </div>
                         </div>
                         
                         <div className="space-y-2 mb-4 min-h-[60px]">
                             {currentTargets.length === 0 ? (
                                 <p className="text-xs text-gray-400 italic text-center py-2">No targets set for this date. Add one below!</p>
                             ) : currentTargets.map(t => (
                                 <div key={t.id} onClick={() => toggleTarget(t.id)} className={`flex items-center gap-3 p-2 rounded-lg cursor-pointer transition-colors ${t.done ? 'bg-gray-50 dark:bg-gray-800 opacity-60' : 'hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                     <div className={`w-5 h-5 rounded border flex items-center justify-center ${t.done ? 'bg-green-500 border-green-500' : 'border-gray-300 dark:border-gray-600'}`}>
                                         {t.done && <i className="fa-solid fa-check text-white text-[10px]"></i>}
                                     </div>
                                     <span className={`text-sm font-medium ${t.done ? 'line-through text-gray-500' : 'text-gray-800 dark:text-gray-200'}`}>{t.text}</span>
                                 </div>
                             ))}
                         </div>
                         <form onSubmit={addTarget} className="flex gap-2 border-t border-gray-100 dark:border-gray-800 pt-4 mt-2">
                             <input type="text" value={newTarget} onChange={(e) => setNewTarget(e.target.value)} placeholder={`Add goal for ${selectedDate}...`} className="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 dark:text-white" />
                             <button type="submit" className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-md"><i className="fa-solid fa-plus"></i></button>
                         </form>
                     </div>
                 </div>
             </div> 
             );
          };

          // --- 🆕 ADVANCED NEETPREP PRACTICE HUB ---
const PracticeTestView = ({ chapter, attempts, onAttempt, onClear }) => {
              const [selectedTopic, setSelectedTopic] = useState(null); 
              const [showPalette, setShowPalette] = useState(false);

              // Flatten questions & assign global index
              const allQuestions = useMemo(() => {
                  let flat = [];
                  let gIdx = 1;
                  chapter.topics.forEach(t => {
                      t.questions.forEach(q => { flat.push({...q, globalIndex: gIdx++, topicId: t.id, topicName: t.name}); });
                  });
                  return flat;
              }, [chapter]);

              const displayedQuestions = selectedTopic ? allQuestions.filter(q => q.topicId === selectedTopic) : allQuestions;
              const chapterAttempts = allQuestions.filter(q => attempts[q.id] !== undefined);
              const correctCount = chapterAttempts.filter(q => attempts[q.id].optionIdx === q.correct).length;
              const accuracy = chapterAttempts.length ? Math.round((correctCount / chapterAttempts.length) * 100) : 0;

              const handleAttempt = (qId, optionIdx) => onAttempt(chapter.id, qId, optionIdx);
              const handleClear = (qId) => onClear(qId);

              const scrollToQuestion = (id) => {
                  setShowPalette(false);
                  setTimeout(() => { document.getElementById(`question-card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
              };

              return (
                  <div className="pb-24 pt-[60px] animate-in slide-in-from-right relative min-h-screen">
                      {/* Header */}
                      <div className="px-4 pb-3 flex items-center gap-3 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-950 sticky top-0 z-20 pt-2">
                          <button onClick={() => setActivePracticeChapter(null)} className="w-10 h-10 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-900 dark:text-white"><i className="fa-solid fa-arrow-left"></i></button>
                          <h2 className="text-lg font-bold text-gray-900 dark:text-white leading-tight line-clamp-1">{chapter.name}</h2>
                      </div>

                      {chapterAttempts.length > 0 ? (
                          <div className="px-4 mt-4">
                              <div className="bg-blue-50 dark:bg-blue-900/20 rounded-3xl p-4 border border-blue-100 dark:border-blue-800 shadow-sm">
                                  <div className="flex items-center justify-between gap-4 mb-3">
                                      <div>
                                          <p className="text-xs uppercase tracking-[0.25em] text-blue-600 dark:text-blue-300 font-bold">Chapter Performance</p>
                                          <h3 className="text-lg font-bold text-gray-900 dark:text-white">{chapterAttempts.length} attempted</h3>
                                      </div>
                                      <div className="text-right text-sm text-gray-500 dark:text-gray-300">
                                          <div>{correctCount} correct</div>
                                          <div>{chapterAttempts.length - correctCount} wrong</div>
                                      </div>
                                  </div>
                                  <div className="text-sm text-gray-600 dark:text-gray-300">Accuracy: <span className="font-bold text-blue-700 dark:text-blue-300">{accuracy}%</span></div>
                              </div>
                          </div>
                      ) : (
                          <div className="px-4 mt-4">
                              <div className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-3xl p-4 text-sm text-gray-500 dark:text-gray-400 shadow-sm">
                                  No attempts yet in this chapter. Start answering questions to see your performance summary here.
                              </div>
                          </div>
                      )}
                       
                      {/* Topic Filter Pills */}
                      <div className="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 p-3 sticky top-[60px] z-10 shadow-sm overflow-x-auto whitespace-nowrap flex gap-2 no-scrollbar">
                          <button onClick={() => setSelectedTopic(null)} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors ${selectedTopic === null ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-700'}`}>All Topics</button>
                          {chapter.topics.map(t => (
                              <button key={t.id} onClick={() => setSelectedTopic(t.id)} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors ${selectedTopic === t.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-700'}`}>{t.name}</button>
                          ))}
                      </div>

                      <div className="px-4 mt-5 max-w-2xl mx-auto">
                          {displayedQuestions.map((q) => (
                              <QuestionCard key={q.id} q={q} attemptIdx={attempts[q.id]?.optionIdx} onAttempt={handleAttempt} onClear={handleClear} />
                          ))}
                      </div>

                      {/* Question Grid Palette Button (FAB) */}
                      <button onClick={() => setShowPalette(true)} className="fixed bottom-24 right-5 w-14 h-14 bg-blue-600 text-white rounded-full shadow-[0_4px_20px_rgba(37,99,235,0.5)] flex items-center justify-center text-xl z-30 hover:scale-110 transition-transform">
                          <i className="fa-solid fa-table-cells"></i>
                      </button>

                      {/* Question Palette Modal */}
                      {showPalette && (
                          <div className="fixed inset-0 bg-black/60 z-[99999] flex flex-col justify-end animate-in fade-in" onClick={() => setShowPalette(false)}>
                              <div className="bg-white dark:bg-gray-900 rounded-t-3xl p-5 max-h-[70vh] overflow-y-auto w-full max-w-md mx-auto" onClick={e=>e.stopPropagation()}>
                                  <div className="flex justify-between items-center mb-5">
                                      <h3 className="font-bold text-gray-900 dark:text-white">Jump to Question</h3>
                                      <button onClick={() => setShowPalette(false)} className="text-gray-500 w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full"><i className="fa-solid fa-xmark"></i></button>
                                  </div>
                                  <div className="grid grid-cols-5 gap-3">
                                      {allQuestions.map(q => {
                                          const isAns = attempts[q.id] !== undefined;
                                          const isCorrect = isAns && attempts[q.id].optionIdx === q.correct;
                                          let bgClass = "bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-transparent";
                                          if (isAns) bgClass = isCorrect ? "bg-green-500 text-white border-green-600" : "bg-red-500 text-white border-red-600";
                                          return (
                                              <button key={q.id} onClick={() => scrollToQuestion(q.id)} className={`w-full aspect-square rounded-xl flex items-center justify-center font-bold text-sm border-2 ${bgClass}`}>
                                                  {q.globalIndex}
                                              </button>
                                          )
                                      })}
                                  </div>
                              </div>
                          </div>
                      )}
                  </div>
              );
          }

          const renderQuestionsView = () => {
             if (activePracticeChapter) return <PracticeTestView chapter={activePracticeChapter} attempts={practiceAttempts} onAttempt={handlePracticeAttempt} onClear={handlePracticeClear} />;

             const practiceActivity = getAllPracticeActivities();
             const totalPracticeAttempts = practiceActivity.length;
             const totalCorrectPractice = practiceActivity.filter(item => item.isCorrect).length;
             const totalIncorrectPractice = totalPracticeAttempts - totalCorrectPractice;
             const practiceAccuracy = totalPracticeAttempts ? Math.round((totalCorrectPractice / totalPracticeAttempts) * 100) : 0;

             return (
                 <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                     <div className="flex justify-between items-center mb-6">
                         <h2 className="text-2xl font-black text-gray-900 dark:text-white">Practice Hub</h2>
                         <span className="bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 text-[10px] font-bold px-2 py-1 rounded-lg uppercase tracking-wider shadow-sm border border-blue-200 dark:border-blue-800">Alien Platform</span>
                     </div>
                     
                     {/* Subject Filter */}
                     <div className="flex gap-2 overflow-x-auto no-scrollbar mb-5">
                         {ALIEN_QBANK.map(sub => (
                             <button key={sub.subjectId} onClick={() => setActivePracticeSubject(sub)} className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-colors border ${activePracticeSubject?.subjectId === sub.subjectId ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 border-gray-200 dark:border-gray-800'}`}>
                                 {sub.icon} {sub.subjectName}
                             </button>
                         ))}
                     </div>

                     <div className="bg-white dark:bg-gray-900 rounded-3xl border border-gray-200 dark:border-gray-800 p-4 mb-5 shadow-sm">
                         <div className="flex items-center justify-between mb-3">
                             <div>
                                 <p className="text-xs uppercase tracking-[0.3em] text-gray-400 dark:text-gray-500 font-bold">Practice Activity</p>
                                 <h3 className="text-lg font-bold text-gray-900 dark:text-white">{totalPracticeAttempts} attempted questions</h3>
                             </div>
                             <div className="text-right text-sm text-gray-500 dark:text-gray-400">
                                 <div>Correct: <span className="font-bold text-green-600 dark:text-green-400">{totalCorrectPractice}</span></div>
                                 <div>Accuracy: <span className="font-bold text-blue-600 dark:text-blue-300">{practiceAccuracy}%</span></div>
                             </div>
                         </div>
                         {totalPracticeAttempts ? (
                             <div className="space-y-2">
                                 {practiceActivity.slice(0, 5).map((item, idx) => (
                                     <div key={idx} className="rounded-2xl border border-gray-100 dark:border-gray-800 p-3 bg-gray-50 dark:bg-gray-900">
                                         <div className="flex items-center justify-between gap-2 text-xs text-gray-500 dark:text-gray-400 mb-1">
                                             <span>{item.q.subjectName} • {item.q.chapterName}</span>
                                             <span>{new Date(item.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
