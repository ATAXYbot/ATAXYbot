        // 🚀 THE UNIFIED UNIVERSAL PLAYER (Robust Touch & Layout)
        // ==========================================
        const UniversalPlayer = ({ src, poster, title, onBack }) => {
          const isYouTube = src && (src.includes("youtu.be") || src.includes("youtube.com"));
          const ytId = isYouTube ? src.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/)?.[2] : null;

          const videoRef = useRef(null);
          const ytPlayerDivRef = useRef(null);
          const ytPlayerRef = useRef(null);
          const ytIntervalRef = useRef(null);
          
          const [isPlaying, setIsPlaying] = useState(false);
          const [isBuffering, setIsBuffering] = useState(false);
          const [progress, setProgress] = useState(0);
          const [currentTime, setCurrentTime] = useState("00:00");
          const [duration, setDuration] = useState("00:00");
          
          const [showControls, setShowControls] = useState(true);
          const [playerMode, setPlayerMode] = useState('normal'); 
          
          const [showSettings, setShowSettings] = useState(false);
          const [settingMenu, setSettingMenu] = useState('main'); 
          const [playbackSpeed, setPlaybackSpeed] = useState(1);
          const [videoQuality, setVideoQuality] = useState('Auto');
          const [ccEnabled, setCcEnabled] = useState(false);
          
          const [seekFeedback, setSeekFeedback] = useState(null); 
          const [isSpeeding, setIsSpeeding] = useState(false);
          
          const controlsTimerRef = useRef(null);
          const tapTimerRef = useRef(null);
          const longPressTimerRef = useRef(null);
          
          const lastTapRef = useRef({ time: 0, x: 0, y: 0 });
          const wasSpeeding = useRef(false);

          const formatTime = (sec) => {
            if (isNaN(sec) || sec === Infinity) return "00:00";
            const m = Math.floor((sec % 3600) / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
          };

          const enginePlay = () => isYouTube ? ytPlayerRef.current?.playVideo() : videoRef.current?.play();
          const enginePause = () => isYouTube ? ytPlayerRef.current?.pauseVideo() : videoRef.current?.pause();
          const engineGetTime = () => isYouTube ? (ytPlayerRef.current?.getCurrentTime() || 0) : (videoRef.current?.currentTime || 0);
          const engineGetDuration = () => isYouTube ? (ytPlayerRef.current?.getDuration() || 0) : (videoRef.current?.duration || 0);
          const engineSeek = (sec) => {
              if (isYouTube && ytPlayerRef.current) ytPlayerRef.current.seekTo(sec, true);
              else if (videoRef.current) videoRef.current.currentTime = sec;
          };
          const engineSetSpeed = (rate) => {
              if (isYouTube && ytPlayerRef.current) ytPlayerRef.current.setPlaybackRate(rate);
              else if (videoRef.current) videoRef.current.playbackRate = rate;
              setPlaybackSpeed(rate);
          };

          useEffect(() => {
              if (!isYouTube || !src) return;

              const initYT = () => {
                  if (ytPlayerRef.current) return; 
                  ytPlayerRef.current = new window.YT.Player(ytPlayerDivRef.current, {
                      videoId: ytId,
                      playerVars: { controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0, playsinline: 1, showinfo: 0, iv_load_policy: 3, cc_load_policy: 0 },
                      events: {
                          onReady: (e) => {
                              setDuration(formatTime(e.target.getDuration()));
                              ytIntervalRef.current = setInterval(() => {
                                  if (ytPlayerRef.current && ytPlayerRef.current.getCurrentTime) {
                                      const cur = ytPlayerRef.current.getCurrentTime();
                                      const tot = ytPlayerRef.current.getDuration();
                                      if (tot > 0) setProgress((cur / tot) * 100);
                                      setCurrentTime(formatTime(cur));
                                  }
                              }, 500);
                          },
                          onStateChange: (e) => {
                              if (e.data === window.YT.PlayerState.PLAYING) {
                                  setIsPlaying(true); setIsBuffering(false);
                              } else if (e.data === window.YT.PlayerState.PAUSED) {
                                  setIsPlaying(false);
                              } else if (e.data === window.YT.PlayerState.BUFFERING) {
                                  setIsBuffering(true);
                              }
                          }
                      }
                  });
              };

              if (!window.YT) {
                  const tag = document.createElement('script');
                  tag.src = "https://www.youtube.com/iframe_api";
                  window.onYouTubeIframeAPIReady = initYT;
                  document.head.appendChild(tag);
              } else {
                  initYT();
              }

              return () => {
                  if (ytIntervalRef.current) clearInterval(ytIntervalRef.current);
                  if (ytPlayerRef.current && ytPlayerRef.current.destroy) ytPlayerRef.current.destroy();
              };
          }, [isYouTube, ytId, src]);

          const resetControlsTimer = () => {
             setShowControls(true);
             if (controlsTimerRef.current) clearTimeout(controlsTimerRef.current);
             controlsTimerRef.current = setTimeout(() => {
                 const isActuallyPlaying = isYouTube ? (ytPlayerRef.current?.getPlayerState() === 1) : (!videoRef.current?.paused);
                 if (isActuallyPlaying && !showSettings) setShowControls(false);
             }, 3000);
          };

          useEffect(() => { resetControlsTimer(); return () => clearTimeout(controlsTimerRef.current); }, [isPlaying, showSettings]);

          const togglePlay = (e) => {
            if(e) e.stopPropagation();
            if(!src) return;
            if (isPlaying) { enginePause(); setIsPlaying(false); } 
            else { enginePlay(); setIsPlaying(true); }
            resetControlsTimer();
          };

          const handleMP4TimeUpdate = () => {
            if (isYouTube || !videoRef.current) return;
            const current = videoRef.current.currentTime;
            const total = videoRef.current.duration;
            if (total > 0) setProgress((current / total) * 100);
            setCurrentTime(formatTime(current));
          };

          const handleSeekInteract = (e) => {
              e.stopPropagation();
              if(!src) return;
              const rect = e.currentTarget.getBoundingClientRect();
              const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
              let pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); 
              engineSeek(pos * engineGetDuration());
              setProgress(pos * 100);
              resetControlsTimer();
          };

          // --- 100% RELIABLE NATIVE GESTURES ---
          const handlePointerDown = (e) => {
             if(!src) return;
             wasSpeeding.current = false;
             lastTapRef.current.x = e.clientX || (e.touches && e.touches.length > 0 ? e.touches[0].clientX : 0);
             lastTapRef.current.y = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);

             longPressTimerRef.current = setTimeout(() => {
                 if (isPlaying) {
                     engineSetSpeed(2.0);
                     setIsSpeeding(true);
                     setShowControls(false); 
                     wasSpeeding.current = true;
                 }
             }, 400);
          };

          const handlePointerUp = (e) => {
             if (longPressTimerRef.current) clearTimeout(longPressTimerRef.current);
             
             if (isSpeeding) { 
                 engineSetSpeed(playbackSpeed); 
                 setIsSpeeding(false); 
                 return; 
             }
             
             if(!src || wasSpeeding.current) return;

             const now = Date.now();
             const x = e.clientX || (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientX : lastTapRef.current.x);
             const y = e.clientY || (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientY : lastTapRef.current.y);
             const isLeftHalf = playerMode === 'landscape' ? (y < window.innerHeight / 2) : (x < window.innerWidth / 2);

             if (now - lastTapRef.current.time < 300) {
                 clearTimeout(tapTimerRef.current); 
                 const curTime = engineGetTime();
                 engineSeek(isLeftHalf ? Math.max(0, curTime - 5) : Math.min(engineGetDuration(), curTime + 5));
                 setSeekFeedback(isLeftHalf ? 'left' : 'right');
                 setTimeout(() => setSeekFeedback(null), 500);
                 lastTapRef.current.time = 0; 
             } else {
                 lastTapRef.current.time = now;
                 tapTimerRef.current = setTimeout(() => {
                     setShowControls(prev => { const next = !prev; if (next) resetControlsTimer(); return next; });
                 }, 300);
             }
          };

          const handlePointerCancel = () => {
             if (longPressTimerRef.current) clearTimeout(longPressTimerRef.current);
             if (isSpeeding) { engineSetSpeed(playbackSpeed); setIsSpeeding(false); }
          };

          const getContainerClasses = () => {
              if (playerMode === 'landscape') return "fixed top-1/2 left-1/2 w-[100vh] h-[100vw] -translate-x-1/2 -translate-y-1/2 rotate-90 z-[99999] bg-black flex items-center justify-center overflow-hidden touch-none";
              if (playerMode === 'fullscreen') return "fixed inset-0 w-screen h-screen z-[99999] bg-black flex items-center justify-center overflow-hidden touch-none";
              return "w-full aspect-video bg-black relative flex items-center justify-center overflow-hidden touch-none";
          };

          return (
            <div className={getContainerClasses()}>
              {/* Media Engines */}
              {!src ? (
                 <div className="w-full h-full flex flex-col items-center justify-center bg-gray-900 text-white p-6 text-center z-0">
                     <i className="fa-solid fa-video-slash text-4xl mb-3 text-gray-500"></i>
                     <h2 className="font-bold">Lecture not uploaded yet</h2>
                     <p className="text-xs text-gray-400 mt-1">This class will be available shortly after the live session ends.</p>
                 </div>
              ) : isYouTube ? (
                 <div className="w-full h-full pointer-events-none yt-wrapper z-0"><div ref={ytPlayerDivRef} className="w-full h-full"></div></div>
              ) : (
                 <video 
                    ref={videoRef} src={src} poster={poster}
                    className="w-full h-full object-contain pointer-events-none z-0"
                    playsInline onTimeUpdate={handleMP4TimeUpdate}
                    onLoadedMetadata={() => setDuration(formatTime(videoRef.current.duration))}
                    onWaiting={() => setIsBuffering(true)} onPlaying={() => setIsBuffering(false)}
                 />
              )}

              {/* Gesture Overlay (Highest priority receiver) */}
              <div 
                className="absolute inset-0 z-10 cursor-pointer"
                onPointerDown={handlePointerDown} onPointerUp={handlePointerUp}
                onPointerLeave={handlePointerCancel} onPointerCancel={handlePointerCancel}
                onContextMenu={(e) => e.preventDefault()}
              ></div>

              {/* TOP BAR (Back Button always visible in normal mode so you never get stuck) */}
              <div className={`absolute top-0 left-0 right-0 p-3 pt-4 z-[60] transition-opacity duration-300 flex justify-between items-start pointer-events-none bg-gradient-to-b from-black/80 to-transparent pb-10 ${showControls || playerMode === 'normal' ? 'opacity-100' : 'opacity-0'} ${playerMode !== 'normal' ? 'pt-8 px-4' : ''}`}>
                 <div className="flex items-center gap-3">
                     <button onPointerDown={(e) => { e.stopPropagation(); onBack(); }} className="w-10 h-10 bg-black/40 text-white rounded-full flex items-center justify-center pointer-events-auto hover:bg-red-600 transition-colors backdrop-blur-sm shadow-md">
                         <i className="fa-solid fa-arrow-left"></i>
                     </button>
                     <h2 className="text-white font-semibold text-sm line-clamp-1 drop-shadow-md max-w-[200px]">{title}</h2>
                 </div>
                 <div className="flex items-center gap-4 pointer-events-auto pr-2">
                     <button onClick={() => setCcEnabled(!ccEnabled)} className={`transition-colors drop-shadow-md ${ccEnabled ? 'text-white' : 'text-white/50 hover:text-white'}`}>
                         <i className="fa-regular fa-closed-captioning text-xl"></i>
                     </button>
                     <span className="text-white/80 font-black italic tracking-wider text-xs drop-shadow-md">ATAXY</span>
                 </div>
              </div>

              {/* 2x Speed Indicator */}
              {isSpeeding && (
                  <div className="absolute top-16 left-0 right-0 flex justify-center z-40 pointer-events-none animate-in slide-in-from-top-2">
                      <div className="bg-black/80 text-white text-xs font-bold px-4 py-2 rounded-full flex items-center gap-2 shadow-lg"><span>Fast forwarding at 2x</span><i className="fa-solid fa-forward"></i></div>
                  </div>
              )}

              {/* Double Tap Animations */}
              {seekFeedback === 'left' && <div className="absolute left-10 top-1/2 -translate-y-1/2 bg-black/50 text-white p-5 rounded-full flex flex-col items-center animate-pulse pointer-events-none z-40"><i className="fa-solid fa-backward text-2xl mb-1"></i><span className="text-xs font-bold">-5s</span></div>}
              {seekFeedback === 'right' && <div className="absolute right-10 top-1/2 -translate-y-1/2 bg-black/50 text-white p-5 rounded-full flex flex-col items-center animate-pulse pointer-events-none z-40"><i className="fa-solid fa-forward text-2xl mb-1"></i><span className="text-xs font-bold">+5s</span></div>}

              {/* Buffering */}
              {isBuffering && <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"><div className="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>}

              {/* Center Play/Pause */}
              <div className={`absolute inset-0 flex items-center justify-center transition-opacity duration-300 z-30 pointer-events-none ${showControls && !isSpeeding && src ? 'opacity-100' : 'opacity-0'}`}>
                <button onClick={togglePlay} className="w-16 h-16 bg-black/50 rounded-full flex items-center justify-center backdrop-blur-sm hover:bg-red-600 transition-colors shadow-lg pointer-events-auto">
                  {isPlaying ? <i className="fa-solid fa-pause text-white text-2xl"></i> : <i className="fa-solid fa-play text-white text-2xl ml-1"></i>}
                </button>
              </div>

              {/* BOTTOM CONTROL BAR (Anchored perfectly to bottom) */}
              <div className={`absolute bottom-0 left-0 right-0 transition-opacity duration-300 z-[60] bg-gradient-to-t from-black via-black/80 to-transparent pt-16 pb-3 px-4 flex flex-col gap-2 pointer-events-none ${showControls && !isSpeeding && src ? 'opacity-100' : 'opacity-0'} ${playerMode !== 'normal' ? 'px-8 pb-6' : ''}`}>
                
                <div className="w-full h-8 relative flex items-center group cursor-pointer pointer-events-auto" onPointerDown={handleSeekInteract} onPointerMove={(e) => { if(e.buttons > 0) handleSeekInteract(e); }}>
                    <div className="w-full h-1 bg-white/30 rounded-full relative pointer-events-none transition-all group-hover:h-1.5">
                        <div className="absolute h-full bg-red-600 rounded-full" style={{width: `${progress}%`}}></div>
                        <div className="absolute w-3.5 h-3.5 bg-red-600 rounded-full top-1/2 -translate-y-1/2 -translate-x-1/2 shadow opacity-0 group-hover:opacity-100 transition-opacity" style={{left: `${progress}%`}}></div>
                    </div>
                </div>

                <div className="flex items-center justify-between text-white pointer-events-auto">
                  <div className="flex items-center gap-4">
                    <button onClick={togglePlay} className="hover:text-red-500 transition-colors p-2 -ml-2">
                      {isPlaying ? <i className="fa-solid fa-pause text-lg"></i> : <i className="fa-solid fa-play text-lg"></i>}
                    </button>
                    <div className="text-xs font-medium opacity-90 tracking-wide font-mono">
                      {currentTime} <span className="opacity-60 mx-1">/</span> {duration}
                    </div>
                  </div>

                  <div className="flex items-center gap-1">
                    <div className="relative">
                        <button onClick={() => { setShowSettings(!showSettings); setSettingMenu('main'); }} className="hover:text-red-500 transition-colors p-2">
                            <i className="fa-solid fa-gear text-base"></i>
                        </button>
                        
                        {/* THE ADVANCED SETTINGS PANEL */}
                        {showSettings && (
                            <div className="absolute bottom-12 right-0 bg-black/95 rounded-xl p-2 w-48 shadow-2xl border border-white/10 z-50 animate-in fade-in zoom-in-95 backdrop-blur-md">
                                {settingMenu === 'main' && (
                                    <div className="flex flex-col gap-1">
                                        <button onClick={()=>setSettingMenu('quality')} className="w-full text-left px-3 py-3 text-sm hover:bg-white/10 rounded-lg flex items-center justify-between">
                                            <div className="flex items-center gap-3"><i className="fa-solid fa-sliders text-gray-400 w-4"></i> Quality</div>
                                            <div className="text-gray-400 text-xs flex items-center gap-1">{videoQuality} <i className="fa-solid fa-chevron-right text-[10px]"></i></div>
                                        </button>
                                        <button onClick={()=>setSettingMenu('speed')} className="w-full text-left px-3 py-3 text-sm hover:bg-white/10 rounded-lg flex items-center justify-between">
                                            <div className="flex items-center gap-3"><i className="fa-solid fa-gauge-high text-gray-400 w-4"></i> Playback Speed</div>
                                            <div className="text-gray-400 text-xs flex items-center gap-1">{playbackSpeed === 1 ? 'Normal' : `${playbackSpeed}x`} <i className="fa-solid fa-chevron-right text-[10px]"></i></div>
                                        </button>
                                    </div>
                                )}
                                
                                {settingMenu === 'speed' && (
                                    <div className="flex flex-col max-h-[250px] overflow-y-auto custom-scrollbar">
                                        <button onClick={()=>setSettingMenu('main')} className="w-full text-left px-3 py-3 text-sm hover:bg-white/10 rounded-lg flex items-center gap-3 border-b border-white/10 mb-1 font-bold text-gray-300">
                                            <i className="fa-solid fa-arrow-left"></i> Speed
                                        </button>
                                        {[0.5, 0.75, 1, 1.25, 1.5, 1.75, 2].map(speed => (
                                            <button key={speed} onClick={() => { engineSetSpeed(speed); setShowSettings(false); resetControlsTimer(); }} className="w-full text-left px-4 py-2.5 text-sm hover:bg-white/10 rounded flex items-center justify-between">
                                                <span>{speed === 1 ? 'Normal' : `${speed}x`}</span>
                                                {playbackSpeed === speed && <i className="fa-solid fa-check text-red-500"></i>}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {settingMenu === 'quality' && (
                                    <div className="flex flex-col">
                                        <button onClick={()=>setSettingMenu('main')} className="w-full text-left px-3 py-3 text-sm hover:bg-white/10 rounded-lg flex items-center gap-3 border-b border-white/10 mb-1 font-bold text-gray-300">
                                            <i className="fa-solid fa-arrow-left"></i> Quality
                                        </button>
                                        {['Auto', '1080p (HD)', '720p', '480p', '360p', '240p'].map(q => (
                                            <button key={q} onClick={() => { setVideoQuality(q); setShowSettings(false); resetControlsTimer(); }} className="w-full text-left px-4 py-2.5 text-sm hover:bg-white/10 rounded flex items-center justify-between">
                                                <span>{q}</span>
                                                {videoQuality === q && <i className="fa-solid fa-check text-red-500"></i>}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    
                    <button onClick={() => setPlayerMode(m => m === 'landscape' ? 'normal' : 'landscape')} className={`hover:text-red-500 p-2 ${playerMode === 'landscape' ? 'text-red-500' : ''}`}>
                        <i className="fa-solid fa-rotate text-base"></i>
                    </button>
                    
                    <button onClick={() => setPlayerMode(m => m === 'fullscreen' ? 'normal' : 'fullscreen')} className={`hover:text-red-500 p-2 -mr-2 ${playerMode === 'fullscreen' ? 'text-red-500' : ''}`}>
                      <i className={`fa-solid ${playerMode === 'fullscreen' ? 'fa-compress' : 'fa-expand'} text-base`}></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // 🚀 MAIN APPLICATION & VIEWS
        // ==========================================
        function App() {
          const [currentTab, setCurrentTab] = useState('home');
          const [activeBatch, setActiveBatch] = useState(null);
          const [activeSubBatch, setActiveSubBatch] = useState(null);
          const [activeSubject, setActiveSubject] = useState(null);
          const [activeChapter, setActiveChapter] = useState(null);
          const [activeVideo, setActiveVideo] = useState(null);

          useEffect(() => {
              if (window.Telegram && window.Telegram.WebApp) {
                  window.Telegram.WebApp.ready();
                  window.Telegram.WebApp.expand();
              }
          }, []);

          const handleBack = () => {
            if (activeVideo) setActiveVideo(null);
            else if (activeChapter) setActiveChapter(null);
            else if (activeSubject) setActiveSubject(null);
            else if (activeSubBatch) setActiveSubBatch(null);
            else if (activeBatch) { setActiveBatch(null); setCurrentTab('batches'); }
          };

          // --- 📚 PW STYLE VIDEO + MATERIALS LAYOUT ---
          const renderVideoPlayerView = () => {
            if (!activeVideo) return null;

            return (
              <div className="bg-white min-h-screen animate-in slide-in-from-bottom duration-300 pb-10">
                <UniversalPlayer src={activeVideo.url} poster={`https://picsum.photos/seed/${activeVideo.id}/800/450`} title={activeVideo.title} onBack={handleBack} />

                <div className="p-5 pt-5">
                  <h1 className="text-lg font-bold text-gray-900 leading-tight mb-2">{activeVideo.title}</h1>
                  
                  {/* Top Primary Actions (PW Style) */}
                  <div className="flex gap-3 mb-5">
                      <button className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2.5 rounded-xl border border-red-100 flex items-center justify-center gap-2 text-sm transition-colors shadow-sm">
                          <i className="fa-solid fa-file-pdf"></i> Class Notes
                      </button>
                      <button className="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold py-2.5 rounded-xl border border-indigo-100 flex items-center justify-center gap-2 text-sm transition-colors shadow-sm">
                          <i className="fa-solid fa-pen-to-square"></i> Solve DPP
                      </button>
                  </div>

                  {/* Metadata */}
                  <div className="flex items-center justify-between text-xs text-gray-500 mb-6 border-b border-gray-200 pb-5">
                    <span className="flex items-center gap-1.5"><i className="fa-solid fa-video text-gray-400"></i> Recorded Lecture</span>
                    <span className="flex items-center gap-1.5"><i className="fa-regular fa-clock text-gray-400"></i> {activeVideo.duration}</span>
                    <span className="flex items-center gap-1.5"><i className="fa-solid fa-eye text-gray-400"></i> 15k+ Views</span>
                  </div>

                  {/* Smart Board & Study Materials Section */}
                  <h3 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wider">Study Materials</h3>
                  <div className="space-y-3">
                    <div className="flex items-center justify-between p-3.5 bg-white border border-gray-200 rounded-xl hover:shadow-md transition-shadow cursor-pointer">
                      <div className="flex items-center gap-3.5">
                          <div className="w-10 h-10 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center"><i className="fa-solid fa-chalkboard text-xl"></i></div>
                          <div><span className="font-bold text-sm text-gray-800 block">Smart Board Slides</span><span className="text-[10px] text-gray-500">PDF • 5.2 MB</span></div>
                      </div>
                      <button className="w-8 h-8 rounded-full bg-gray-50 text-blue-600 flex items-center justify-center border border-gray-200"><i className="fa-solid fa-download text-xs"></i></button>
                    </div>
                    
                    <div className="flex items-center justify-between p-3.5 bg-white border border-gray-200 rounded-xl hover:shadow-md transition-shadow cursor-pointer">
                      <div className="flex items-center gap-3.5">
                          <div className="w-10 h-10 rounded-lg bg-rose-50 text-rose-500 flex items-center justify-center"><i className="fa-solid fa-file-lines text-xl"></i></div>
                          <div><span className="font-bold text-sm text-gray-800 block">Class Notes (Annotated)</span><span className="text-[10px] text-gray-500">PDF • 2.1 MB</span></div>
                      </div>
                      <button className="w-8 h-8 rounded-full bg-gray-50 text-blue-600 flex items-center justify-center border border-gray-200"><i className="fa-solid fa-download text-xs"></i></button>
                    </div>
                    
                    <div className="flex items-center justify-between p-3.5 bg-white border border-gray-200 rounded-xl hover:shadow-md transition-shadow cursor-pointer">
                      <div className="flex items-center gap-3.5">
                          <div className="w-10 h-10 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center"><i className="fa-solid fa-file-pen text-xl"></i></div>
                          <div><span className="font-bold text-sm text-gray-800 block">Daily Practice Paper (DPP)</span><span className="text-[10px] text-gray-500">PDF • 1.4 MB</span></div>
                      </div>
                      <button className="w-8 h-8 rounded-full bg-gray-50 text-blue-600 flex items-center justify-center border border-gray-200"><i className="fa-solid fa-download text-xs"></i></button>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          // --- 📚 PW STYLE CHAPTER LIST ---
          const renderChapterDetailView = () => { 
            const chapterVideos = VIDEOS.filter(v => v.chapterId === activeChapter.id); 
            return ( 
              <div className="pb-24 animate-in slide-in-from-right bg-gray-50 min-h-screen"> 
                <div className="bg-white pt-10 px-4 pb-4 shadow-sm sticky top-0 z-10 flex items-center gap-3 border-b border-gray-200"> 
                  <button onClick={handleBack} className="p-2 -ml-2 rounded-full hover:bg-gray-100"><i className="fa-solid fa-arrow-left text-lg text-gray-800"></i></button> 
                  <h2 className="font-bold text-lg text-gray-900 line-clamp-1">{activeChapter.name}</h2> 
                </div> 
                
                <div className="px-4 mt-5"> 
                  <h3 className="font-bold text-gray-500 uppercase text-xs tracking-wider mb-3 px-1">All Lectures</h3>
                  
                  {chapterVideos.map((vid) => ( 
                    <div key={vid.id} className="bg-white border border-gray-200 rounded-2xl p-3.5 shadow-sm flex flex-col mb-4 hover:shadow-md transition-shadow"> 
                      <div className="flex gap-4">
                          <div onClick={() => setActiveVideo(vid)} className="w-36 h-24 bg-gray-900 rounded-xl relative flex items-center justify-center shrink-0 cursor-pointer overflow-hidden group">
                              <img src={`https://picsum.photos/seed/${vid.id}/400/200`} className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-500" />
                              <i className="fa-solid fa-circle-play text-white text-3xl z-10 opacity-90 group-hover:text-blue-500 transition-colors"></i>
                              <span className="absolute bottom-1.5 right-1.5 bg-black/80 text-white text-[10px] font-bold px-1.5 py-0.5 rounded shadow">{vid.duration}</span>
                          </div>
                          <div className="flex flex-col justify-between flex-1 py-0.5">
                              <div>
                                  <h3 onClick={() => setActiveVideo(vid)} className="font-bold text-[13px] text-gray-900 line-clamp-2 cursor-pointer leading-snug">{vid.title}</h3>
                                  <div className="text-[10px] text-gray-500 mt-1 flex items-center gap-1"><i className="fa-regular fa-calendar"></i> {vid.date}</div>
                              </div>
                              <div className="flex gap-2 mt-2">
                                  <button className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 text-[10px] font-bold py-2 rounded-lg border border-red-100 flex items-center justify-center gap-1.5 transition-colors"><i className="fa-solid fa-file-pdf"></i> Notes</button>
                                  <button className="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-[10px] font-bold py-2 rounded-lg border border-indigo-100 flex items-center justify-center gap-1.5 transition-colors"><i className="fa-solid fa-pen-to-square"></i> DPP</button>
                              </div>
                          </div>
                      </div>
                    </div> 
                  ))} 
                </div> 
              </div> 
            ); 
          };

          const renderHomeView = () => ( <div className="pb-24 pt-12 animate-in fade-in"><div className="bg-blue-600 p-6 rounded-3xl shadow-lg text-white mx-4 mb-6"><h2 className="text-2xl font-bold">Hello, Student! 👋</h2><p className="text-blue-100 text-sm mt-1">Ready to crack your goals?</p></div><div className="px-5 space-y-6"><div className="bg-gradient-to-r from-orange-500 to-rose-500 rounded-2xl p-5 text-white shadow-md relative overflow-hidden"><div className="relative z-10"><span className="bg-white text-rose-500 text-[10px] font-black px-2 py-1 rounded uppercase tracking-widest shadow-sm">Free Test</span><h3 className="text-xl font-bold mt-3">AITS Mock Test 1</h3><p className="text-sm opacity-90 mb-4">Attempt now to check your rank!</p><button className="bg-white text-rose-600 font-bold text-sm px-5 py-2.5 rounded-xl shadow-lg hover:scale-105 transition-transform">Attempt Now</button></div><i className="fa-solid fa-trophy absolute -right-6 -bottom-6 text-9xl text-white opacity-20"></i></div><div><h3 className="text-gray-800 font-bold text-lg mb-3">Quick Access</h3><div className="grid grid-cols-4 gap-3">{SUBJECTS.slice(0,4).map(sub => ( <div key={sub.id} className="flex flex-col items-center justify-center bg-white p-3 rounded-2xl shadow-sm border border-gray-100"><span className="text-2xl mb-1">{sub.icon}</span><span className="text-[10px] font-bold text-gray-600 text-center">{sub.name.split(' ')[0]}</span></div> ))}</div></div></div></div> );
          const renderBatchesView = () => ( <div className="pb-24 pt-10 px-4 animate-in fade-in"><h2 className="text-2xl font-black text-gray-900 mb-1 px-1">My Study Batches</h2><p className="text-gray-500 text-sm mb-6 px-1">Select a batch to access lectures and notes</p><div className="space-y-4">{BATCHES.map(batch => ( <div key={batch.id} onClick={() => setActiveBatch(batch)} className="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden cursor-pointer hover:shadow-md transition-all active:scale-[0.98]"><div className={`${batch.color} h-2.5 w-full`}></div><div className="p-5"><div className="flex justify-between items-start mb-3"><span className="bg-green-50 text-green-700 border border-green-200 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">{batch.price}</span><span className="text-xs text-gray-500 font-medium flex items-center gap-1.5"><i className="fa-solid fa-users text-[10px]"></i> {batch.students}</span></div><h3 className="text-xl font-bold text-gray-900">{batch.name}</h3><p className="text-gray-500 text-sm mt-1 mb-5">{batch.target}</p><button className="w-full bg-gray-50 hover:bg-gray-100 text-blue-600 font-bold py-3 rounded-xl border border-gray-200 flex items-center justify-center gap-2 transition-colors">Go to Batch <i className="fa-solid fa-arrow-right text-xs"></i></button></div></div> ))}</div></div> );
          const renderBatchDetailView = () => { const isSubBatchMode = activeBatch.subBatches && !activeSubBatch; const currentHeader = activeSubBatch || activeBatch; return ( <div className="pb-24 animate-in slide-in-from-right"><div className={`${currentHeader.color || activeBatch.color} pt-10 pb-10 px-5 text-white shadow-md rounded-b-[2.5rem]`}><div className="flex items-center gap-3 mb-6"><button onClick={handleBack} className="bg-white/20 hover:bg-white/30 transition-colors w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-sm"><i className="fa-solid fa-arrow-left"></i></button><h2 className="font-bold text-lg line-clamp-1">{currentHeader.name}</h2></div><h1 className="text-3xl font-black mb-1">{isSubBatchMode ? 'Select Section' : 'Subjects'}</h1><p className="text-white/80 text-sm">Choose a subject to view lectures</p></div><div className="px-4 mt-6 space-y-3">{isSubBatchMode ? ( activeBatch.subBatches.map(sub => ( <div key={sub.id} onClick={() => setActiveSubBatch(sub)} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between cursor-pointer hover:border-blue-200 transition-colors"><div className="flex items-center gap-4"><div className={`h-14 w-14 rounded-xl flex items-center justify-center text-white shadow-inner ${sub.color}`}><i className="fa-solid fa-layer-group text-2xl"></i></div><div><h3 className="font-bold text-gray-900 text-lg">{sub.name}</h3><p className="text-xs text-gray-500 mt-0.5">{sub.target}</p></div></div><div className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i className="fa-solid fa-chevron-right"></i></div></div> )) ) : ( SUBJECTS.map(sub => ( <div key={sub.id} onClick={() => setActiveSubject(sub)} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between cursor-pointer hover:border-blue-200 transition-colors"><div className="flex items-center gap-4"><div className="text-3xl bg-blue-50 border border-blue-100 h-14 w-14 rounded-xl flex items-center justify-center shadow-sm">{sub.icon}</div><div><h3 className="font-bold text-gray-900 text-lg">{sub.name}</h3><p className="text-xs text-gray-500 mt-0.5">{sub.chapters} Chapters available</p></div></div><div className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i className="fa-solid fa-chevron-right"></i></div></div> )) )}</div></div> ); };
          const renderSubjectDetailView = () => { const subjectChapters = CHAPTERS.filter(c => c.subjectId === activeSubject.id); return ( <div className="pb-24 animate-in slide-in-from-right"><div className="bg-white border-b border-gray-200 pt-10 px-4 pb-4 shadow-sm sticky top-0 z-10"><div className="flex items-center gap-3"><button onClick={handleBack} className="p-2 -ml-2 rounded-full hover:bg-gray-100"><i className="fa-solid fa-arrow-left text-lg text-gray-800"></i></button><h2 className="font-bold text-xl text-gray-900 flex items-center gap-2">{activeSubject.icon} {activeSubject.name}</h2></div></div><div className="px-4 mt-5 space-y-3">{subjectChapters.map(chapter => ( <div key={chapter.id} onClick={() => setActiveChapter(chapter)} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between cursor-pointer hover:border-blue-200 transition-colors"><div className="flex items-center gap-4"><div className="bg-blue-50 text-blue-600 h-12 w-12 rounded-xl flex items-center justify-center border border-blue-100"><i className="fa-regular fa-folder-open text-xl"></i></div><div><h3 className="font-bold text-gray-900 text-sm leading-snug">{chapter.name}</h3><p className="text-xs text-gray-500 mt-1 flex items-center gap-1"><i className="fa-solid fa-play text-[8px]"></i> {chapter.count}</p></div></div><div className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 shrink-0"><i className="fa-solid fa-chevron-right"></i></div></div> ))}</div></div> ); };

          return (
            <div className="min-h-screen font-sans max-w-md mx-auto relative overflow-hidden bg-gray-50">
              {activeVideo ? renderVideoPlayerView() : 
               activeChapter ? renderChapterDetailView() : 
               activeSubject ? renderSubjectDetailView() : 
               activeBatch ? renderBatchDetailView() : (
                <>
                  {currentTab === 'home' && renderHomeView()}
                  {currentTab === 'batches' && renderBatchesView()}
                  
                  {/* Modern Bottom Nav */}
                  <div className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 flex justify-around pb-5 pt-3 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                    <button onClick={() => { setCurrentTab('home'); setActiveBatch(null); setActiveSubBatch(null); setActiveSubject(null); setActiveChapter(null); setActiveVideo(null); }} className={`flex flex-col items-center gap-1 p-2 w-full transition-colors ${currentTab === 'home' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                      <i className="fa-solid fa-house text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Home</span>
                    </button>
                    <button onClick={() => { setCurrentTab('batches'); setActiveSubBatch(null); setActiveSubject(null); setActiveChapter(null); setActiveVideo(null); }} className={`flex flex-col items-center gap-1 p-2 w-full transition-colors ${currentTab === 'batches' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                      <i className="fa-solid fa-book-open text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Batches</span>
                    </button>
                    <button className="flex flex-col items-center gap-1 p-2 w-full transition-colors text-gray-400 hover:text-gray-600">
                      <i className="fa-solid fa-user text-[22px]"></i><span className="text-[10px] font-bold tracking-wide">Profile</span>
                    </button>
                  </div>
                </>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
