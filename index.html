                                                    <button onClick={() => { if(confirm(`Mute ${p.user_name}?`)) sendHostAction('mute', p.user_id); }} className="w-8 h-8 rounded-full bg-orange-500/20 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white" title="Mute Mic"><i className="fa-solid fa-microphone-slash text-xs"></i></button>
                                                    <button onClick={() => { if(confirm(`Kick ${p.user_name} from the room?`)) sendHostAction('kick', p.user_id); }} className="w-8 h-8 rounded-full bg-red-500/20 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white" title="Kick User"><i className="fa-solid fa-ban text-xs"></i></button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    {showSettingsModal && <RoomSettingsModal activeRoom={activeRoom} onClose={() => setShowSettingsModal(false)} onSave={updateRoomSettings} />}
                </div>
            );
        };


        // ==========================================
        // 🚀 AI MENTOR TAB (ATAXY AI MENTOR)
        // ==========================================
        const AIMentorView = () => {
            const [msg, setMsg] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [chats, setChats] = useState([
                { id: 1, sender: 'ai', text: "Hello! I am ATAXY, a mentor to help all the students. I can help you solve Physics, Chemistry, and Biology doubts. Ask me anything!" }
            ]);
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chats, isTyping]);

            const sendMsg = async (e) => {
                e.preventDefault();
                if (!msg.trim()) return;
                
                const userMsg = msg;
                setChats(prev => [...prev, { id: Date.now(), sender: 'user', text: userMsg }]);
                setMsg('');
                setIsTyping(true);

                const systemContext = "You are ATAXY, a mentor to help all the students. Answer clearly, accurately, and formatting nicely using Markdown. You must never state that you are an AI.";
                const aiReply = await fetchGeminiSecure(userMsg, chats.filter(c => c.id !== 1), systemContext); // Send history excluding welcome message
                
                setChats(prev => [...prev, { id: Date.now(), sender: 'ai', text: aiReply }]);
                setIsTyping(false);
            };

            return (
                <div className="pb-[80px] animate-in fade-in flex flex-col h-[calc(100vh_-_60px_-_env(safe-area-inset-top,_0px))] bg-gray-50 dark:bg-gray-950">
                    <div className="fixed top-[calc(60px_+_env(safe-area-inset-top,_0px))] w-full max-w-md bg-white dark:bg-gray-900 px-4 py-3 flex items-center justify-between shadow-sm border-b border-gray-200 dark:border-gray-800 z-20">
                        <div className="flex items-center gap-3">
                            <AtaxyLogo className="w-10 h-10 rounded-full border border-purple-500/30 shadow-inner" />
                            <div>
                                <h2 className="font-bold text-gray-900 dark:text-white leading-tight">ATAXY Mentor</h2>
                                <p className="text-[10px] text-purple-500 font-bold tracking-wide">Powered by ATAXY</p>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 pt-[70px]">
                        {chats.map((c, i) => (
                            <div key={i} className={`flex ${c.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] p-3.5 rounded-2xl shadow-sm text-sm whitespace-pre-wrap leading-relaxed ${c.sender === 'user' ? 'bg-purple-600 text-white rounded-br-none' : 'bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-800 dark:text-gray-200 rounded-bl-none'}`}>
                                    <FormattedText text={c.text} />
                                </div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex justify-start">
                                <div className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-4 rounded-2xl rounded-bl-none shadow-sm flex gap-1 items-center">
                                    <div className="w-2 h-2 bg-purple-400 rounded-full animate-bounce"></div>
                                    <div className="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                    <div className="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                </div>
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </div>

                    <form onSubmit={sendMsg} className="fixed bottom-[65px] w-full max-w-md bg-white dark:bg-gray-900 p-3 border-t border-gray-200 dark:border-gray-800 flex gap-2 z-20">
                        <input value={msg} onChange={e => setMsg(e.target.value)} type="text" placeholder="Ask your doubt..." className="flex-1 bg-gray-100 dark:bg-gray-800 border-none rounded-full px-4 py-2.5 text-sm focus:ring-0 focus:outline-none text-gray-900 dark:text-white" />
                        <button type="submit" disabled={isTyping} className="w-10 h-10 bg-purple-600 text-white rounded-full flex items-center justify-center hover:bg-purple-700 shadow-md transition-colors"><i className="fa-solid fa-arrow-up text-sm"></i></button>
                    </form>
                </div>
            );
        };



        // ==========================================
        // ⏱️ PRACTICE SESSION TIMER
        // ==========================================
        const PracticeTimer = ({ active, questionId, isAnswered }) => {
            const timesRef = useRef({});
            const [time, setTime] = useState(0);

            useEffect(() => {
                if (questionId) {
                    setTime(timesRef.current[questionId] || 0);
                }
            }, [questionId]);

            useEffect(() => {
                if (!active || !questionId || isAnswered) return;
                const timer = setInterval(() => {
                    setTime(t => { const newTime = t + 1; timesRef.current[questionId] = newTime; return newTime; });
                }, 1000);
                return () => clearInterval(timer);
            }, [active, questionId, isAnswered]);
            
            const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            return (
                <div className="text-xs font-bold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2.5 py-1.5 rounded-lg flex items-center gap-1.5 border border-gray-200 dark:border-gray-700 shadow-inner">
                    <i className="fa-regular fa-clock text-blue-500"></i> {formatTime(time)}
                </div>
            );
        };

        // ==========================================
        // �🚀 MAIN APP & NAVIGATION ROUTER
        // ==========================================
        function App() {
          const [isDarkMode, setIsDarkMode] = useState(() => safeGetStr('ataxy_theme', 'dark') === 'dark');
          useEffect(() => {
              if (isDarkMode) { document.documentElement.classList.add('dark'); safeSetItem('ataxy_theme', 'dark'); } 
              else { document.documentElement.classList.remove('dark'); safeSetItem('ataxy_theme', 'light'); }
          }, [isDarkMode]);

          const [isVerified, setIsVerified] = useState(() => safeGetStr('ataxy_verified', '') === 'true');
          const [tgUser, setTgUser] = useState(window.Telegram?.WebApp?.initDataUnsafe?.user || { first_name: "Student", id: "1001" });
          
          const voiceState = useGlobalVoice(tgUser);

          const [currentTab, setCurrentTab] = useState('home'); 
          const [activePracticeSubject, setActivePracticeSubject] = useState(null);
          const [activePracticeChapter, setActivePracticeChapter] = useState(null);
          const [activePracticeBatch, setActivePracticeBatch] = useState(null);
          const [activePracticeFile, setActivePracticeFile] = useState(null);
          const [practiceSelectedTopic, setPracticeSelectedTopic] = useState(null);
          const [showQuiz, setShowQuiz] = useState(false);
          const [practiceAttempts, setPracticeAttempts] = useState(() => safeGetJSON('ataxy_practice_perf', null) || {});
          const [practiceShowPalette, setPracticeShowPalette] = useState(false);
          
          const [bookmarks, setBookmarks] = useState(() => { const b = safeGetJSON('ataxy_bookmarks', null); return Array.isArray(b) ? b : []; });
          const [questionNotes, setQuestionNotes] = useState(() => safeGetJSON('ataxy_question_notes', null) || {});
          const [questionFilter, setQuestionFilter] = useState('all');
          const [showNoteInput, setShowNoteInput] = useState({});

          // 🔖 Bookmark Viewer State
          const [showBookmarkViewer, setShowBookmarkViewer] = useState(false);
          const [bookmarkSearch, setBookmarkSearch] = useState('');
          const [bookmarkSubjectFilter, setBookmarkSubjectFilter] = useState('');
          const [bookmarkChapterFilter, setBookmarkChapterFilter] = useState('');
          const [bookmarkTopicFilter, setBookmarkTopicFilter] = useState('');
          const [activeBookmarkId, setActiveBookmarkId] = useState(null);
          
          // ❌ Mistakes Revision Viewer State
          const [showIncorrectViewer, setShowIncorrectViewer] = useState(false);
          const [incorrectSearch, setIncorrectSearch] = useState('');
          const [incorrectSubjectFilter, setIncorrectSubjectFilter] = useState('');
          const [incorrectChapterFilter, setIncorrectChapterFilter] = useState('');
          const [incorrectTopicFilter, setIncorrectTopicFilter] = useState('');
          const [activeIncorrectId, setActiveIncorrectId] = useState(null);

          const [qbankData, setQbankData] = useState([]);
          const [qbankError, setQbankError] = useState(null);
          
          // 🟢 Practice Questions State
          const [loadedQuestions, setLoadedQuestions] = useState([]);
          const [questionsLoading, setQuestionsLoading] = useState(false);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);

          // 📈 Analytics State (Local Storage Only)
          const [studyStreak, setStudyStreak] = useState(() => safeGetJSON('ataxy_streak', null) || { count: 1, lastDate: new Date().toDateString() });
          useEffect(() => {
              const todayStr = new Date().toDateString();
              const yesterday = new Date();
              yesterday.setDate(yesterday.getDate() - 1);
              const yesterdayStr = yesterday.toDateString();
              setStudyStreak(prev => {
                  if (!prev) return { count: 1, lastDate: todayStr };
                  if (prev.lastDate === todayStr) return prev;
                  if (prev.lastDate === yesterdayStr) return { count: prev.count + 1, lastDate: todayStr };
                  return { count: 1, lastDate: todayStr };
              });
          }, []);
          useEffect(() => { safeSetItem('ataxy_streak', JSON.stringify(studyStreak)); }, [studyStreak]);

          const practiceQuestions = useMemo(() => {
              if (!activePracticeChapter) return [];
              let flat = [];
              let gIdx = 1;
              activePracticeChapter.topics?.forEach(t => {
                  t.questions?.forEach(q => flat.push({ ...q, globalIndex: gIdx++, topicId: t.id, topicName: t.name }));
              });
              return flat;
          }, [activePracticeChapter]);

          // Daily Targets
          const getTodayStr = () => new Date().toISOString().split('T')[0];
          const [selectedDate, setSelectedDate] = useState(getTodayStr());
          const [targetsData, setTargetsData] = useState(() => safeGetJSON('ataxy_targets', null) || {});
          const [newTarget, setNewTarget] = useState("");

          useEffect(() => { safeSetItem('ataxy_targets', JSON.stringify(targetsData)); }, [targetsData]);
          useEffect(() => { if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); } }, []);
          useEffect(() => { 
              if (window.Telegram?.WebApp) { 
                  window.Telegram.WebApp.ready(); 
                  window.Telegram.WebApp.expand(); 
                  try {
                      if (window.Telegram.WebApp.requestFullscreen) {
                          window.Telegram.WebApp.requestFullscreen();
                      }
                  } catch (e) {
                      console.warn('Fullscreen request failed', e);
                  }
              } 
          }, []);
          useEffect(() => {
              const registerTelegramUser = async () => {
                  if (!tgUser?.id) return;
                  try {
                      await fetch(`${BACKEND_URL}/api/neet/user/register`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({
                              telegramUserId: tgUser.id,
                              firstName: tgUser.first_name || '',
                              lastName: tgUser.last_name || '',
                              username: tgUser.username || '',
                              photoUrl: tgUser.photo_url || ''
                          })
                      });
                      safeSetItem('ataxy_registered_telegram_user_id', String(tgUser.id));
                  } catch (error) {
                      console.warn('Telegram user registration failed', error);
                  }
              };

              if (isVerified && tgUser?.id) {
                  const registeredId = safeGetStr('ataxy_registered_telegram_user_id', '');
                  if (registeredId !== String(tgUser.id)) {
                      registerTelegramUser();
                  }
              }
          }, [isVerified, tgUser]);
          useEffect(() => { safeSetItem('ataxy_practice_perf', JSON.stringify(practiceAttempts)); }, [practiceAttempts]);
          useEffect(() => { safeSetItem('ataxy_bookmarks', JSON.stringify(bookmarks)); }, [bookmarks]);
          useEffect(() => { safeSetItem('ataxy_question_notes', JSON.stringify(questionNotes)); }, [questionNotes]);
          
          // 🟢 Load QBank on Mount
          useEffect(() => {
              const fetchSupabaseData = async () => {
                  try {
                      setQbankError(null);
                      
                      // Fetch via your secure Cloudflare Worker Proxy
                      // Note: Keys are now securely hidden inside the Cloudflare Worker!
                      const supabaseUrl = 'https://supabase-proxy.thevoicesession.workers.dev/rest/v1';
                      const headers = { 
                          'Content-Type': 'application/json'
                      };

                      const fetchTable = async (table) => {
                          let res;
                          try {
                              res = await fetch(`${supabaseUrl}/${table}?select=*&limit=5000`, { 
                                  headers,
                                  cache: 'no-store'
                              });
                              if (!res.ok) throw new Error(`HTTP ${res.status}`);
                          } catch (err) {
                              throw new Error(`Network Error: Ensure your Supabase Proxy Worker is deployed and online. Details: ${err.message}`);
                          }
                          
                          if (!res || !res.ok) throw new Error(`HTTP ${res?.status}`);
                          
                          const text = await res.text();
                          let data;
                          try { data = JSON.parse(text); } catch(e) { throw new Error("Invalid JSON"); }
                          
                          let arr = [];
                          if (Array.isArray(data)) arr = data;
                          else if (data && Array.isArray(data.data)) arr = data.data;
                          else if (data && typeof data === 'object') {
                              for (const key in data) {
                                  if (Array.isArray(data[key])) { arr = data[key]; break; }
                              }
                          }
                          
                          arr.forEach((item, i) => { 
                              if (!item.id) {
                                  const txt = (item.question_text || item.question || '').substring(0, 15).replace(/[^a-zA-Z0-9]/g, '');
                                  item.id = `${table}_${i}_${txt}`;
                              } else {
                                  item.id = String(item.id);
                              }
                          });
                          return arr;
                      };

                      let q1 = [], q2 = [];
                      let errors = [];
                      try { q1 = await fetchTable('questions'); } catch(e) { errors.push(`Q1: ${e.message}`); }
                      try { q2 = await fetchTable('Raceee_testttingg_checkinggg'); } catch(e) { errors.push(`Q2: ${e.message}`); }
                      
                      const allQuestions = [...q1, ...q2];
                      if (allQuestions.length === 0) {
                          throw new Error(`Cloudflare Proxy empty. Details: ${errors.join(' | ')}`);
                      }
                      const questions = allQuestions;

                      // Try to fetch chapters and topics
                      let chapters = [], topics = [];
                      try { chapters = await fetchTable('chapters'); } catch(e) {}
                      try { topics = await fetchTable('topics'); } catch(e) {}

                      // Transform data into the app's required tree format
                      const subjectsMap = {};
                      const matchedQuestionIds = new Set();

                      chapters.forEach(chap => {
                          const subjName = chap.subject || 'Chemistry';
                          if (!subjectsMap[subjName]) {
                              subjectsMap[subjName] = { id: 'sub_' + subjName, name: subjName, icon: subjName === 'Physics' ? '⚛️' : (subjName === 'Biology' ? '🌿' : '⚗️'), chapters: [] };
                          }
                          const chapterNode = { id: chap.id, name: chap.name, topics: [] };
                          const chapTopics = topics.filter(t => t.chapter_id === chap.id);
                          
                          chapTopics.forEach(top => {
                              const topicNode = { id: top.id, name: top.name, questions: [] };
                              const topQuestions = questions.filter(q => q.topic_id === top.id || q.topic === top.name);
                              
                              topQuestions.forEach(q => {
                                  matchedQuestionIds.add(q.id);
                                  let parsedOpts = (q.option_a || q.option_b) ? [q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean) : null;
                                  if (!parsedOpts || parsedOpts.length === 0) {
                                      parsedOpts = q.options;
                                      if (typeof parsedOpts === 'string') { try { parsedOpts = JSON.parse(parsedOpts); } catch (e) { parsedOpts = []; } }
                                  }
                                  if (!Array.isArray(parsedOpts) || parsedOpts.length === 0) parsedOpts = ['A', 'B', 'C', 'D'];
                                  
                                  let correctIdx = parseInt(q.correct_answer, 10);
                                  if (isNaN(correctIdx) && q.correct_option) {
                                      correctIdx = ['A', 'B', 'C', 'D'].indexOf(q.correct_option);
                                  }
                                  if (isNaN(correctIdx) || correctIdx === -1) correctIdx = parseInt(q.correct || 0, 10);
                                  if (isNaN(correctIdx)) correctIdx = 0;

                                  topicNode.questions.push({ id: q.id, text: q.question_text || q.question, imageUrl: (typeof q.image_url === 'string') ? q.image_url.replace('kwzpnupjtvfrevpwfaao.supabase.co', 'supabase-proxy.thevoicesession.workers.dev') : null, options: parsedOpts, correctOption: ['A','B','C','D'][correctIdx] || 'A', correct: correctIdx, explanation: q.explanation, difficulty: q.difficulty, ncert: true, accuracy: 'N/A' });
                              });
                              if (topicNode.questions.length > 0) { chapterNode.topics.push(topicNode); }
                          });
                          if (chapterNode.topics.length > 0) { subjectsMap[subjName].chapters.push(chapterNode); }
                      });

                      // Process unmatched questions so none are ever lost
                      const unmatchedQuestions = questions.filter(q => !matchedQuestionIds.has(q.id));
                      unmatchedQuestions.forEach((q, idx) => {
                          const subjName = q.subject || 'Mixed Subjects';
                          const chapName = q.chapter || 'Mixed Chapters';
                          const topName = q.topic || 'Mixed Topics';
                          
                          if (!subjectsMap[subjName]) {
                              subjectsMap[subjName] = { id: 'sub_unm_' + subjName, name: subjName, icon: '📂', chapters: [] };
                          }
                          let chapterNode = subjectsMap[subjName].chapters.find(c => c.name === chapName);
                          if (!chapterNode) {
                              chapterNode = { id: 'chap_unm_' + chapName, name: chapName, topics: [] };
                              subjectsMap[subjName].chapters.push(chapterNode);
                          }
                          let topicNode = chapterNode.topics.find(t => t.name === topName);
                          if (!topicNode) {
                              topicNode = { id: 'top_unm_' + topName, name: topName, questions: [] };
                              chapterNode.topics.push(topicNode);
                          }

                          let parsedOpts = (q.option_a || q.option_b) ? [q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean) : null;
                          if (!parsedOpts || parsedOpts.length === 0) {
                              parsedOpts = q.options || q.Options || q.options_array;
                              if (typeof parsedOpts === 'string') { try { parsedOpts = JSON.parse(parsedOpts); } catch (e) { parsedOpts = []; } }
                          }
                          if (!Array.isArray(parsedOpts) || parsedOpts.length === 0) parsedOpts = ['A', 'B', 'C', 'D'];
                          
                          let correctIdx = parseInt(q.correct_answer, 10);
                          if (isNaN(correctIdx) && q.correct_option) {
                              correctIdx = ['A', 'B', 'C', 'D'].indexOf(q.correct_option);
                          }
                          if (isNaN(correctIdx) || correctIdx === -1) correctIdx = parseInt(q.correct || 0, 10);
                          if (isNaN(correctIdx)) correctIdx = 0;

                          topicNode.questions.push({ 
                              id: q.id, 
                              text: q.question_text || q.question || 'Unnamed Question', 
                              imageUrl: (typeof q.image_url === 'string') ? q.image_url.replace('kwzpnupjtvfrevpwfaao.supabase.co', 'supabase-proxy.thevoicesession.workers.dev') : null,
                              options: parsedOpts, 
                              correctOption: ['A','B','C','D'][correctIdx] || 'A',
                              correct: correctIdx, 
                              explanation: q.explanation || q.Explanation || 'No explanation', 
                              difficulty: q.difficulty || 'Medium', 
                              ncert: true, accuracy: 'N/A' 
                          });
                      });

                      let finalData = Object.values(subjectsMap);

                      if (finalData.length > 0) {
                          // Clean up empty branches
                          finalData = finalData.filter(s => {
                              s.chapters = s.chapters.filter(c => {
                                  c.topics = c.topics.filter(t => t.questions.length > 0);
                                  return c.topics.length > 0;
                              });
                              return s.chapters.length > 0;
                          });
                      }

                      if (finalData.length > 0) {
                          setQbankData(finalData);
                      } else {
                          setQbankError("Connected to Cloudflare proxy, but it returned empty categories.");
                          setQbankData(ALIEN_QBANK);
                      }
                  } catch (e) {
                      console.error("Cloudflare Proxy Fetch Error:", e);
                      let errorMsg = e.message;
                      if (errorMsg === "Failed to fetch" || errorMsg.includes("NetworkError")) {
                          errorMsg = "Telegram Webview blocked the connection. Try closing the mini-app and opening it again.";
                      }
                      setQbankError(errorMsg);
                      setQbankData(ALIEN_QBANK); // Fallback to local hardcoded data on error
                  }
              };
              fetchSupabaseData();
          }, []);

          useEffect(() => {
              if (!activePracticeChapter) {
                  setLoadedQuestions([]);
                  setCurrentQuestionIndex(0);
                  return;
              }

              const loadQuestions = () => {
                  setQuestionsLoading(true);
                  setCurrentQuestionIndex(0);

                  let allQuestions = [];
                  let gIdx = 1;
                  if (activePracticeChapter.topics) {
                      activePracticeChapter.topics.forEach(t => {
                          if (t.questions) {
                              t.questions.forEach(q => allQuestions.push({ ...q, globalIndex: gIdx++, topicId: t.id, topicName: t.name }));
                          }
                      });
                  }
                  
                  if (allQuestions.length > 0) {
                      setLoadedQuestions(allQuestions);
                  } else {
                      setLoadedQuestions([]);
                  }
                  setQuestionsLoading(false);
              };

              loadQuestions();
          }, [activePracticeChapter]);

          useEffect(() => { setPracticeSelectedTopic(null); setPracticeShowPalette(false); }, [activePracticeChapter]);

          const handleBack = () => {
            if (showQuiz) setShowQuiz(false);
            else if (activePracticeChapter) setActivePracticeChapter(null);
            else if (activePracticeSubject) setActivePracticeSubject(null);
            else if (activePracticeFile) setActivePracticeFile(null);
            else if (activePracticeBatch) setActivePracticeBatch(null);
          };

          if (!isVerified) return <Gatekeeper onVerify={(user) => { setTgUser(user); setIsVerified(true); }} />;

          // --- VIEWS ---
          const renderHomeView = () => {
             const currentTargets = targetsData[selectedDate] || [];
             const toggleTarget = (id) => { const u = currentTargets.map(t => t.id === id ? {...t, done: !t.done} : t); setTargetsData({...targetsData, [selectedDate]: u}); };
             const removeTarget = (id) => { const u = currentTargets.filter(t => t.id !== id); setTargetsData({...targetsData, [selectedDate]: u}); };
             const addTarget = (e) => { e.preventDefault(); if(!newTarget.trim()) return; const u = [...currentTargets, { id: Date.now(), text: newTarget, done: false }]; setTargetsData({...targetsData, [selectedDate]: u}); setNewTarget(""); };

             return ( 
             <div className="pb-24 pt-4 animate-in fade-in">
                 <div className="bg-gradient-to-r from-[#00A7A7] to-cyan-600 dark:from-slate-900 dark:to-slate-800 p-6 rounded-3xl shadow-[0_0_15px_rgba(0,167,167,0.3)] dark:shadow-[0_0_15px_rgba(0,255,255,0.2)] border border-transparent dark:border-cyan-500/30 text-white mx-4 mb-6 relative overflow-hidden mt-4">
                     <div className="relative z-10 flex justify-between items-center">
                         <div>
                             <h2 className="text-2xl font-bold">Hello, {tgUser.first_name}! 👋</h2>
                             <p className="text-cyan-100 dark:text-cyan-400 text-[11px] font-bold tracking-widest uppercase mt-1">Welcome to ATAXY</p>
                             <p className="text-white/90 dark:text-gray-300 text-sm mt-0.5">Ready to crack your goals?</p>
                         </div>
                         {tgUser?.photo_url ? (
                             <img src={tgUser.photo_url} alt="Profile" className="h-14 w-14 rounded-full border-2 border-white/20 dark:border-cyan-500/50 shadow-inner shrink-0 object-cover" />
                         ) : (
                             <div className="h-14 w-14 rounded-full border-2 border-white/20 dark:border-cyan-500/50 shadow-inner shrink-0 bg-white dark:bg-slate-800 flex items-center justify-center text-[#00A7A7] dark:text-cyan-400 font-bold text-xl uppercase">
                                 {tgUser?.first_name ? tgUser.first_name.charAt(0) : 'S'}
                             </div>
                         )}
                     </div>
                     <i className="fa-solid fa-rocket absolute -right-4 -bottom-4 text-6xl text-white opacity-10"></i>
                 </div>
                 
                 <div className="px-5 space-y-6">
                     <div className="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
                         <div className="flex justify-between items-center mb-4">
                             <h3 className="font-bold text-gray-800 dark:text-gray-200 text-lg flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-500"></i> Daily Targets</h3>
                             <input type="date" min="2026-01-01" max="2126-12-31" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-bold px-3 py-1.5 rounded outline-none border border-blue-100 dark:border-blue-800 cursor-pointer" />
                         </div>
                         <div className="space-y-2 mb-4 min-h-[60px]">
                             {currentTargets.length === 0 ? <p className="text-xs text-gray-400 italic text-center py-2">No targets set. Add one below!</p> : currentTargets.map(t => (
                                 <div key={t.id} className={`flex items-center justify-between p-2 rounded-lg transition-colors ${t.done ? 'bg-gray-50 dark:bg-gray-800 opacity-60' : 'bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700'}`}>
                                     <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => toggleTarget(t.id)}>
                                        <div className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 ${t.done ? 'bg-green-500 border-green-500' : 'border-gray-300 dark:border-gray-600'}`}>{t.done && <i className="fa-solid fa-check text-white text-[10px]"></i>}</div>
                                        <span className={`text-sm font-medium ${t.done ? 'line-through text-gray-500 dark:text-gray-400' : 'text-gray-800 dark:text-gray-200'}`}>{t.text}</span>
                                     </div>
                                     <button onClick={() => removeTarget(t.id)} className="text-red-500 p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors"><i className="fa-solid fa-trash text-sm"></i></button>
                                 </div>
                             ))}
                         </div>
                         <form onSubmit={addTarget} className="flex gap-2 border-t border-gray-100 dark:border-gray-800 pt-4 mt-2">
                             <input type="text" value={newTarget} onChange={(e) => setNewTarget(e.target.value)} placeholder={`Add goal for ${selectedDate}...`} className="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 dark:text-white" />
                             <button type="submit" className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-md"><i className="fa-solid fa-plus"></i></button>
                         </form>
                     </div>
                     <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1 mt-6">Study Modules</h3>
                     <div className="grid grid-cols-2 gap-4 mb-6">
                         <div onClick={() => setCurrentTab('questions')} className="bg-[#00a651] border border-[#008c44] shadow-[0_0_15px_rgba(0,166,81,0.3)] rounded-2xl p-5 aspect-square flex flex-col items-center justify-center text-center cursor-pointer hover:scale-105 active:scale-95 transition-all relative overflow-hidden group">
                             <i className="fa-solid fa-book-open text-4xl text-white mb-3 group-hover:-translate-y-1 transition-transform"></i>
                             <h4 className="font-black text-white text-lg leading-tight">LN modules</h4>
                             <i className="fa-solid fa-leaf absolute -right-4 -bottom-4 text-6xl text-green-800/30"></i>
                         </div>
                         <div onClick={() => setCurrentTab('questions')} className="bg-black dark:bg-gray-900 border border-gray-800 shadow-md rounded-2xl p-5 aspect-square flex flex-col items-center justify-center text-center cursor-pointer hover:scale-105 active:scale-95 transition-all relative overflow-hidden group">
                             <i className="fa-solid fa-layer-group text-4xl text-white mb-3 group-hover:-translate-y-1 transition-transform"></i>
                             <h4 className="font-black text-white text-lg leading-tight">Bablu Dablu<br/>modules</h4>
                             <i className="fa-solid fa-pen-nib absolute -right-4 -bottom-4 text-6xl text-white/5"></i>
                         </div>
                     </div>
                 </div>
             </div> 
             );
          };

          // --- NEETPREP PRACTICE ENGINE ---
          const renderQuestionsView = () => {
             if (activePracticeChapter) {
                 if (!showQuiz) {
                     const totalQs = activePracticeChapter.topics?.reduce((acc, t) => acc + (t.questions?.length || 0), 0) || 0;
                     return (
                         <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                             <div className="flex items-center gap-3 mb-6">
                                 <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700"><i className="fa-solid fa-arrow-left"></i></button>
                                 <h2 className="text-xl font-bold text-gray-900 dark:text-white line-clamp-1">{activePracticeChapter.name}</h2>
                             </div>
                             
                             <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-2xl p-5 mb-6 shadow-sm flex justify-between items-center">
                                 <div>
                                     <h3 className="font-bold text-blue-800 dark:text-blue-300 text-lg">Practice All Topics</h3>
                                     <p className="text-blue-600 dark:text-blue-400 text-xs font-semibold mt-1">{totalQs} Questions Available</p>
                                 </div>
                                 <button onClick={() => { setPracticeSelectedTopic(null); setShowQuiz(true); }} className="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-blue-700 shadow-md transition-colors shadow-blue-500/30">
                                     <i className="fa-solid fa-play ml-1"></i>
                                 </button>
                             </div>

                             <h3 className="font-semibold text-[#00a651] mb-3 uppercase tracking-wider text-xs bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 inline-block px-2 py-1 rounded-md">Specific Topics</h3>
                             
                             <div className="space-y-3">
                                 {activePracticeChapter.topics?.map((top, i) => (
                                     <div key={i} onClick={() => { setPracticeSelectedTopic(top.name); setShowQuiz(true); }} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex justify-between items-center shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all group">
                                         <div className="flex-1 mr-4">
                                             <h4 className="font-semibold text-sm text-gray-800 dark:text-gray-200 group-hover:text-[#00a651] transition-colors">{top.name}</h4>
                                             <p className="text-[10px] font-semibold text-gray-500 mt-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 inline-block px-2 py-0.5 rounded-sm">{top.questions?.length || 0} Qs</p>
                                         </div>
                                         <button className="w-8 h-8 rounded-full bg-gray-50 dark:bg-gray-800 text-gray-400 group-hover:bg-[#00a651] group-hover:text-white transition-colors flex items-center justify-center shrink-0">
                                             <i className="fa-solid fa-play ml-0.5 text-xs"></i>
                                         </button>
                                     </div>
                                 ))}
                             </div>
                         </div>
                     );
                 }

                 const selectedTopic = practiceSelectedTopic;
                 const attempts = practiceAttempts;
                 const showPalette = practiceShowPalette;
                 const allQuestions = loadedQuestions;
                 
                 let displayedQuestions = selectedTopic ? allQuestions.filter(q => q.topicName === selectedTopic) : allQuestions;
                 
                 if (questionFilter === 'bookmarked') {
                     displayedQuestions = displayedQuestions.filter(q => bookmarks.includes(q.id));
                 } else if (questionFilter === 'incorrect') {
                     displayedQuestions = displayedQuestions.filter(q => {
                         const ansIdx = attempts[q.id];
                         return ansIdx !== undefined && ['A', 'B', 'C', 'D'][ansIdx] !== q.correctOption;
                     });
                 }

                 const safeQuestionIndex = Math.min(currentQuestionIndex, Math.max(0, displayedQuestions.length - 1));
                 const currentQuestion = displayedQuestions[safeQuestionIndex];

                 const triggerHaptic = (type = 'light') => {
                     if (window.Telegram?.WebApp?.HapticFeedback) {
                         if (type === 'success') window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                         else if (type === 'error') window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                         else window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                     }
                 };

                 const toggleBookmark = (qId) => {
                     setBookmarks(prev => prev.includes(qId) ? prev.filter(id => id !== qId) : [...prev, qId]);
                     triggerHaptic('light');
                 };

                 const handleAttempt = (qId, optionIdx) => {
                     const options = ['A', 'B', 'C', 'D'];
                     const selectedOption = options[optionIdx];
                     const isCorrect = currentQuestion && selectedOption === currentQuestion.correctOption;
                     setPracticeAttempts({...attempts, [qId]: optionIdx});
                     if (isCorrect) triggerHaptic('success');
                     else triggerHaptic('error');
                 };

                 const handleClear = (qId) => {
                     const newAttempts = {...attempts};
                     delete newAttempts[qId];
                     setPracticeAttempts(newAttempts);
                 };

                 const handleNext = () => {
                     if (safeQuestionIndex < displayedQuestions.length - 1) {
                         setCurrentQuestionIndex(safeQuestionIndex + 1);
                         setTimeout(() => {
                             document.querySelector('[data-qa-card]')?.scrollIntoView({behavior: 'smooth', block: 'center'});
                         }, 50);
                     }
                 };

                 const handlePrevious = () => {
                     if (safeQuestionIndex > 0) {
                         setCurrentQuestionIndex(safeQuestionIndex - 1);
                         setTimeout(() => {
                             document.querySelector('[data-qa-card]')?.scrollIntoView({behavior: 'smooth', block: 'center'});
                         }, 50);
                     }
                 };

                 const scrollToQuestion = (idx) => {
                     setPracticeShowPalette(false);
                     setCurrentQuestionIndex(idx);
                     setTimeout(() => {
                         document.querySelector('[data-qa-card]')?.scrollIntoView({behavior: 'smooth', block: 'center'});
                     }, 50);
                 };

                 if (questionsLoading) {
                     return (
                         <div className="pb-32 animate-in fade-in min-h-screen bg-white">
                             <div className="px-4 pb-3 flex items-center justify-between border-b border-gray-200 bg-white relative z-20 pt-4">
                                 <div className="flex items-center gap-3 w-full">
                                     <div className="w-10 h-10 rounded-full bg-gray-200 animate-pulse shrink-0"></div>
                                     <div className="flex-1 space-y-2">
                                         <div className="h-5 bg-gray-200 rounded w-1/2 animate-pulse"></div>
                                         <div className="h-3 bg-gray-200 rounded w-1/4 animate-pulse"></div>
                                     </div>
                                 </div>
                             </div>
                             <div className="bg-white border-b border-gray-200 px-4 py-3 space-y-4">
                                 <div className="h-10 bg-gray-200 rounded-sm w-full animate-pulse"></div>
                                 <div className="flex gap-2">
                                     <div className="h-7 bg-gray-200 rounded-sm w-20 animate-pulse"></div>
                                     <div className="h-7 bg-gray-200 rounded-sm w-24 animate-pulse"></div>
                                 </div>
                                 <div className="flex justify-between items-center">
                                     <div className="h-4 bg-gray-200 rounded w-16 animate-pulse"></div>
                                     <div className="flex gap-2">
                                         <div className="h-6 bg-gray-200 rounded w-20 animate-pulse"></div>
                                         <div className="h-6 bg-gray-200 rounded w-16 animate-pulse"></div>
                                     </div>
                                 </div>
                                 <div className="h-1.5 bg-gray-200 rounded w-full animate-pulse"></div>
                             </div>
                             <div className="px-4 mt-5 max-w-2xl mx-auto">
                                 <div className="bg-white border border-gray-300 shadow-sm rounded-sm p-5 space-y-4">
                                     <div className="flex gap-2 mb-6">
                                         <div className="w-8 h-5 bg-gray-200 rounded animate-pulse shrink-0"></div>
                                         <div className="h-5 bg-gray-200 rounded w-full animate-pulse"></div>
                                     </div>
                                     <div className="space-y-3">
                                         <div className="h-12 bg-gray-100 border border-gray-200 rounded-sm w-full animate-pulse"></div>
                                         <div className="h-12 bg-gray-100 border border-gray-200 rounded-sm w-full animate-pulse"></div>
                                         <div className="h-12 bg-gray-100 border border-gray-200 rounded-sm w-full animate-pulse"></div>
                                         <div className="h-12 bg-gray-100 border border-gray-200 rounded-sm w-full animate-pulse"></div>
                                     </div>
                                 </div>
                             </div>
                         </div>
                     );
                 }

                 const isAnswered = currentQuestion ? attempts[currentQuestion.id] !== undefined : false;
                 const selectedOptionIdx = currentQuestion ? attempts[currentQuestion.id] : -1;
                 const isCorrect = currentQuestion && isAnswered && ['A', 'B', 'C', 'D'][selectedOptionIdx] === currentQuestion.correctOption;

                 return (
                     <div className="pb-32 animate-in slide-in-from-right relative min-h-screen bg-white">
                         <div className="px-4 pb-3 flex items-center justify-between border-b border-gray-200 bg-white relative z-20 pt-4">
                             <div className="flex items-center gap-3">
                                 <button onClick={handleBack} className="w-10 h-10 rounded-full hover:bg-gray-100 text-gray-900"><i className="fa-solid fa-arrow-left"></i></button>
                                 <div className="flex-1 overflow-hidden">
                                     <h2 className="text-lg font-bold text-gray-900 leading-tight truncate">{activePracticeChapter.name}</h2>
                                     <p className="text-[10px] text-gray-500">Question {displayedQuestions.length > 0 ? safeQuestionIndex + 1 : 0} of {displayedQuestions.length}</p>
                                 </div>
                             </div>
                            <PracticeTimer active={true} questionId={currentQuestion?.id} isAnswered={isAnswered} />
                         </div>

                         <div className="bg-white border-b border-gray-200 px-4 py-3">
                             <div className="mb-4">
                                 <div className="flex flex-col gap-2 max-h-[160px] overflow-y-auto no-scrollbar p-2 border border-gray-200 bg-gray-50 rounded-lg shadow-inner">
                                     <button 
                                         onClick={() => { setPracticeSelectedTopic(null); setCurrentQuestionIndex(0); }}
                                         className={`w-full text-left px-4 py-2.5 rounded-md text-sm font-bold transition-all flex justify-between items-center border ${!practiceSelectedTopic ? 'bg-[#2563eb] text-white border-[#2563eb] shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-100'}`}
                                     >
                                         <span className="truncate pr-2">All Topics</span>
                                         <span className={`text-[10px] px-2 py-0.5 rounded-full shrink-0 ${!practiceSelectedTopic ? 'bg-white/20 text-white' : 'bg-gray-200 text-gray-600'}`}>{allQuestions.length} Qs</span>
                                     </button>
                                     {activePracticeChapter.topics?.map((t, idx) => (
                                         <button 
                                             key={idx}
                                             onClick={() => { setPracticeSelectedTopic(t.name); setCurrentQuestionIndex(0); }}
                                             className={`w-full text-left px-4 py-2.5 rounded-md text-sm font-bold transition-all flex justify-between items-center border ${practiceSelectedTopic === t.name ? 'bg-[#2563eb] text-white border-[#2563eb] shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-100'}`}
                                         >
                                             <span className="truncate pr-2">{t.name}</span>
                                             <span className={`text-[10px] px-2 py-0.5 rounded-full shrink-0 ${practiceSelectedTopic === t.name ? 'bg-white/20 text-white' : 'bg-gray-200 text-gray-600'}`}>{t.questions?.length || 0} Qs</span>
                                         </button>
                                     ))}
                                 </div>
                             </div>
                             
                             <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-1">
                                 <button onClick={() => {setQuestionFilter('all'); setCurrentQuestionIndex(0);}} className={`px-4 py-1.5 rounded-sm text-xs font-semibold whitespace-nowrap transition-colors border ${questionFilter === 'all' ? 'bg-[#2563eb] text-white border-[#2563eb]' : 'bg-white text-gray-700 border-gray-300'}`}><i className="fa-solid fa-list-ol mr-1"></i> All Qs</button>
                                 <button onClick={() => {setQuestionFilter('bookmarked'); setCurrentQuestionIndex(0);}} className={`px-4 py-1.5 rounded-sm text-xs font-semibold whitespace-nowrap transition-colors border ${questionFilter === 'bookmarked' ? 'bg-yellow-500 text-white border-yellow-500' : 'bg-white text-gray-700 border-gray-300'}`}><i className="fa-solid fa-bookmark mr-1"></i> Bookmarked</button>
                                 <button onClick={() => {setQuestionFilter('incorrect'); setCurrentQuestionIndex(0);}} className={`px-4 py-1.5 rounded-sm text-xs font-semibold whitespace-nowrap transition-colors border ${questionFilter === 'incorrect' ? 'bg-red-500 text-white border-red-500' : 'bg-white text-gray-700 border-gray-300'}`}><i className="fa-solid fa-times-circle mr-1"></i> Incorrect</button>
                             </div>

                             <div className="flex justify-between items-center mb-2">
                                 <span className="text-xs font-semibold text-gray-600">Progress</span>
                                 <div className="flex items-center gap-3">
                                     <span className="text-xs font-semibold text-gray-900">{displayedQuestions.length > 0 ? safeQuestionIndex + 1 : 0}/{displayedQuestions.length}</span>
                                     <button onClick={() => setPracticeShowPalette(true)} className="text-blue-600 hover:text-blue-700 transition-colors flex items-center justify-center bg-blue-50 px-3 py-1 rounded-md border border-blue-200 font-semibold gap-1.5 shadow-sm">
                                         <i className="fa-solid fa-table-cells-large text-base"></i> Palette
                                     </button>
                                 </div>
                             </div>
                             <div className="w-full bg-gray-200 rounded-sm h-1.5">
                                 <div className="bg-[#2563eb] h-1.5 rounded-sm transition-all" style={{width: `${displayedQuestions.length > 0 ? ((safeQuestionIndex + 1) / displayedQuestions.length) * 100 : 0}%`}}></div>
                             </div>
                         </div>

                         <div data-qa-card className="px-4 mt-5 max-w-2xl mx-auto">
                             {displayedQuestions.length === 0 ? (
                                 <div className="bg-white border border-gray-300 shadow-sm overflow-hidden py-12 text-center px-4 rounded-sm">
                                     <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400 text-2xl"><i className="fa-solid fa-box-open"></i></div>
                                     <h3 className="font-bold text-gray-900 mb-2">No questions found</h3>
                                     <p className="text-sm text-gray-500 mb-4">No questions match your current filters.</p>
                                     <button onClick={() => {setQuestionFilter('all'); setPracticeSelectedTopic(null); }} className="bg-[#2563eb] text-white font-semibold text-sm px-4 py-2 rounded-sm">Clear Filters</button>
                                 </div>
                             ) : (
                             <div className="bg-white border border-gray-300 shadow-sm overflow-hidden rounded-sm">
                                 <div className="p-5">
                                     <div className="flex justify-between items-start gap-3 mb-4">
                                         <div className="text-gray-900 leading-relaxed text-base font-normal">
                                             <span className="font-bold text-gray-900 mr-1">Q{safeQuestionIndex + 1}.</span> <FormattedText text={currentQuestion.text} className="inline" />
                                         </div>
                                         <button onClick={() => toggleBookmark(currentQuestion.id)} className={`shrink-0 p-1 text-xl transition-all active:scale-90 ${bookmarks.includes(currentQuestion.id) ? 'text-yellow-500 drop-shadow-sm' : 'text-gray-300 hover:text-gray-400'}`}>
                                             <i className={`fa-${bookmarks.includes(currentQuestion.id) ? 'solid' : 'regular'} fa-bookmark`}></i>
                                         </button>
                                     </div>
                                     {currentQuestion.imageUrl && (
                                         <div className="mb-4 rounded-sm overflow-hidden bg-gray-50 flex items-center justify-center border border-gray-200 p-2">
                                             <img src={currentQuestion.imageUrl} alt="Question Image" className="w-full h-full object-contain" onError={(e) => {e.target.style.display = 'none'}} />
                                         </div>
                                     )}
                                     <div className="flex flex-col border border-gray-300 rounded-sm overflow-hidden mb-5">
                                         {currentQuestion.options.map((opt, idx) => {
                                             const isSelected = selectedOptionIdx === idx;
                                             const isCorrectChoice = ['A', 'B', 'C', 'D'][idx] === currentQuestion.correctOption;
                                             let bg = "bg-white text-gray-800 hover:bg-gray-50";
                                             let numBg = "border-r border-gray-300 bg-gray-50 text-gray-600";
                                             if (isAnswered) {
                                                 if (isCorrectChoice) {
                                                     bg = "bg-[#e6f4ea] text-[#1e7e34] font-semibold";
                                                     numBg = "border-r border-[#cce8d6] bg-[#cce8d6] text-[#1e7e34] font-semibold";
                                                 } else if (isSelected) {
                                                     bg = "bg-[#fce8e6] text-[#c5221f] font-semibold";
                                                     numBg = "border-r border-[#fad2cf] bg-[#fad2cf] text-[#c5221f] font-semibold";
                                                 } else {
                                                     bg = "opacity-60 bg-white";
                                                 }
                                             }
                                             return (
                                                 <button key={idx} disabled={isAnswered} onClick={() => handleAttempt(currentQuestion.id, idx)} className={`np-grid-btn w-full text-left flex items-stretch transition-all border-b border-gray-300 last:border-b-0 ${bg} disabled:cursor-not-allowed`}>
                                                     <div className={`w-10 flex items-center justify-center shrink-0 font-semibold text-[15px] ${numBg}`}>({idx + 1})</div>
                                                     <div className="p-3 text-sm w-full text-left break-words overflow-hidden"><FormattedText text={opt} /></div>
                                                 </button>
                                             );
                                         })}
                                     </div>
                                 </div>
                                 {isAnswered && (
                                     <div className={`p-4 border-t ${isCorrect ? 'bg-[#e6f4ea] border-[#cce8d6]' : 'bg-[#fce8e6] border-[#fad2cf]'} animate-in fade-in`}>
                                         <div className="flex items-center justify-between mb-3">
                                             <div className="flex items-center gap-2">
                                                 <i className={`fa-solid ${isCorrect ? 'fa-check-circle text-green-600' : 'fa-times-circle text-red-600'} text-lg`}></i>
                                                 <span className={`font-semibold text-sm ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                                     {isCorrect ? 'Correct Answer' : 'Incorrect Answer'}
                                                 </span>
                                             </div>
                                             <button onClick={() => handleClear(currentQuestion.id)} className="text-xs font-semibold text-gray-600 hover:text-gray-900 border border-gray-300 bg-white px-2 py-1 rounded-sm shadow-sm transition-colors">
                                                 <i className="fa-solid fa-rotate-left"></i> Clear
                                             </button>
                                         </div>
                                         
                                         <div className="flex flex-wrap gap-2">
                                             <QuestionAIAssistant q={currentQuestion} attemptIdx={selectedOptionIdx} />
                                         </div>
                                     </div>
                                 )}
                                 
                                 <div className="border-t border-gray-300 bg-gray-50 p-3 flex justify-between items-center">
                                     <button onClick={() => setShowNoteInput(prev => ({...prev, [currentQuestion.id]: !prev[currentQuestion.id]}))} className="text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1">
                                         <i className="fa-solid fa-pen-to-square"></i> {questionNotes[currentQuestion.id] ? 'Edit Notes' : 'Add Notes'}
                                     </button>
                                     {questionNotes[currentQuestion.id] && !showNoteInput[currentQuestion.id] && (
                                         <span className="text-[10px] bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-sm font-semibold border border-yellow-200"><i className="fa-solid fa-note-sticky"></i> Note Attached</span>
                                     )}
                                 </div>
                                 {showNoteInput[currentQuestion.id] && (
                                     <div className="p-3 bg-white border-t border-gray-300 animate-in fade-in">
                                         <textarea
                                             value={questionNotes[currentQuestion.id] || ''}
                                             onChange={(e) => setQuestionNotes(prev => ({...prev, [currentQuestion.id]: e.target.value}))}
                                             placeholder="Write down your notes here..."
                                             className="w-full bg-white border border-gray-300 rounded-sm text-sm text-gray-800 focus:border-blue-500 focus:ring-0 p-3 placeholder-gray-400 resize-none h-24 outline-none"
                                         ></textarea>
                                     </div>
                                 )}
                             </div>
                             )}
                         </div>
                         <div className="fixed bottom-0 w-full max-w-md bg-gray-100 border-t border-gray-300 p-3 flex gap-3 z-[45]">
                             <button onClick={handlePrevious} disabled={safeQuestionIndex === 0} className="flex-1 bg-white border border-gray-300 text-gray-800 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed font-semibold py-2.5 rounded-sm flex items-center justify-center gap-2 shadow-sm">
                                 <i className="fa-solid fa-arrow-left"></i> Previous
                             </button>
                             <button onClick={handleNext} disabled={safeQuestionIndex >= displayedQuestions.length - 1} className="flex-1 bg-[#2563eb] border border-[#2563eb] text-white hover:bg-[#1d4ed8] disabled:opacity-50 disabled:cursor-not-allowed font-semibold py-2.5 rounded-sm flex items-center justify-center gap-2 shadow-sm">
                                 Save & Next <i className="fa-solid fa-arrow-right"></i>
                             </button>
                         </div>
                         {showPalette && (
                             <div className="fixed inset-0 bg-black/50 z-[99999] flex flex-col justify-end animate-in fade-in" onClick={() => setPracticeShowPalette(false)}>
                                 <div className="bg-white rounded-t-sm p-4 max-h-[70vh] overflow-y-auto w-full max-w-md mx-auto" onClick={e => e.stopPropagation()}>
                                     <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-2">
                                         <h3 className="font-bold text-gray-800 text-lg">Question Palette</h3>
                                         <button onClick={() => setPracticeShowPalette(false)} className="text-gray-500 hover:text-gray-700"><i className="fa-solid fa-xmark text-xl"></i></button>
                                     </div>
                                     <div className="grid grid-cols-6 gap-2">
                                         {displayedQuestions.map((q, qIdx) => {
                                             const isAns = attempts[q.id] !== undefined;
                                             const selectedIdx = attempts[q.id];
                                             const isCorrect = isAns && ['A', 'B', 'C', 'D'][selectedIdx] === q.correctOption;
                                             let bgClass = "bg-white border border-gray-300 text-gray-700 hover:bg-gray-50";
                                             if (isAns) bgClass = isCorrect ? "bg-[#1e7e34] border-[#1e7e34] text-white" : "bg-[#c5221f] border-[#c5221f] text-white";
                                             return (
                                                 <button key={q.id} onClick={() => scrollToQuestion(qIdx)} className={`w-full aspect-square rounded-sm flex items-center justify-center font-semibold text-sm shadow-sm transition-all ${bgClass} ${safeQuestionIndex === qIdx ? 'ring-2 ring-blue-500 ring-offset-1' : ''}`}>
                                                     {qIdx + 1}
                                                 </button>
                                             );
                                         })}
                                     </div>
                                     <div className="mt-4 flex flex-wrap gap-3 text-xs text-gray-600 border-t border-gray-200 pt-3">
                                         <div className="flex items-center gap-1"><div className="w-3 h-3 bg-white border border-gray-300"></div> Not Answered</div>
                                         <div className="flex items-center gap-1"><div className="w-3 h-3 bg-[#1e7e34]"></div> Correct</div>
                                         <div className="flex items-center gap-1"><div className="w-3 h-3 bg-[#c5221f]"></div> Incorrect</div>
                                     </div>
                                 </div>
                             </div>
                         )}
                     </div>
                 );
             }

             if (activePracticeSubject) {
                 return (
                     <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-xl font-bold text-gray-900 dark:text-white">{activePracticeSubject.name}</h2>
                         </div>
                         <h3 className="font-semibold text-[#00a651] mb-3 uppercase tracking-wider text-xs bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 inline-block px-2 py-1 rounded-md">Chapter Selection</h3>
                         <div className="space-y-3">
                             {activePracticeSubject.chapters && activePracticeSubject.chapters.length > 0 ? (
                                 activePracticeSubject.chapters.map((chap, i) => (
                                     <div key={i} onClick={() => { setActivePracticeChapter(chap); setShowQuiz(false); }} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex justify-between items-center shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all group">
                                         <div>
                                             <h4 className="font-semibold text-sm text-gray-800 dark:text-gray-200 group-hover:text-[#00a651] transition-colors">{chap.name}</h4>
                                             <p className="text-[10px] font-semibold text-gray-500 mt-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 inline-block px-2 py-0.5 rounded-sm">{chap.topics?.length || 0} Topics</p>
                                         </div>
                                         <i className="fa-solid fa-chevron-right text-gray-400 group-hover:text-[#00a651] transition-colors"></i>
                                     </div>
                                 ))
                             ) : (
                                 <p className="text-sm text-gray-500 text-center mt-8">No chapters available</p>
                             )}
                         </div>
                     </div>
                 );
             }

             if (activePracticeFile) {
                 return (
                     <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-xl font-bold text-gray-900 dark:text-white">{activePracticeFile.name} Subjects</h2>
                         </div>
                         
                         {qbankError && (
                             <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-5 shadow-sm text-sm text-red-800 dark:text-red-200">
                                 <div className="font-bold flex items-center gap-2 mb-2">
                                     <i className="fa-solid fa-cloud"></i> Network Issue
                                 </div>
                                 <p className="mb-2 opacity-90">{qbankError}</p>
                             </div>
                         )}

                         <div className="grid grid-cols-2 gap-3">
                             {qbankData.length > 0 ? qbankData.map(sub => (
                                 <div key={sub.id} onClick={() => setActivePracticeSubject(sub)} className="bg-white dark:bg-gray-900 p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all flex flex-col items-center justify-center text-center group">
                                     <span className="text-3xl mb-2 group-hover:scale-110 transition-transform">{sub.icon}</span>
                                     <h3 className="font-bold text-gray-800 dark:text-gray-200 mt-2 group-hover:text-[#00a651] transition-colors">{sub.name}</h3>
                                     <p className="text-[10px] text-gray-500 mt-1">{sub.chapters?.length || 0} Chapters</p>
                                 </div>
                             )) : (
                                 <p className="text-sm text-gray-500 text-center col-span-2 py-8">Loading subjects...</p>
                             )}
                         </div>
                     </div>
                 );
             }

             if (activePracticeBatch) {
                 return (
                     <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-xl font-bold text-gray-900 dark:text-white">{activePracticeBatch.name}</h2>
                         </div>
                         <div className="space-y-3">
                             {activePracticeBatch.files.map((file, i) => (
                                 <div key={i} onClick={() => setActivePracticeFile(file)} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex items-center gap-4 shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all group">
                                     <div className="w-10 h-10 rounded-xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-[#00a651] flex items-center justify-center text-lg"><i className="fa-solid fa-file-alt"></i></div>
                                     <div className="flex-1">
                                         <h3 className="font-semibold text-base text-gray-800 dark:text-gray-200 group-hover:text-[#00a651] transition-colors">{file.name}</h3>
                                         <p className="text-xs text-gray-500">Practice Module</p>
                                     </div>
                                     <i className="fa-solid fa-chevron-right text-gray-400 group-hover:text-[#00a651] transition-colors"></i>
                                 </div>
                             ))}
                         </div>
                     </div>
                 );
             }

             const PRACTICE_BATCHES = [
                 { id: 'pb_allen', name: 'LN modules', type: 'ln', files: [{ id: 'pf_race', name: 'Race' }] },
                 { id: 'pb_pw', name: 'Bablu Dablu modules', type: 'pw', files: [{ id: 'pf_dpp', name: 'DPP' }] }
             ];

             return (
                     <div className="pb-24 pt-6 px-5 animate-in fade-in min-h-screen">
                     <div className="flex justify-between items-center mb-6">
                         <div className="flex items-center gap-3">
                             <AtaxyLogo className="w-10 h-10 rounded-xl shadow-md border border-gray-200" />
                             <h2 className="text-2xl font-black text-gray-900 dark:text-white tracking-wider">ATAXY BANK</h2>
                         </div>
                     </div>
                     <div className="space-y-4">
                         {PRACTICE_BATCHES.map(batch => (
                                 <div key={batch.id} onClick={() => setActivePracticeBatch(batch)} className={`p-5 rounded-2xl cursor-pointer hover:scale-[1.02] active:scale-95 transition-all relative overflow-hidden ${batch.type === 'ln' ? 'bg-[#00a651] border border-[#008c44] shadow-[0_0_15px_rgba(0,166,81,0.3)] text-white' : 'bg-black dark:bg-gray-900 border border-gray-800 shadow-lg text-white'}`}>
                                 <div className="relative z-10">
                                         <h3 className="text-xl font-black mb-1 text-white">{batch.name}</h3>
                                         <p className={`text-xs font-medium ${batch.type === 'ln' ? 'text-green-100' : 'text-gray-400'}`}>{batch.files.length} Modules Available</p>
                                 </div>
                                     <i className={`fa-solid ${batch.type === 'ln' ? 'fa-book text-green-800/30' : 'fa-layer-group text-white/5'} absolute -right-4 -bottom-4 text-6xl`}></i>
                             </div>
                         ))}
                     </div>
                 </div>
             );
          };

          // --- BOOKMARK VIEWER (ADVANCED FILTERING) ---
          const renderBookmarkViewer = () => {
              const allBookmarked = [];
              qbankData.forEach(sub => {
                  sub.chapters?.forEach(chap => {
                      chap.topics?.forEach(top => {
                          top.questions?.forEach(q => {
                              if (bookmarks.includes(q.id)) {
                                  allBookmarked.push({
                                      ...q,
                                      subjectName: sub.name,
                                      chapterName: chap.name,
                                      topicName: top.name
                                  });
                              }
                          });
                      });
                  });
              });

              let subjects = new Set();
              let chapters = new Set();
              let topics = new Set();

              allBookmarked.forEach(q => {
                  subjects.add(q.subjectName);
                  if (!bookmarkSubjectFilter || q.subjectName === bookmarkSubjectFilter) {
                      chapters.add(q.chapterName);
                      if (!bookmarkChapterFilter || q.chapterName === bookmarkChapterFilter) {
                          topics.add(q.topicName);
                      }
                  }
              });

              const filtered = allBookmarked.filter(q => {
                  if (bookmarkSearch && !q.text.toLowerCase().includes(bookmarkSearch.toLowerCase())) return false;
                  if (bookmarkSubjectFilter && q.subjectName !== bookmarkSubjectFilter) return false;
                  if (bookmarkChapterFilter && q.chapterName !== bookmarkChapterFilter) return false;
                  if (bookmarkTopicFilter && q.topicName !== bookmarkTopicFilter) return false;
                  return true;
              });

              return (
                  <div className="fixed inset-x-0 bottom-0 top-[calc(60px_+_env(safe-area-inset-top,_0px))] z-[100000] bg-gray-50 dark:bg-gray-950 flex flex-col animate-in slide-in-from-bottom duration-300 max-w-md mx-auto shadow-2xl">
                      <div className="flex items-center justify-between p-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm z-10">
                          <div className="flex items-center gap-3">
                              <button onClick={() => setShowBookmarkViewer(false)} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors flex items-center justify-center text-gray-800 dark:text-gray-200">
                                  <i className="fa-solid fa-arrow-left"></i>
                              </button>
                              <AtaxyLogo className="w-8 h-8 rounded-lg shadow-sm border border-yellow-200" />
