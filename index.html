<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATAXY Learning</title>
    <link rel="icon" href="data:,">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; scrollbar-width: none; 
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            touch-action: manipulation;
        }
        .yt-wrapper iframe { pointer-events: none !important; transform: scale(1.08); }
        .watermark-marquee {
            animation: moveWatermark 20s linear infinite alternate;
            pointer-events: none;
        }
        @keyframes moveWatermark {
            0% { transform: translate(-10%, -10%) rotate(-20deg); }
            100% { transform: translate(10%, 10%) rotate(-20deg); }
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .np-grid-btn { border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }
        .dark .np-grid-btn { border-color: #374151; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 scroll-smooth">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useRef, useEffect, useMemo } = React;

        // =========================================================================
        // ⬇️ ADD YOUR PRACTICE QUESTIONS HERE (ALIEN PLATFORM QBANK) ⬇️
        // =========================================================================
        const ALIEN_QBANK = [
            { id: "sub_phy", name: "Physics", icon: "⚛️", chapters: [
                { id: "c_phy_1", name: "Kinematics 1D", topics: [
                    { id: "t_phy_1_1", name: "Distance & Displacement", questions: [
                        { id: "q1", text: "A particle is moving in a circular path of radius r. The displacement after half a circle would be:", options: ["Zero", "πr", "2r", "2πr"], correct: 2, ncert: true, accuracy: "88%" },
                        { id: "q2", text: "Which of the following is a scalar quantity?", options: ["Displacement", "Distance", "Velocity", "Acceleration"], correct: 1, ncert: true, accuracy: "95%" }
                    ]}
                ]}
            ]},
            { id: "sub_chem", name: "Chemistry", icon: "⚗️", chapters: [
                { id: "c_chem_1", name: "Some Basic Concepts of Chemistry", topics: [
                    { id: "t_chem_1_1", name: "Mole Concept", questions: [
                        { id: "q3", text: "The number of atoms in 0.1 mol of a triatomic gas is: (NA = 6.02x10^23)", options: ["6.026 x 10^22", "1.806 x 10^23", "3.600 x 10^23", "1.806 x 10^22"], correct: 1, ncert: false, accuracy: "76%" }
                    ]}
                ]}
            ]},
            { id: "sub_bio", name: "Biology", icon: "🌿", chapters: [
                { id: "c_bio_1", name: "The Living World", topics: [
                    { id: "t_bio_1_1", name: "What is Living?", questions: [
                        { id: "q4", text: "The system of the naming of organisms was developed by", options: ["Robert Hooke", "Carolus Linnaeus", "T. Schwann", "Ernst Mayr"], correct: 1, ncert: true, accuracy: "91%" },
                        { id: "q5", text: "Which of the following are twin characteristics of growth?", options: ["Increase in mass and number", "Increase in weight and volume", "Increase in height and radius", "None of these"], correct: 0, ncert: true, accuracy: "85%" }
                    ]}
                ]}
            ]}
        ];
        // =========================================================================
        // ⬆️ END OF PRACTICE QUESTIONS ⬆️
        // =========================================================================

        const PDFViewer = ({ url, title, onClose }) => (
            <div className="fixed inset-0 z-[100000] bg-white flex flex-col animate-in slide-in-from-bottom duration-300 max-w-md mx-auto shadow-2xl">
                <div className="flex items-center gap-3 p-4 bg-white border-b border-gray-200 text-gray-800 shadow-sm z-10">
                    <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <i className="fa-solid fa-arrow-left text-lg"></i>
                    </button>
                    <h2 className="font-bold text-base leading-tight truncate">{title}</h2>
                </div>
                <div className="flex-1 relative bg-gray-50">
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none"><i className="fa-solid fa-spinner fa-spin text-3xl text-gray-300"></i></div>
                    <iframe src={url} className="absolute inset-0 w-full h-full border-none relative z-10 bg-white" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
        );

        // ==========================================
        // 🔒 PERSISTENT GATEKEEPER
        // ==========================================
        const Gatekeeper = ({ onVerify }) => {
            const [step, setStep] = useState(() => parseInt(localStorage.getItem('ataxy_verify_step') || '0'));
            const [verifying, setVerifying] = useState(false);
            const [isCheckingSaved, setIsCheckingSaved] = useState(true);
            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || { first_name: "Student", id: "1001", username: "student" };

            useEffect(() => {
                const checkVerification = async () => {
                    const savedState = localStorage.getItem('ataxy_verified');
                    if (savedState === 'true') {
                        onVerify(tgUser);
                        return;
                    }
                    
                    if (tgUser?.id && String(tgUser.id) !== "1001") {
                        try {
                            const res = await fetch('/api/neet/users');
                            if (res.ok) {
                                const data = await res.json();
                                const isRegistered = data.users?.some(u => String(u.telegram_user_id) === String(tgUser.id));
                                if (isRegistered) {
                                    localStorage.setItem('ataxy_verified', 'true');
                                    onVerify(tgUser);
                                    return;
                                }
                            }
                        } catch (e) {
                            console.warn("Could not check user status", e);
                        }
                    }
                    setIsCheckingSaved(false);
                };
                checkVerification();
            }, []);

            const handleVerify = () => {
                setVerifying(true);
                setTimeout(() => {
                    localStorage.setItem('ataxy_verified', 'true');
                    localStorage.removeItem('ataxy_verify_step');
                    setVerifying(false);
                    onVerify(tgUser);
                }, 1500);
            };

            const handleJoin = (url, nextStep) => {
                setStep(nextStep);
                localStorage.setItem('ataxy_verify_step', nextStep.toString());
                if (window.Telegram?.WebApp?.openTelegramLink) {
                    window.Telegram.WebApp.openTelegramLink(url);
                } else {
                    window.open(url, "_blank");
                }
            };

            if (isCheckingSaved) return <div className="min-h-screen bg-gray-900"></div>;

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-center text-white">
                    <div className="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center text-4xl mb-6 shadow-[0_0_30px_rgba(37,99,235,0.5)]">
                        <i className="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h1 className="text-3xl font-black mb-2">ATAXY Learning</h1>
                    <p className="text-gray-400 mb-8 text-sm">Welcome, {tgUser.first_name}! Complete these steps to access your batches.</p>

                    <div className="w-full space-y-4 max-w-sm">
                        <div className={`p-4 rounded-xl border flex items-center justify-between transition-all ${step >= 1 ? 'bg-green-500/10 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                            <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${step >= 1 ? 'bg-green-500 text-white' : 'bg-gray-800'}`}>1</div>
                                <div className="text-left"><h3 className="font-bold">ATAXY Mentor</h3><p className="text-xs text-gray-400">Official Channel</p></div>
                            </div>
                            <button onClick={() => handleJoin("https://t.me/ATAXYmentor", Math.max(step, 1))} className={`px-4 py-2 rounded-lg font-bold text-sm ${step >= 1 ? 'bg-green-500/20 text-green-500' : 'bg-blue-600 text-white'}`}>
                                {step >= 1 ? 'Joined' : 'Join'}
                            </button>
                        </div>
                        <div className={`p-4 rounded-xl border flex items-center justify-between transition-all ${step >= 2 ? 'bg-green-500/10 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                            <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${step >= 2 ? 'bg-green-500 text-white' : 'bg-gray-800'}`}>2</div>
                                <div className="text-left"><h3 className="font-bold">Discussion Group</h3><p className="text-xs text-gray-400">Doubt Solving</p></div>
                            </div>
                            <button onClick={() => handleJoin("https://t.me/ATAXYmentorDiscussion", 2)} disabled={step < 1} className={`px-4 py-2 rounded-lg font-bold text-sm ${step >= 2 ? 'bg-green-500/20 text-green-500' : step < 1 ? 'bg-gray-700 text-gray-500' : 'bg-blue-600 text-white'}`}>
                                {step >= 2 ? 'Joined' : 'Join'}
                            </button>
                        </div>
                    </div>
                    <div className="mt-10 w-full max-w-sm flex flex-col gap-3">
                        <button onClick={handleVerify} disabled={step < 2 || verifying} className={`w-full py-4 rounded-xl font-black text-lg transition-all shadow-lg ${step === 2 && !verifying ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:scale-105' : 'bg-gray-800 text-gray-500'}`}>
                            {verifying ? <i className="fa-solid fa-spinner fa-spin"></i> : "Verify & Login"}
                        </button>
                        {step < 2 && (
                            <button onClick={() => { setStep(2); localStorage.setItem('ataxy_verify_step', '2'); }} className="text-sm text-gray-400 hover:text-white transition-colors underline">
                                Already joined? Click here to skip
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🚀 SMART PRACTICE QUESTION CARD (NEETPREP REPLICA)
        // ==========================================
        const QuestionCard = ({ q, attemptIdx, onAttempt, onClear }) => {
            const isAnswered = attemptIdx !== undefined;

            return (
                <div id={`question-card-${q.id}`} className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden mb-6 scroll-mt-[180px]">
                    <div className="p-5">
                        <div className="flex justify-between items-start mb-4 gap-2">
                            <p className="font-bold text-gray-900 dark:text-white leading-relaxed text-[15px]"><span className="text-gray-900 dark:text-white mr-1 text-base">Q{q.globalIndex}.</span> {q.text}</p>
                            <span className="bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-[9px] px-2 py-1 rounded font-bold whitespace-nowrap line-clamp-1 max-w-[100px] shrink-0 uppercase tracking-wider">{q.topicName}</span>
                        </div>
                        
                        {/* Options List */}
                        <div className="flex flex-col border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden mb-5">
                            {q.options.map((opt, idx) => {
                                const isSelected = attemptIdx === idx;
                                const isCorrectChoice = idx === q.correct;
                                
                                let bg = "bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200";
                                let numBg = "border-r border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-500";
                                
                                if (isAnswered) {
                                    if (isCorrectChoice) {
                                        bg = "bg-[#e6f4ea] dark:bg-green-900/40 text-[#1e7e34] dark:text-green-300 font-bold";
                                        numBg = "border-r border-[#cce8d6] dark:border-green-800 bg-[#cce8d6] dark:bg-green-800 text-[#1e7e34] dark:text-green-200";
                                    } else if (isSelected) {
                                        bg = "bg-[#fce8e6] dark:bg-red-900/40 text-[#c5221f] dark:text-red-300 font-bold";
                                        numBg = "border-r border-[#fad2cf] dark:border-red-800 bg-[#fad2cf] dark:bg-red-800 text-[#c5221f] dark:text-red-200";
                                    } else {
                                        bg = "opacity-50 bg-white dark:bg-gray-800";
                                    }
                                }

                                return (
                                    <div key={idx} className={`np-grid-btn w-full text-left flex items-stretch transition-colors ${bg}`}>
                                        <div className={`w-10 flex items-center justify-center shrink-0 font-bold text-sm ${numBg}`}>{idx + 1}</div>
                                        <div className="p-3.5 text-sm w-full">{opt}</div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* Badges */}
                        <div className="flex gap-2 mb-2">
                            {q.ncert && <span className="bg-[#d49a4e] text-white text-[10px] font-bold px-3 py-1 rounded uppercase shadow-sm">From NCERT</span>}
                            {q.accuracy && <span className="bg-[#d49a4e] text-white text-[10px] font-bold px-3 py-1 rounded uppercase shadow-sm">{q.accuracy} Correct</span>}
                        </div>
                    </div>

                    {/* Bottom Action Area */}
                    <div className="bg-gray-50 dark:bg-gray-800 p-3.5 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-3">
                        {/* 4 Option Buttons Array */}
                        <div className="grid grid-cols-4 gap-2">
                            {[0, 1, 2, 3].map(btnIdx => {
                                const isSelected = attemptIdx === btnIdx;
                                const isCorrectChoice = btnIdx === q.correct;
                                let btnClass = "bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 shadow-sm";
                                
                                if(isAnswered) {
                                    if(isCorrectChoice) btnClass = "bg-[#0eb582] text-white border-[#0eb582]";
                                    else if(isSelected) btnClass = "bg-[#e53935] text-white border-[#e53935]";
                                    else btnClass = "bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-400 opacity-50";
                                }

                                return (
                                    <button key={btnIdx} disabled={isAnswered} onClick={() => onAttempt(q.id, btnIdx)} className={`py-2 rounded-lg border font-bold flex flex-col items-center justify-center transition-all ${btnClass}`}>
                                        <span>{btnIdx + 1}</span>
                                        {isAnswered && <span className="text-[8px] font-normal opacity-80 mt-0.5">{isCorrectChoice ? 'Correct' : isSelected ? 'Wrong' : ''}</span>}
                                    </button>
                                )
                            })}
                        </div>

                        {/* After Attempt Actions */}
                        {isAnswered && (
                            <div className="flex flex-wrap gap-2 justify-between items-center animate-in fade-in pt-2">
                                <div className="flex gap-2">
                                    <button className="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 text-[11px] font-bold px-4 py-2 rounded-full shadow-sm hover:bg-gray-100 transition-colors">View Explanation</button>
                                    <button className="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 text-[11px] font-bold px-4 py-2 rounded-full shadow-sm hover:bg-gray-100 transition-colors">Video Ref.</button>
                                </div>
                                <button onClick={() => onClear(q.id)} className="text-red-500 hover:text-red-600 text-xs font-bold p-2 transition-colors flex items-center gap-1"><i className="fa-solid fa-rotate-left"></i> Clear</button>
                            </div>
                        )}
                    </div>
                </div>
            )
        }


        // ==========================================
        // 🚀 LIVE GLOBAL CHAT (FIREBASE CLOUD INTEGRATION)
        // ==========================================
        const ChatView = ({ user }) => {
            const [msg, setMsg] = useState('');
            const [showProfile, setShowProfile] = useState(null);
            const [chats, setChats] = useState([]);
            const [fbApp, setFbApp] = useState(null);
            const chatEndRef = useRef(null);

            // FIREBASE INITIALIZATION & REAL-TIME LISTENER
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        
                        // Empty config defaults to a mocked local array if Firebase credentials aren't supplied in env.
                        // You MUST add valid Firebase config to `__firebase_config` global variable to go live!
                        let app, db, auth;
                        if(window.__firebase_config) {
                             app = initializeApp(JSON.parse(window.__firebase_config));
                             auth = getAuth(app);
                             db = getFirestore(app);
                             await signInAnonymously(auth);
                        }
                        
                        setFbApp({ db, addDoc, collection, serverTimestamp });

                        if(db) {
                            // Listen to live database
                            const q = query(collection(db, 'ataxy_global_chat'));
                            onSnapshot(q, (snapshot) => {
                                const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                // Sort manually as per Rule 2 (No orderBy)
                                msgs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                                setChats(msgs);
                            }, (err) => console.error(err));
                        } else {
                            // Fallback to local storage if Firebase is not connected yet
                            setChats(JSON.parse(localStorage.getItem('ataxy_global_chat') || '[]'));
                        }
                    } catch(e) { console.error(e); }
                };
                initFirebase();
            }, []);

            useEffect(() => { 
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
                if(!fbApp?.db) localStorage.setItem('ataxy_global_chat', JSON.stringify(chats));
            }, [chats]);

            const sendMsg = async (e) => {
                e.preventDefault();
                if (!msg.trim()) return;
                
                const newMsg = {
                    name: user.first_name, 
                    tgId: user.id || "101", 
                    username: user.username || "student", 
                    text: msg, 
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };

                setMsg(''); // clear input instantly
                
                if(fbApp?.db) {
                    await fbApp.addDoc(fbApp.collection(fbApp.db, 'ataxy_global_chat'), { ...newMsg, createdAt: fbApp.serverTimestamp() });
                } else {
                    setChats(prev => [...prev, { id: Date.now(), ...newMsg }]);
                }
            };

            return (
                <div className="pb-[80px] pt-[60px] animate-in fade-in flex flex-col h-screen">
                    <div className="fixed top-0 w-full max-w-md bg-white dark:bg-gray-900 px-4 py-3 flex items-center justify-between shadow-sm border-b border-gray-200 dark:border-gray-800 pt-[60px] z-20">
                        <div>
                            <h2 className="font-bold text-gray-900 dark:text-white leading-tight text-lg">Global Discussion</h2>
                            <p className="text-[10px] text-green-500 font-bold tracking-wide flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> {fbApp?.db ? 'Live' : 'Local'} Network Connected</p>
                        </div>
                        <i className="fa-solid fa-users text-gray-400"></i>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 pt-[130px]">
                        <div className="text-center"><span className="bg-gray-200 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-[10px] px-3 py-1 rounded-full font-bold">Welcome to ATAXY Community</span></div>
                        {chats.map((c, i) => (
                            <div key={i} className={`flex flex-col ${c.name === user.first_name ? 'items-end' : 'items-start'}`}>
                                <span onClick={() => setShowProfile(c)} className="text-[10px] text-gray-500 dark:text-gray-400 mb-1 ml-1 font-bold flex items-center gap-1 cursor-pointer hover:underline">
                                    {c.name} {c.admin && <i className="fa-solid fa-circle-check text-blue-500"></i>}
                                </span>
                                <div className={`max-w-[80%] p-3 rounded-2xl shadow-sm ${c.name === user.first_name ? 'bg-blue-600 text-white rounded-br-none' : c.admin ? 'bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 text-gray-800 dark:text-gray-200 rounded-bl-none' : 'bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-800 dark:text-gray-200 rounded-bl-none'}`}>
                                    <p className="text-sm">{c.text}</p>
                                    <div className={`text-[9px] mt-1 text-right ${c.name === user.first_name ? 'text-blue-200' : 'text-gray-400 dark:text-gray-500'}`}>{c.time}</div>
                                </div>
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    <form onSubmit={sendMsg} className="fixed bottom-[65px] w-full max-w-md bg-white dark:bg-gray-900 p-3 border-t border-gray-200 dark:border-gray-800 flex gap-2 z-20">
                        <input value={msg} onChange={e => setMsg(e.target.value)} type="text" placeholder="Type a message..." className="flex-1 bg-gray-100 dark:bg-gray-800 border-none rounded-full px-4 py-2.5 text-sm focus:ring-0 focus:outline-none text-gray-900 dark:text-white" />
                        <button type="submit" className="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 shadow-md"><i className="fa-solid fa-paper-plane text-sm"></i></button>
                    </form>

                    {showProfile && (
                        <div className="fixed inset-0 bg-black/60 z-[99999] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowProfile(null)}>
                            <div className="bg-white dark:bg-gray-900 rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl border border-gray-200 dark:border-gray-800" onClick={e=>e.stopPropagation()}>
                                <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-black mb-4 uppercase shadow-inner">{showProfile.name[0]}</div>
                                <h3 className="text-xl font-black text-gray-900 dark:text-white flex items-center justify-center gap-1">
                                    {showProfile.name} {showProfile.admin && <i className="fa-solid fa-circle-check text-blue-500 text-sm"></i>}
                                </h3>
                                <p className="text-blue-500 font-bold text-sm mt-1">@{showProfile.username}</p>
                                <p className="text-gray-500 dark:text-gray-400 text-xs mt-2 bg-gray-100 dark:bg-gray-800 py-1 px-3 rounded-lg inline-block">UID: {showProfile.tgId}</p>
                                <button onClick={() => setShowProfile(null)} className="mt-6 w-full py-3 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-900 dark:text-white font-bold rounded-xl transition-colors">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        // ==========================================
        // 🚀 AI MENTOR TAB (ATAXY AI MENTOR)
        // ==========================================
        const AIMentorView = () => {
            const [msg, setMsg] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [chats, setChats] = useState([
                { id: 1, sender: 'ai', text: "Hello! I am ATAXY AI Mentor. I can help you solve Physics, Chemistry, and Biology doubts. Ask me anything!" }
            ]);
            const chatEndRef = useRef(null);
