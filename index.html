<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 scroll-smooth">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useRef, useEffect, useMemo } = React;

        const BACKEND_URL = 'https://neet-prep-backend.onrender.com';

        const safeGetStr = (key, def) => { try { return localStorage.getItem(key) || def; } catch(e) { return def; } };
        const safeGetJSON = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } };
        const safeSetItem = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };
        const safeRemoveItem = (key) => { try { localStorage.removeItem(key); } catch(e) {} };

        // ==========================================
        // 🤖 SECURE AI MULTI-MODEL FALLBACK ENGINE
        // ==========================================
        const fetchGeminiSecure = async (prompt, history = [], systemContext = "", question_id = null, selected_option = null) => {
            if (question_id && selected_option) {
                // Task 2: Route question doubts to the new D1 Caching Proxy
                const cacheProxyUrl = "https://gemini-d1-proxy.thevoicesession.workers.dev";
                try {
                    const res = await fetch(cacheProxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            question_id: question_id,
                            selected_option: selected_option,
                            prompt_text: `${systemContext}\n\nStudent Doubt: ${prompt}`
                        })
                    });
                    
                    if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
                    
                    const data = await res.json();
                    
                    // You can optionally log cache hits for debugging
                    console.log(`D1 Cache Hit: ${data.cached}`);
                    
                    return data.explanation;
                } catch (err) {
                    console.error("Error fetching cached explanation:", err);
                    return "Sorry, there was an error connecting to the AI Mentor. Please try again.";
                }
            }

            // Original logic for General Chat (AIMentorView)
            const modelsToTry = [
              "gemini-3.1-flash-lite", // The current fastest, high-volume model
              "gemini-3.5-flash",      // The current stable, smart fallback
              "gemini-2.5-flash-lite", // Reliable older backup
              "gemini-2.5-flash"       // Reliable older backup
            ];
            const proxyUrl = "https://ataxy-ai-proxy.thevoicesession.workers.dev";
            
            let contents = history.map(msg => ({
                role: msg.sender === 'user' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            }));
            contents.push({ role: 'user', parts: [{ text: prompt }] });

            let attempts = 0;
            while (attempts < 8) {
                for (const model of modelsToTry) {
                    try {
                        const res = await fetch(proxyUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            mode: 'cors',
                            credentials: 'omit',
                            body: JSON.stringify({ model, contents, systemInstruction: systemContext })
                        });
                        
                        if (res.status === 429) continue;

                        const rawText = await res.text();
                        let data;
                        try {
                            data = JSON.parse(rawText);
                        } catch (parseError) {
                            continue;
                        }
                        
                        if (res.ok && data.candidates && data.candidates.length > 0) {
                            return data.candidates[0].content.parts[0].text;
                        } else if (data.promptFeedback?.blockReason) {
                            return `Blocked by safety settings: ${data.promptFeedback.blockReason}`;
                        }
                    } catch (err) {
                        // Network error, skip to next model
                    }
                }
                attempts++;
                // Wait 3 seconds before retrying all models again to respect rate limits
                await new Promise(resolve => setTimeout(resolve, 3000));
            }
            return "I am currently receiving a high volume of requests. Please wait a moment and ask your doubt again!";
        };

        // =========================================================================
        // ⬇️ ADD YOUR PRACTICE QUESTIONS HERE (ALIEN PLATFORM QBANK) ⬇️
        // =========================================================================
        const ALIEN_QBANK = [
            { id: "sub_phy", name: "Physics", icon: "⚛️", chapters: [
                { id: "c_phy_1", name: "Kinematics 1D", topics: [
                    { id: "t_phy_1_1", name: "Distance & Displacement", questions: [
                        { id: "q1", text: "A particle is moving in a circular path of radius r. The displacement after half a circle would be:", options: ["Zero", "πr", "2r", "2πr"], correct: 2, correctOption: "C", ncert: true, accuracy: "88%" },
                        { id: "q2", text: "Which of the following is a scalar quantity?", options: ["Displacement", "Distance", "Velocity", "Acceleration"], correct: 1, correctOption: "B", ncert: true, accuracy: "95%" }
                    ]}
                ]}
            ]},
            { id: "sub_chem", name: "Chemistry", icon: "⚗️", chapters: [
                { id: "c_chem_1", name: "Some Basic Concepts of Chemistry", topics: [
                    { id: "t_chem_1_1", name: "Mole Concept", questions: [
                        { id: "q3", text: "The number of atoms in 0.1 mol of a triatomic gas is: (NA = 6.02x10^23)", options: ["6.026 x 10^22", "1.806 x 10^23", "3.600 x 10^23", "1.806 x 10^22"], correct: 1, correctOption: "B", ncert: false, accuracy: "76%" }
                    ]}
                ]}
            ]},
            { id: "sub_bio", name: "Biology", icon: "🌿", chapters: [
                { id: "c_bio_1", name: "The Living World", topics: [
                    { id: "t_bio_1_1", name: "What is Living?", questions: [
                        { id: "q4", text: "The system of the naming of organisms was developed by", options: ["Robert Hooke", "Carolus Linnaeus", "T. Schwann", "Ernst Mayr"], correct: 1, correctOption: "B", ncert: true, accuracy: "91%" },
                        { id: "q5", text: "Which of the following are twin characteristics of growth?", options: ["Increase in mass and number", "Increase in weight and volume", "Increase in height and radius", "None of these"], correct: 0, correctOption: "A", ncert: true, accuracy: "85%" }
                    ]}
                ]}
            ]}
        ];
        // =========================================================================
        // ⬆️ END OF PRACTICE QUESTIONS ⬆️
        // =========================================================================

        // ==========================================
        // 📝 FORMATTED TEXT COMPONENT (MATH & CHEM)
        // ==========================================
        const smartNeetFormatter = (text) => {
            if (typeof text !== 'string') return text;
            let t = text;
            
            // 1. Fix stringified newlines (often happens from CSV/JSON parsing)
            t = t.replace(/\\n/g, '\n');
            
            // 2. NTA Formatting: Isolate major chemical equations on their own lines!
            // Finds any math block containing an arrow and forces a line break before AND after it.
            t = t.replace(/([a-zA-Z0-9.?:)])\s*(?=\$\$?[^$]*?(?:\\rightarrow|->|\\rightleftharpoons)[^$]*?\$\$?)/g, '$1\n\n');
            t = t.replace(/(\$\$?[^$]*?(?:\\rightarrow|->|\\rightleftharpoons)[^$]*?\$\$?)\s*(?=[a-zA-Z])/g, '$1\n\n');
            
            // 3. Auto-detect flattened lists of chemical reactions separated by commas
            t = t.replace(/(\$\$?[^$]+(?:\\rightarrow|\\ce\{|->|\\rightleftharpoons|=)[^$]+\$\$?)\s*,\s*(?=\$\$?)/g, '$1\n\n');
            
            // 4. Separate explicit reactions nicely (e.g., "Reaction 1:", "Reaction 2:")
            t = t.replace(/(Reaction\s+\d+[:.])/gi, '\n\n<strong>$1</strong> ');
            
            // 5. Break lines for Statement/Roman numerals if they seem to be list items
            t = t.replace(/([.!?,])\s+(?=(?:I{1,3}|IV|V|VI{0,3})\.)/g, '$1\n\n');
            t = t.replace(/([.!?,])\s+(?=\([i|v|x]+\))/gi, '$1\n\n');
            t = t.replace(/(Statement\s+[IVX]+[:.])/gi, '\n\n<strong>$1</strong> ');
            
            // 6. Convert all newlines to <br/> for HTML rendering
            t = t.replace(/\n/g, '<br/>');
            
            // --- ADDED AI MARKDOWN RENDERING SUPPORT ---
            t = t.replace(/\*\*(.+?)\*\*/g, '<strong class="text-blue-600 dark:text-blue-400">$1</strong>');
            t = t.replace(/__(.+?)__/g, '<strong class="text-blue-600 dark:text-blue-400">$1</strong>');
            t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
            t = t.replace(/`([^`]+)`/g, '<code class="bg-gray-100 dark:bg-gray-800 text-pink-500 px-1 py-0.5 rounded text-xs border border-gray-200 dark:border-gray-700">$1</code>');
            t = t.replace(/### (.*)/g, '<h3 class="text-sm font-bold mt-2 mb-1 text-gray-800 dark:text-gray-100">$1</h3>');
            t = t.replace(/## (.*)/g, '<h2 class="text-base font-bold mt-2 mb-1 text-gray-800 dark:text-gray-100">$1</h2>');
            t = t.replace(/# (.*)/g, '<h1 class="text-lg font-bold mt-2 mb-1 text-gray-800 dark:text-gray-100">$1</h1>');
            t = t.replace(/(?:<br\s*\/?>)?\s*[-•]\s+(.*)/g, '<li class="ml-4 list-disc my-1">$1</li>');
            
            // 7. Clean up excessive breaks
            t = t.replace(/(?:<br\s*\/?>\s*){3,}/g, '<br/><br/>');
            t = t.replace(/^(?:<br\s*\/?>\s*)+/, '');
            t = t.replace(/(?:<br\s*\/?>\s*)+$/, '');
            
            return t;
        };

        const FormattedText = ({ text, className = "" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                let timeoutId;
                const renderMath = () => {
                    if (containerRef.current && window.renderMathInElement) {
                        try {
                            window.renderMathInElement(containerRef.current, {
                                delimiters: [
                                    {left: '$$', right: '$$', display: true},
                                    {left: '$', right: '$', display: false},
                                    {left: '\\(', right: '\\)', display: false},
                                    {left: '\\[', right: '\\]', display: true}
                                ],
                                throwOnError: false,
                                output: 'html'
                            });
                        } catch (e) {
                            console.warn("KaTeX render error:", e);
                        }
                    } else if (!window.renderMathInElement) {
                        timeoutId = setTimeout(renderMath, 500); // Retry if script is loading
                    }
                };
                renderMath();
                return () => clearTimeout(timeoutId);
            }, [text]);

            if (typeof text !== 'string') return <span className={className}>{text}</span>;
            return <div ref={containerRef} className={`w-full ${className || 'block'}`} dangerouslySetInnerHTML={{ __html: smartNeetFormatter(text) }} />;
        };

        // ==========================================
        // 🚀 ATAXY BRAND LOGO COMPONENT
        // ==========================================
        const AtaxyLogo = ({ className = "w-8 h-8 rounded-lg" }) => {
            // Note: If the logo does not show, you may need the direct image link (e.g., ending in .png) 
            // instead of the imgbb view page link. Try right-clicking the image on imgbb and copying the image address.
            const logoUrl = "https://i.ibb.co/rf15FfnP/logo.png"; 
            
            return (
                <div className={`overflow-hidden shrink-0 flex items-center justify-center bg-white ${className}`}>
                    <img 
                        src={logoUrl} 
                        alt="ATAXY Logo" 
                        // The scale and negative Y translation help crop out the text below the main logo!
                        className="w-full h-full object-cover object-top scale-[1.4] -translate-y-[8%]" 
                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/100x100/00A7A7/FFF?text=ATAXY'; }}
                    />
                </div>
            );
        };

        // ==========================================
        // 🚀 CONSTANT TOP NAV BAR
        // ==========================================
        const TopNavBar = () => {
            const handleShare = () => {
                const shareUrl = 'https://t.me/ATAXYbot/app'; // <-- REPLACE with your actual Telegram bot/app link
                const shareText = 'Join me on ATAXY Learning - The best practice platform!';
                
                if (navigator.share) {
                    navigator.share({
                        title: 'ATAXY Learning',
                        text: shareText,
                        url: shareUrl
                    }).catch(console.error);
                } else {
                    const tgShareLink = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
                    if (window.Telegram?.WebApp?.openTelegramLink) {
                        window.Telegram.WebApp.openTelegramLink(tgShareLink);
                    } else {
                        window.open(tgShareLink, '_blank');
                    }
                }
            };

            return (
                <div className="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-ataxy-background/95 backdrop-blur-md border-b border-ataxy-border z-[1000000] px-4 h-[calc(60px_+_env(safe-area-inset-top,_0px))] pt-[env(safe-area-inset-top,_0px)] flex justify-between items-center shadow-[0_4px_20px_-10px_rgba(0,167,167,0.2)] dark:shadow-[0_4px_20px_-10px_rgba(0,255,255,0.15)]">
                    <div className="flex items-center gap-2">
                        <AtaxyLogo className="w-9 h-9 rounded-xl shadow-[0_0_8px_rgba(0,167,167,0.4)] border border-cyan-300/50" />
                        <span className="font-black text-xl tracking-wider text-ataxy-text-primary drop-shadow-[0_0_8px_rgba(0,167,167,0.3)] dark:drop-shadow-[0_0_8px_rgba(0,255,255,0.4)]">ATAXY</span>
                    </div>
                    <div className="flex items-center gap-3 text-[20px]">
                        <button onClick={handleShare} className="text-gray-500 dark:text-gray-400 hover:text-ataxy-accent-primary dark:hover:text-cyan-400 hover:scale-110 transition-all drop-shadow-sm hover:drop-shadow-[0_0_5px_rgba(0,255,255,0.5)] mr-1" title="Share App">
                            <i className="fa-solid fa-share-nodes"></i>
                        </button>
                        <a href="https://t.me/ATAXYmentor" target="_blank" rel="noopener noreferrer" className="text-[#0088cc] hover:scale-110 transition-transform drop-shadow-sm hover:drop-shadow-[0_0_5px_rgba(0,136,204,0.5)]" title="Telegram Channel">
                            <i className="fa-brands fa-telegram"></i>
                        </a>
                        <a href="YOUR_WHATSAPP_LINK_HERE" target="_blank" rel="noopener noreferrer" className="text-[#25D366] hover:scale-110 transition-transform drop-shadow-sm hover:drop-shadow-[0_0_5px_rgba(37,211,102,0.5)]" title="WhatsApp Channel">
                            <i className="fa-brands fa-whatsapp"></i>
                        </a>
                        <a href="https://t.me/ATAXYmentorDiscussion" target="_blank" rel="noopener noreferrer" className="text-[#7289da] hover:scale-110 transition-transform drop-shadow-sm hover:drop-shadow-[0_0_5px_rgba(114,137,218,0.5)]" title="Discussion Group">
                            <i className="fa-solid fa-users"></i>
                        </a>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🔒 PERSISTENT GATEKEEPER
        // ==========================================
        const Gatekeeper = ({ onVerify }) => {
            const [step, setStep] = useState(() => parseInt(safeGetStr('ataxy_verify_step', '0')));
            const [verifying, setVerifying] = useState(false);
            const [isCheckingSaved, setIsCheckingSaved] = useState(true);
            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || { first_name: "Student", id: "1001", username: "student" };

            useEffect(() => {
                const checkVerification = async () => {
                    const savedState = safeGetStr('ataxy_verified', '');
                    if (savedState === 'true') {
                        onVerify(tgUser);
                        return;
                    }
                    
                    if (tgUser?.id && String(tgUser.id) !== "1001") {
                        try {
                            const res = await fetch(`${BACKEND_URL}/api/neet/users`);
                            if (res.ok) {
                                const data = await res.json();
                                const isRegistered = data.users?.some(u => String(u.telegram_user_id) === String(tgUser.id));
                                if (isRegistered) {
                                    safeSetItem('ataxy_verified', 'true');
                                    onVerify(tgUser);
                                    return;
                                }
                            }
                        } catch (e) {
                            console.warn("Could not check user status", e);
                        }
                    }
                    setIsCheckingSaved(false);
                };
                checkVerification();
            }, []);

            const handleVerify = () => {
                setVerifying(true);
                setTimeout(() => {
                    safeSetItem('ataxy_verified', 'true');
                    safeRemoveItem('ataxy_verify_step');
                    setVerifying(false);
                    onVerify(tgUser);
                }, 1500);
            };

            const handleJoin = (url, nextStep) => {
                setStep(nextStep);
                safeSetItem('ataxy_verify_step', nextStep.toString());
                if (window.Telegram?.WebApp?.openTelegramLink) {
                    window.Telegram.WebApp.openTelegramLink(url);
                } else {
                    window.open(url, "_blank");
                }
            };

            if (isCheckingSaved) return <div className="min-h-screen bg-gray-900"></div>;

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-center text-white">
                    <AtaxyLogo className="w-28 h-28 rounded-full mb-6 shadow-[0_0_40px_rgba(0,167,167,0.4)] border-4 border-[#00A7A7]" />
                    <h1 className="text-3xl font-black mb-2 tracking-wide drop-shadow-md">ATAXY Learning</h1>
                    <p className="text-gray-400 mb-8 text-sm">Welcome, {tgUser.first_name}! Complete these steps to access your batches.</p>

                    <div className="w-full space-y-4 max-w-sm">
                        <div className={`p-4 rounded-xl border flex items-center justify-between transition-all ${step >= 1 ? 'bg-green-500/10 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                            <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${step >= 1 ? 'bg-green-500 text-white' : 'bg-gray-800'}`}>1</div>
                                <div className="text-left"><h3 className="font-bold">ATAXY Mentor</h3><p className="text-xs text-gray-400">Official Channel</p></div>
                            </div>
                            <button onClick={() => handleJoin("https://t.me/ATAXYmentor", Math.max(step, 1))} className={`px-4 py-2 rounded-lg font-bold text-sm ${step >= 1 ? 'bg-green-500/20 text-green-500' : 'bg-blue-600 text-white'}`}>
                                {step >= 1 ? 'Joined' : 'Join'}
                            </button>
                        </div>
                        <div className={`p-4 rounded-xl border flex items-center justify-between transition-all ${step >= 2 ? 'bg-green-500/10 border-green-500/50' : 'bg-white/5 border-white/10'}`}>
                            <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${step >= 2 ? 'bg-green-500 text-white' : 'bg-gray-800'}`}>2</div>

                            </div>

            const [availableRooms, setAvailableRooms] = useState([]);
            const [chatMessages, setChatMessages] = useState([]);
            const [micRequests, setMicRequests] = useState([]);
            const [pendingInvite, setPendingInvite] = useState(null);

            // --- WEPLAY-STYLE FEATURES (EMOJIS, SFX) ---
            const [remoteMutedState, setRemoteMutedState] = useState({});

            const triggerSFX = (type) => {
                const sfxUrls = {
                    applause: 'https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg',
                    laughter: 'https://actions.google.com/sounds/v1/crowds/female_crowd_laughing.ogg',
                    drumroll: 'https://actions.google.com/sounds/v1/cartoon/drum_roll.ogg',
                    magic: 'https://actions.google.com/sounds/v1/cartoon/magic_chime_chord.ogg'
                };
                try {
                    if(sfxUrls[type]) {
                        const audio = new Audio(sfxUrls[type]);
                        audio.volume = 0.5;
                        audio.play().catch(e => console.error("SFX play error", e));
                    }
                } catch(e) {}
            };

            const sendBroadcast = (event, payload) => {
                if (channelRef.current) {
                    channelRef.current.send({ type: 'broadcast', event: event, payload: payload });
                }
            };

            const fetchRooms = async () => {
                if (!supabase) return;
                const { data: rooms, error } = await supabase
                    .from('voice_rooms')
                    .select('*')
                    .eq('is_live', true)
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error("Error fetching rooms:", error);
                    return;
                }
                if (rooms) {
                    setAvailableRooms(rooms);
                }
            };

            useEffect(() => {
                if (!supabase) return;
                
                supabase.from('room_participants').delete().eq('user_id', String(tgUser.id)).then(() => {
                    fetchRooms();
                });

                const channel = supabase.channel('voice_rooms_sync')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'voice_rooms' }, () => {
                        fetchRooms();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'room_participants' }, () => {
                        fetchRooms(); 
                    })
                    .subscribe();
                return () => { supabase.removeChannel(channel); };
            }, []);

            const joinRoom = async (roomData, password = null) => {
                try {
                    if (roomData.password && roomData.password !== password) {
                        alert("Incorrect password!");
                        return false;
                    }

                    let token = null;
                    try {
                        token = await getAgoraToken(roomData.id, tgUser.id, password);
                        if (!token) {
                            throw new Error("Received an empty token from the server.");
                        }
                    } catch (e) {
                        return false;
                    }

                    const agoraClient = window.AgoraRTC.createClient({ mode: "live", codec: "vp8" });
                    setClient(agoraClient);
                    
                    agoraClient.on("user-published", async (remoteUser, mediaType) => {
                        await agoraClient.subscribe(remoteUser, mediaType);
                        if (mediaType === "audio") {
                            remoteUser.audioTrack.play();
                            if (speakerMutedRef.current) {
                                remoteUser.audioTrack.setVolume(0);
                            }
                        }
                        setRemoteUsers(prev => Array.from(new Map([...prev, [remoteUser.uid, remoteUser]]).values()));
                    });
                    agoraClient.on("user-unpublished", (remoteUser, mediaType) => {
                        if (mediaType === "audio" && remoteUser.audioTrack) remoteUser.audioTrack.stop();
                        setRemoteUsers(prev => Array.from(new Map([...prev, [remoteUser.uid, remoteUser]]).values()));
                    });
                    agoraClient.on("user-left", (remoteUser) => {
                        setRemoteUsers(prev => prev.filter(u => u.uid !== remoteUser.uid));
                    });

                    agoraClient.enableAudioVolumeIndicator();
                    agoraClient.on("volume-indicator", (volumes) => {
                        setActiveSpeakers(prev => {
                            const newMap = { ...prev };
                            volumes.forEach(v => { newMap[v.uid] = v.level > 5; });
                            return newMap; 
                        });
                    });

                    await agoraClient.setClientRole("audience");
                    await agoraClient.join(AGORA_APP_ID, String(roomData.id), token, String(tgUser?.id || "1001"));
                    
                    if (supabase) {
                        await supabase.from('room_participants').upsert({
                            room_id: roomData.id,
                            user_id: String(tgUser.id),
                            user_name: tgUser.first_name || tgUser.username || "Unknown",
                            photo_url: tgUser.photo_url || null,
                            seat_number: null
                        });

                        const channel = supabase.channel(`room:${roomData.id}`)
                            .on('postgres_changes', { event: '*', schema: 'public', table: 'room_participants', filter: `room_id=eq.${roomData.id}` }, () => {
                                fetchParticipants(roomData.id);
                            })
                            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'voice_rooms', filter: `id=eq.${roomData.id}` }, (payload) => {
                                if (payload.new.is_live === false) {
                                    alert("The live room has ended.");
                                    leaveRoom(agoraClient, roomData.id);
                                } else {
                                    setActiveRoom(payload.new);
                                }
                            })
                            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'voice_rooms', filter: `id=eq.${roomData.id}` }, () => {
                                alert("The host has closed the room.");
                                leaveRoom(agoraClient, roomData.id);
                            })
                            .on('broadcast', { event: 'mute' }, ({ payload }) => {
                                if (payload.target_uid === String(tgUser.id)) {
                                    setLocalAudioTrack(track => { track?.setMuted(true); return track; });
                                    setIsMuted(true);
                                }
                            })
                            .on('broadcast', { event: 'kick' }, ({ payload }) => {
                                if (payload.target_uid === String(tgUser.id)) {
                                    leaveRoom(agoraClient, roomData.id);
                                    alert("You were removed by the host.");
                                }
                            })
                            .on('broadcast', { event: 'text_chat' }, ({ payload }) => {
                                setChatMessages(prev => [...prev, payload]);
                            })
                            .on('broadcast', { event: 'invite_to_seat' }, ({ payload }) => {
                                if (payload.target_uid === String(tgUser.id)) setPendingInvite(payload);
                            })
                            .on('broadcast', { event: 'request_seat' }, ({ payload }) => {
                                if (String(roomData.host_user_id) === String(tgUser.id)) {
                                    setMicRequests(prev => {
                                        if (!prev.some(r => r.uid === payload.uid)) return [...prev, payload];
                                        return prev;
                                    });
                                }
                            })
                            .on('broadcast', { event: 'approve_seat' }, ({ payload }) => {
                                if (payload.target_uid === String(tgUser.id)) takeSeat(payload.seatNum);
                            })
                            .on('broadcast', { event: 'lift_user' }, ({ payload }) => {
                                if (payload.target_uid === String(tgUser.id)) {
                                    stepDown();
                                    alert("The host has moved you back to the audience.");
                                }
                            })
                            .on('broadcast', { event: 'play_sfx' }, ({ payload }) => {
                                triggerSFX(payload.type);
                            })
                            .on('broadcast', { event: 'mute_state_changed' }, ({ payload }) => {
                                setRemoteMutedState(prev => ({ ...prev, [payload.userId]: payload.isMuted }));
                            })
                            .subscribe();
                        
                        setRealtimeChannel(channel);
                        fetchParticipants(roomData.id);
                    }
                    setActiveRoom(roomData);
                    setChatMessages([]);
                    return agoraClient;
                } catch (e) { 
                    console.error("Join Error", e); 
                    alert("Failed to join room: " + e.message);
                    return false;
                }
            };

            const fetchParticipants = async (roomId) => {
                const { data } = await supabase.from('room_participants').select('*').eq('room_id', roomId);
                if (data) setParticipants(data);
            };

            const leaveRoom = async (forcedClient = client, roomId = activeRoom?.id) => {
                const r = roomRef.current;
                if (localAudioTrack) { 
                    localAudioTrack.stop(); 
                    localAudioTrack.close(); 
                    setLocalAudioTrack(null);
                }
                if (forcedClient) { try { await forcedClient.leave(); } catch (e) {} }
                if (supabase && r && roomId) {
                    if (String(r.host_user_id) === String(tgUser.id)) {
                        // I am the host leaving. Find another speaker to make host.
                        const remainingMics = participantsRef.current.filter(p => p.seat_number !== null && p.seat_number > 0 && String(p.user_id) !== String(tgUser.id)).sort((a,b) => a.seat_number - b.seat_number);
                        
                        if (remainingMics.length > 0) {
                            const nextHost = remainingMics[0];
                            await supabase.from('voice_rooms').update({ host_user_id: nextHost.user_id }).eq('id', roomId);
                            await supabase.from('room_participants').update({ seat_number: 0 }).match({ room_id: roomId, user_id: nextHost.user_id });
                        } else {
                            if (r.room_type === 'temporary') {
                                await supabase.from('voice_rooms').delete().eq('id', roomId);
                            } else {
                                await supabase.from('voice_rooms').update({ is_live: false, host_user_id: r.owner_id }).eq('id', roomId);
                            }
                        }
                    }
                    await supabase.from('room_participants').delete().match({ room_id: roomId, user_id: String(tgUser.id) });
                    if (channelRef.current) supabase.removeChannel(channelRef.current);
                }
                setActiveRoom(null);
                setLocalAudioTrack(null);
                setIsMuted(true);
                setClient(null);
                setRemoteUsers([]);
                setRealtimeChannel(null);
                setChatMessages([]);
                setMicRequests([]);
                setPendingInvite(null);
            };

            const createRoom = async (name, type, password = null) => {
                if (!supabase) return;
                
                // Pre-request microphone to preserve user gesture token
                let preTrack = null;
                try {
                    preTrack = await window.AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
                    setLocalAudioTrack(preTrack);
                } catch(e) {
                    console.warn("Mic pre-request denied, will retry on seat", e);
                }

                const { data, error } = await supabase.from('voice_rooms').insert({
                    channel_name: name,
                    host_user_id: String(tgUser.id),
                    owner_id: type === 'permanent' ? String(tgUser.id) : null,
                    room_type: type,
                    require_mic_request: false,
                    password: password || null,
                    is_live: true
                }).select().single();
                
                if (error) {
                    let errorMsg = error.message;
                    if (error.code === '23505' || errorMsg.includes('duplicate key') || errorMsg.includes('voice_rooms_channel_name_key')) {
                        errorMsg = "A room with this name already exists! Please choose a different name.";
                    }
                    alert("Failed to create room: " + errorMsg);
                    if(preTrack) { preTrack.stop(); preTrack.close(); setLocalAudioTrack(null); }
                    console.error("createRoom error:", error);
                    return false;
                }

                if (data) {
                    const agoraClient = await joinRoom(data, password);
                    if (agoraClient) {
                        await takeSeat(0, data.id, agoraClient, preTrack);
                        return true;
                    }
                }
                return false;
            };

            const takeSeat = async (seatIdx, roomId = roomRef.current?.id, passedClient = null, passedTrack = null) => {
                try {
                    const activeClient = passedClient || clientRef.current;
                    if (!activeClient) {
                        console.warn("No active Agora client to take seat");
                        return;
                    }
                    
                    // Immediately claim the seat in DB so UI updates instantly (Runs asynchronously)
                    if (supabase) {
                        const rId = roomId || roomRef.current?.id;
                        supabase.from('room_participants').update({ seat_number: seatIdx }).match({ room_id: rId, user_id: String(tgUser.id) }).then(() => {
                            if (seatIdx === 0) {
                                supabase.from('voice_rooms').update({ host_user_id: String(tgUser.id) }).eq('id', rId);
                            }
                        }).catch(e => console.error("Seat update error:", e));
                    }

                    // Request microphone track immediately to preserve the gesture token
                    let track = passedTrack || trackRef.current;
                    if (!track) {
                        track = await window.AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
                        setLocalAudioTrack(track);
                    }
                    await activeClient.setClientRole("host");
                    try { await activeClient.publish([track]); } catch(e) {}
                    setIsMuted(false);
                } catch (e) { 
                    console.error("Seat error", e); 
                    alert("You are seated, but microphone access was denied. Check your browser/Telegram permissions.");
                }
            };

            const stepDown = async () => {
                const track = trackRef.current;
                const c = clientRef.current;
                const r = roomRef.current;
                
                if (r && String(r.host_user_id) === String(tgUser.id)) {
                    // Host stepping down.
                    const remainingMics = participantsRef.current.filter(p => p.seat_number !== null && p.seat_number > 0 && String(p.user_id) !== String(tgUser.id)).sort((a,b) => a.seat_number - b.seat_number);
                    if (remainingMics.length > 0) {
                        const nextHost = remainingMics[0];
                        await supabase.from('voice_rooms').update({ host_user_id: nextHost.user_id }).eq('id', r.id);
                        await supabase.from('room_participants').update({ seat_number: 0 }).match({ room_id: r.id, user_id: nextHost.user_id });
                    } else {
                        if (r.room_type === 'temporary') {
                            await supabase.from('voice_rooms').delete().eq('id', r.id);
                        } else {
                            await supabase.from('voice_rooms').update({ is_live: false, host_user_id: r.owner_id }).eq('id', r.id);
                        }
                    }
                }
                
                if (track) {
                    track.stop();
                    track.close();
                    if (c) {
                        try { await c.unpublish([track]); } catch(e) {}
                    }
                    setLocalAudioTrack(null);
                }
                if (c) await c.setClientRole("audience");
                if (supabase && r) {
                    await supabase.from('room_participants').update({ seat_number: null }).match({ room_id: r.id, user_id: String(tgUser.id) });
                }
                setIsMuted(true);
            };

            const toggleMute = async () => {
                if (!clientRef.current) return;
                try {
                    if (trackRef.current) {
                        const shouldMute = !isMuted;
                        // Using setEnabled directly controls capturing at the hardware level, more reliable on PC/mobile to prevent crashes
                        await trackRef.current.setEnabled(!shouldMute);
                        setIsMuted(shouldMute);
                        
                        // Broadcast state globally
                        if (channelRef.current) {
                            channelRef.current.send({
                                type: 'broadcast',
                                event: 'mute_state_changed',
                                payload: { userId: String(tgUser.id), isMuted: shouldMute }
                            });
                        }
                    } else {
                        // Recover track if missing
                        const track = await window.AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
                        await clientRef.current.setClientRole("host");
                        await clientRef.current.publish([track]);
                        setLocalAudioTrack(track);
                        setIsMuted(false);
                        
                        if (channelRef.current) {
                            channelRef.current.send({
                                type: 'broadcast',
                                event: 'mute_state_changed',
                                payload: { userId: String(tgUser.id), isMuted: false }
                            });
                        }
                    }
                } catch (e) {
                    console.error("Mute error", e);
                    alert("Microphone access denied. Please check your browser/Telegram permissions.");
                }
            };

            const sendHostAction = (action, targetUid) => {
                if (channelRef.current && String(roomRef.current?.host_user_id) === String(tgUser.id)) {
                    channelRef.current.send({ type: 'broadcast', event: action, payload: { target_uid: String(targetUid) } });
                }
            };

            const sendChat = (text) => {
                const payload = { userId: String(tgUser.id), userName: tgUser.first_name, text, time: new Date().toISOString() };
                realtimeChannel?.send({ type: 'broadcast', event: 'text_chat', payload });
                setChatMessages(prev => [...prev, payload]); // Optimistic update
            };

            const updateRoomSettings = async (newName, newPassword, reqMic) => {
                if (!supabase || !roomRef.current) return false;
                try {
                    const { error } = await supabase.from('voice_rooms').update({
                        channel_name: newName,
                        password: newPassword || null,
                        require_mic_request: reqMic
                    }).eq('id', roomRef.current.id);
                    if (error) {
                        let errorMsg = error.message;
                        if (errorMsg.includes('duplicate key') || errorMsg.includes('voice_rooms_channel_name_key')) {
                            errorMsg = "A room with this name already exists! Please choose a different name.";
                        }
                        alert("Failed to update room: " + errorMsg);
                        return false;
                    }
                    return true;
                } catch (err) {
                    return false;
                }
            };

            return { client, activeRoom, availableRooms, participants, remoteUsers, isMuted, isSpeakerMuted, activeSpeakers, chatMessages, micRequests, setMicRequests, pendingInvite, setPendingInvite, joinRoom, leaveRoom, createRoom, takeSeat, stepDown, toggleMute, toggleSpeaker, sendHostAction, sendBroadcast, fetchRooms, sendChat, updateRoomSettings, remoteMutedState, triggerSFX };
        };

        const FloatingVoiceWidget = ({ voiceState, onRestore }) => {
            const { activeRoom, isMuted, toggleMute, isSpeakerMuted, toggleSpeaker, leaveRoom } = voiceState;
            if (!activeRoom) return null;
            return (
                <div onClick={onRestore} className="fixed bottom-[75px] left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-[#021633]/95 backdrop-blur-md border border-[#00FFFF]/50 rounded-2xl p-3 flex items-center justify-between shadow-[0_0_15px_rgba(0,255,255,0.2)] z-[100] cursor-pointer hover:scale-[1.02] transition-transform">
                    <div className="flex items-center gap-3 overflow-hidden">
                        <div className="w-8 h-8 rounded-full bg-[#00FFFF]/20 flex items-center justify-center text-[#00FFFF] animate-pulse shrink-0"><i className="fa-solid fa-volume-high text-xs"></i></div>
                        <div className="truncate">
                            <p className="text-white font-bold text-sm truncate">{activeRoom.channel_name}</p>
                            <p className="text-[#00FFFF] text-[10px] uppercase font-bold tracking-widest">Live Session Active</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-2 shrink-0" onClick={e => e.stopPropagation()}>
                        <button onClick={toggleMute} className={`w-9 h-9 rounded-full flex items-center justify-center transition-colors ${isMuted ? 'bg-gray-700 text-gray-400' : 'bg-[#00FFFF] text-[#010B1C]'}`}><i className={`fa-solid ${isMuted ? 'fa-microphone-slash' : 'fa-microphone'} text-xs`}></i></button>
                        <button onClick={toggleSpeaker} className={`w-9 h-9 rounded-full flex items-center justify-center transition-colors ${isSpeakerMuted ? 'bg-gray-700 text-gray-400' : 'bg-[#00FFFF] text-[#010B1C]'}`}><i className={`fa-solid ${isSpeakerMuted ? 'fa-volume-xmark' : 'fa-volume-high'} text-xs`}></i></button>
                        <button onClick={() => leaveRoom()} className="w-9 h-9 rounded-full bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors"><i className="fa-solid fa-phone-slash text-xs"></i></button>
                    </div>
                </div>
            );
        };

        const VoiceRoomsTab = ({ tgUser, voiceState }) => {
            const { availableRooms, fetchRooms, createRoom, joinRoom } = voiceState;
            const [showCreateModal, setShowCreateModal] = useState(false);
            const [selectedRoomToJoin, setSelectedRoomToJoin] = useState(null);
            
            const handleJoinClick = (room) => {
                if (room.password) {
                    setSelectedRoomToJoin(room);
                } else {
                    joinRoom(room);
                }
            };

            return (
                <div className="pb-[80px] animate-in fade-in flex flex-col h-[calc(100vh_-_60px_-_env(safe-area-inset-top,_0px))] bg-[#010B1C] text-white">
                    <div className="p-4 flex-1 overflow-y-auto">
                        <h2 className="text-2xl font-black mb-1 text-[#00FFFF] drop-shadow-[0_0_8px_rgba(0,255,255,0.4)] tracking-wide">Voice Lounges</h2>
                        <p className="text-xs text-[#A4DFE6] mb-5">Join active voice rooms to discuss and study live.</p>
                        
                        <div className="flex gap-2 mb-6">
                            <button onClick={() => setShowCreateModal(true)} className="flex-1 bg-gradient-to-r from-[#00A7A7] to-[#00FFFF] text-[#010B1C] shadow-[0_0_15px_rgba(0,255,255,0.4)] py-3 rounded-xl font-bold transition-all text-sm flex items-center justify-center gap-2">
                                <i className="fa-solid fa-plus"></i> Create Room
                            </button>
                        </div>

                        <div className="space-y-4 pb-20">
                        </div>
                    </div>
                    {showCreateModal && <CreateRoomModal onClose={() => setShowCreateModal(false)} onCreate={createRoom} />}
                    {selectedRoomToJoin && <JoinRoomModal room={selectedRoomToJoin} onClose={() => setSelectedRoomToJoin(null)} onJoin={joinRoom} />}
                </div>
            );
        };

        const RoomSettingsModal = ({ activeRoom, onClose, onSave }) => {
            const [name, setName] = useState(activeRoom.channel_name);
            const [password, setPassword] = useState(activeRoom.password || '');
            const [requireMic, setRequireMic] = useState(activeRoom.require_mic_request || false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!name.trim()) return;
                setIsSubmitting(true);
                const success = await onSave(name, password, requireMic);
                setIsSubmitting(false);
                if (success) onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-in fade-in" onClick={onClose}>
                    <div className="bg-[#021633] rounded-2xl p-6 w-full max-w-sm shadow-[0_0_30px_rgba(0,255,255,0.2)] border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-bold text-white mb-4"><i className="fa-solid fa-sliders mr-2 text-[#00FFFF]"></i>Room Settings</h3>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="text-xs text-[#A4DFE6] font-bold uppercase tracking-wider mb-1 block">Room Name</label>
                                <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-[#010B1C] border border-[#0AE0D0]/30 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#00FFFF]" />
                            </div>
                            <div>
                                <label className="text-xs text-[#A4DFE6] font-bold uppercase tracking-wider mb-1 block">Password <span className="text-gray-500 font-normal lowercase">(Optional)</span></label>
                                <input type="text" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Leave blank for public" className="w-full bg-[#010B1C] border border-[#0AE0D0]/30 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#00FFFF]" />
                            </div>
                            <div>
                                <label className="text-xs text-[#A4DFE6] font-bold uppercase tracking-wider mb-1 block">Mic Requests</label>
                                <div className="flex items-center justify-between bg-[#010B1C] border border-[#0AE0D0]/30 rounded-xl px-4 py-3">
                                    <span className="text-white text-sm">Require permission to speak</span>
                                    <button type="button" onClick={() => setRequireMic(!requireMic)} className={`w-12 h-6 rounded-full transition-colors ${requireMic ? 'bg-[#00FFFF]' : 'bg-gray-600'} flex items-center px-1`}>
                                        <div className={`w-4 h-4 bg-white rounded-full transition-transform ${requireMic ? 'translate-x-6' : ''}`}></div>
                                    </button>
                                </div>
                            </div>
                            <div className="flex gap-3 mt-6">
                                <button type="button" onClick={onClose} className="flex-1 py-3 bg-[#010B1C] border border-[#0AE0D0]/20 text-white rounded-xl font-bold transition-colors">Cancel</button>
                                <button type="submit" disabled={isSubmitting} className="flex-1 py-3 bg-[#00FFFF] text-[#010B1C] rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(0,255,255,0.4)] disabled:opacity-50">{isSubmitting ? 'Saving...' : 'Save'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const ActiveVoiceRoom = ({ tgUser, voiceState, onMinimize }) => {
            const { activeRoom, participants, remoteUsers, isMuted, isSpeakerMuted, toggleSpeaker, activeSpeakers, chatMessages, micRequests, setMicRequests, pendingInvite, setPendingInvite, leaveRoom, takeSeat, stepDown, toggleMute, sendHostAction, sendBroadcast, sendChat, updateRoomSettings, remoteMutedState, triggerSFX } = voiceState;
            const [showActionModal, setShowActionModal] = useState(null);
            const [showParticipantsModal, setShowParticipantsModal] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showRequestsModal, setShowRequestsModal] = useState(false);
            const [chatInput, setChatInput] = useState('');

            const isHost = String(activeRoom.host_user_id) === String(tgUser.id);
            const myParticipant = participants.find(p => String(p.user_id) === String(tgUser.id));
            const isSpeaker = isHost || (myParticipant?.seat_number !== null && myParticipant?.seat_number !== undefined);

            const hostSeat = participants.find(p => p.seat_number === 0);
            const partnerSeat = participants.find(p => p.seat_number === 1);
            const micSeats = Array.from({length: 8}, (_, i) => participants.find(p => p.seat_number === i + 2) || null);
            const audience = participants.filter(p => p.seat_number === null);

            const handleBottomMicClick = () => {
                if (!isSpeaker) {
                    if (micRequests.some(r => String(r.uid) === String(tgUser.id))) {
                        alert("Your request is already pending host approval.");
                        return;
                    }
                    const occupiedSeats = participants.map(p => p.seat_number);
                    let emptySeat = activeRoom.is_partner_seat_open ? 1 : 2;
                    while(occupiedSeats.includes(emptySeat) && emptySeat <= 9) emptySeat++;
                    if (emptySeat <= 9) {
                        if (activeRoom.require_mic_request) {
                            sendBroadcast('request_seat', { uid: String(tgUser.id), name: tgUser.first_name, seatNum: emptySeat });
                            alert("Requested to speak. Waiting for host approval.");
                        } else {
                            takeSeat(emptySeat);
                        }
                    }
                    else alert("All seats are currently full!");
                }
            };

            const handleSeatClick = (seatNum, occupant) => {
                if (occupant) {
                    if (occupant.user_id === String(tgUser.id)) {
                        if (isHost) {
                            alert("As the host, your seat is permanently fixed.");
                        } else {
                            setShowActionModal({ type: 'self' });
                        }
                    } else if (isHost) {
                        setShowActionModal({ type: 'host_target', occupant });
                    }
                } else {
                    if (isHost) {
                        if (seatNum !== 0) { // Host can't move, can only invite to empty seats
                            setShowActionModal({ type: 'invite_to_seat', seatNum });
                        }
                    } else if (isSpeaker) {
                        if (confirm("Are you sure you want to change your seat?")) {
                            takeSeat(seatNum);
                        }
                    } else {
                        if (activeRoom.require_mic_request) {
                            sendBroadcast('request_seat', { uid: String(tgUser.id), name: tgUser.first_name, seatNum });
                            alert("Requested to take seat. Waiting for host approval.");
                        } else {
                            takeSeat(seatNum);
                        }
                    }
                }
            };

            const renderSeat = (seatNum, occupant, label, isLarge=false) => {
                if (occupant && !occupant.user_id) return null; // Safe guard
                const isMe = occupant?.user_id === String(tgUser.id);
                const speaking = occupant && activeSpeakers[occupant.user_id];
                const dpUrl = isMe ? tgUser.photo_url : occupant?.photo_url;
                const isOccupantMuted = occupant && (remoteMutedState[occupant.user_id] ?? (remoteUsers.find(r=>r.uid===occupant.user_id) && !remoteUsers.find(r=>r.uid===occupant.user_id).hasAudio));
                
                return (
                    <div onClick={() => handleSeatClick(seatNum, occupant)} className={`flex flex-col items-center gap-1 cursor-pointer transition-transform hover:scale-105 ${isLarge ? 'w-24' : 'w-16'}`}>
                        {occupant ? (
                            <div className="relative">
                                {dpUrl ? (
                                    <img src={dpUrl} alt={occupant.user_name} className={`rounded-full object-cover border-2 transition-all ${isLarge ? 'w-20 h-20 text-2xl' : 'w-14 h-14 text-xl'} ${speaking ? 'border-[#00FFFF] shadow-[0_0_20px_rgba(0,255,255,0.8)] scale-110' : 'border-[#0AE0D0]/50'}`} />
                                ) : (
                                    <div className={`rounded-full flex items-center justify-center font-bold border-2 transition-all bg-gradient-to-br from-[#00FFFF] to-blue-600 ${isLarge ? 'w-20 h-20 text-2xl' : 'w-14 h-14 text-xl'} ${speaking ? 'border-[#00FFFF] shadow-[0_0_20px_rgba(0,255,255,0.8)] scale-110 text-[#010B1C]' : 'border-transparent text-white'}`}>
                                        {occupant.user_name.charAt(0)}
                                    </div>
                                )}
                                {(isMe ? isMuted : isOccupantMuted) && (
                                    <div className="absolute -bottom-1 -right-1 bg-[#010B1C] rounded-full w-5 h-5 flex items-center justify-center border border-gray-600">
                                        <i className="fa-solid fa-microphone-slash text-[10px] text-red-400"></i>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className={`rounded-full border-2 border-dashed border-[#0AE0D0]/40 flex items-center justify-center bg-[#021633] ${isLarge ? 'w-20 h-20 text-3xl' : 'w-14 h-14 text-xl'} hover:bg-[#0AE0D0]/10`}>
                        <i className="fa-solid fa-plus text-[#0AE0D0]/40"></i>
                            </div>
                        )}
                <span className="text-[10px] text-center font-semibold text-[#E0F7FA] truncate w-full px-1">{occupant ? occupant.user_name : "\u00A0"}</span>
                    </div>
                )
            };

            return (
                <div className="flex-1 flex flex-col relative z-10">
                    <div className="px-4 py-4 flex items-center justify-between border-b border-[#0AE0D0]/20 bg-[#010B1C]/90 backdrop-blur">
                        <div className="flex flex-col flex-1 overflow-hidden pr-2">
                            <h2 className="text-xl font-black text-[#E0F7FA] drop-shadow-[0_0_5px_rgba(0,255,255,0.3)] truncate">{activeRoom.channel_name}</h2>
                            <p className="text-xs text-[#00FFFF] font-bold">
                                <span className="w-2 h-2 inline-block rounded-full bg-[#00FFFF] animate-pulse mr-1"></span> {activeRoom.room_type} Room
                            </p>
                        </div>
                        <div className="flex items-center gap-2 shrink-0">
                            <button onClick={() => setShowParticipantsModal(true)} className="bg-[#0AE0D0]/10 text-[#0AE0D0] border border-[#0AE0D0]/30 hover:bg-[#0AE0D0]/20 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5"><i className="fa-solid fa-users"></i> {participants.length}</button>
                            <button onClick={() => leaveRoom()} className="bg-red-500/20 text-red-400 border border-red-500/50 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-[0_0_10px_rgba(255,0,0,0.2)] transition-colors">Leave</button>
                            <button onClick={onMinimize} className="w-9 h-9 rounded-xl bg-gray-800/80 text-white hover:bg-gray-700 flex items-center justify-center transition-colors border border-gray-600 shadow-[0_0_10px_rgba(0,0,0,0.3)]" title="Minimize Room"><i className="fa-solid fa-compress-alt text-sm"></i></button>
                        </div>
                    </div>
                    <div className="p-6">
                        <div className="flex justify-center gap-8 mb-8">
                            {renderSeat(0, hostSeat, "Host", true)}
                            {activeRoom.is_partner_seat_open && renderSeat(1, partnerSeat, "Partner", true)}
                        </div>
                        <div className="grid grid-cols-4 gap-y-6 gap-x-4 justify-items-center">
                            {micSeats.map((occupant, i) => <React.Fragment key={i}>{renderSeat(i+2, occupant, `Seat ${i+2}`)}</React.Fragment>)}
                        </div>
                    </div>

                    <div className="flex-1 bg-gradient-to-t from-[#021633] to-[#010B1C] mt-2 rounded-t-3xl border-t border-[#0AE0D0]/20 p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex flex-col justify-end overflow-hidden pb-24">
                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-2 mb-2 flex flex-col justify-end">
                            <div className="flex flex-col gap-2">
                                {chatMessages.map((msg, idx) => (
                                    <div key={idx} className="bg-[#010B1C]/80 backdrop-blur border border-[#0AE0D0]/20 rounded-xl px-3 py-2 text-sm w-fit max-w-[85%]">
                                        <span className="font-bold text-[#A4DFE6] mr-2">{msg.userName}:</span>
                                        <span className="text-white">{msg.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        {audience.length > 0 && (
                            <div className="flex flex-wrap gap-2 pt-2 border-t border-[#0AE0D0]/20 max-h-[60px] overflow-y-auto no-scrollbar">
                                {audience.map(p => (
                                    <div key={p.id} className="w-8 h-8 rounded-full bg-[#010B1C] flex items-center justify-center border border-[#0AE0D0]/20 text-white font-bold text-[10px]" title={p.user_name}>
                                        {p.user_name.charAt(0)}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 w-full max-w-md bg-[#010B1C]/95 backdrop-blur border-t border-[#0AE0D0]/30 p-3 flex gap-1.5 items-center z-20 pb-[env(safe-area-inset-bottom,_12px)]">
                        <input 
                            value={chatInput} onChange={e=>setChatInput(e.target.value)} 
                            placeholder="Message room..." 
                            className="flex-1 bg-[#021633] border border-[#0AE0D0]/30 rounded-full px-3 py-2 text-sm text-white focus:outline-none focus:border-[#00FFFF] min-w-[80px]"
                            onKeyDown={(e) => { if(e.key==='Enter' && chatInput.trim()) { sendChat(chatInput); setChatInput(''); } }}
                        />
                        <button onClick={() => { if(chatInput.trim()) { sendChat(chatInput); setChatInput(''); } }} className="w-9 h-9 shrink-0 bg-[#00FFFF] text-[#010B1C] rounded-full flex items-center justify-center hover:bg-[#00d8d8] shadow-[0_0_10px_rgba(0,255,255,0.4)] transition-colors">
                            <i className="fa-solid fa-paper-plane text-sm"></i>
                        </button>
                        <button onClick={toggleSpeaker} className={`w-9 h-9 shrink-0 rounded-full flex items-center justify-center transition-colors border border-transparent ${isSpeakerMuted ? 'text-gray-400 bg-gray-800' : 'text-[#A4DFE6] hover:bg-[#A4DFE6]/20'}`}>
                            <i className={`fa-solid ${isSpeakerMuted ? 'fa-volume-xmark' : 'fa-volume-high'} text-sm`}></i>
                        </button>
                        <button onClick={isSpeaker ? toggleMute : () => alert('Take a seat to use the mic!')} className={`w-9 h-9 shrink-0 rounded-full flex items-center justify-center transition-all ${!isSpeaker ? 'bg-gray-800 text-gray-500 cursor-not-allowed' : isMuted ? 'bg-red-500/20 text-red-500' : 'bg-[#00FFFF] text-[#010B1C] shadow-[0_0_10px_rgba(0,255,255,0.5)]'}`}>
                            <i className={`fa-solid ${isMuted || !isSpeaker ? 'fa-microphone-slash' : 'fa-microphone'} text-sm`}></i>
                        </button>
                        {!isSpeaker && (
                            <button onClick={handleBottomMicClick} className="w-9 h-9 shrink-0 rounded-full flex items-center justify-center transition-all shadow-[0_0_10px_rgba(79,70,229,0.5)] bg-indigo-600 text-white hover:bg-indigo-500">
                                <i className="fa-solid fa-hand text-sm"></i>
                            </button>
                        )}
                        {isHost && <button onClick={() => setShowSettingsModal(true)} className="w-9 h-9 shrink-0 rounded-full flex items-center justify-center text-[#A4DFE6] hover:bg-[#A4DFE6]/20 transition-colors bg-transparent"><i className="fa-solid fa-sliders text-sm"></i></button>}
                    </div>

                    {isHost && micRequests.length > 0 && (
                        <button onClick={() => setShowRequestsModal(true)} className="absolute bottom-20 right-4 bg-red-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-[0_0_15px_rgba(255,0,0,0.5)] animate-bounce flex items-center gap-1.5 z-30">
                            <i className="fa-solid fa-hand"></i> {micRequests.length} Requests
                        </button>
                    )}

                    {showActionModal && showActionModal.type === 'self' && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowActionModal(null)}>
                            <div className="bg-[#021633] rounded-2xl p-6 w-full max-w-xs text-center border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-xl font-bold text-white mb-4">Manage Seat</h3>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => { stepDown(); setShowActionModal(null); }} className="py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-xl font-bold transition-colors shadow-sm">Stand Up (Listen Only)</button>
                                    <button onClick={() => setShowActionModal(null)} className="py-3 bg-[#010B1C] text-white rounded-xl font-bold transition-colors border border-gray-600">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showActionModal && showActionModal.type === 'host_target' && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowActionModal(null)}>
                            <div className="bg-[#021633] rounded-2xl p-6 w-full max-w-xs text-center border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-xl font-bold text-white mb-4">Manage {showActionModal.occupant.user_name}</h3>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => { sendHostAction('mute', showActionModal.occupant.user_id); setShowActionModal(null); }} className="py-3 bg-orange-500/20 text-orange-500 hover:bg-orange-500 hover:text-white rounded-xl font-bold transition-colors border border-orange-500/50">Mute Mic</button>
                                    <button onClick={() => { sendBroadcast('lift_user', { target_uid: showActionModal.occupant.user_id }); setShowActionModal(null); }} className="py-3 bg-yellow-500/20 text-yellow-500 hover:bg-yellow-500 hover:text-white rounded-xl font-bold transition-colors border border-yellow-500/50">Lift Up (To Audience)</button>
                                    <button onClick={() => { sendHostAction('kick', showActionModal.occupant.user_id); setShowActionModal(null); }} className="py-3 bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white rounded-xl font-bold transition-colors border border-red-500/50">Kick User</button>
                                    <button onClick={() => setShowActionModal(null)} className="py-3 bg-[#010B1C] text-white rounded-xl font-bold transition-colors border border-gray-600">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showActionModal && showActionModal.type === 'invite_to_seat' && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-end justify-center p-0 animate-in slide-in-from-bottom" onClick={() => setShowActionModal(null)}>
                            <div className="bg-[#021633] rounded-t-2xl p-4 w-full max-w-md h-[50vh] flex flex-col border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-lg font-bold text-white mb-4">Invite to Seat {showActionModal.seatNum}</h3>
                                <div className="flex-1 overflow-y-auto space-y-2">
                                    {audience.length === 0 && <p className="text-gray-400 text-center py-10">No audience members to invite.</p>}
                                    {audience.map(a => (
                                        <div key={a.id} className="flex items-center justify-between bg-[#010B1C] p-3 rounded-xl border border-[#0AE0D0]/10">
                                            <div className="flex items-center gap-2 text-white font-bold text-sm">
                                                <div className="w-8 h-8 rounded-full bg-[#00FFFF] text-[#010B1C] flex items-center justify-center">{a.user_name[0]}</div>
                                                {a.user_name}
                                            </div>
                                            <button onClick={() => { sendBroadcast('invite_to_seat', { target_uid: a.user_id, seatNum: showActionModal.seatNum }); setShowActionModal(null); alert('Invite sent!'); }} className="bg-[#00FFFF] text-[#010B1C] px-3 py-1.5 rounded-lg text-xs font-bold shadow-[0_0_10px_rgba(0,255,255,0.4)]">Invite</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {pendingInvite && (
                        <div className="fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setPendingInvite(null)}>
                            <div className="bg-[#021633] rounded-2xl p-6 w-full max-w-xs text-center border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                                <div className="w-16 h-16 rounded-full bg-[#00FFFF]/20 text-[#00FFFF] mx-auto flex items-center justify-center text-2xl mb-4 border border-[#00FFFF]/50">
                                    <i className="fa-solid fa-microphone"></i>
                                </div>
                                <h3 className="text-xl font-bold text-white mb-2">Host Invitation</h3>
                                <p className="text-sm text-[#A4DFE6] mb-6">The host invited you to take Seat {pendingInvite.seatNum}. Do you accept?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setPendingInvite(null)} className="flex-1 py-3 bg-[#010B1C] border border-[#0AE0D0]/20 text-white rounded-xl font-bold transition-colors">Decline</button>
                                    <button onClick={() => { takeSeat(pendingInvite.seatNum); setPendingInvite(null); }} className="flex-1 py-3 bg-[#00FFFF] text-[#010B1C] rounded-xl font-bold transition-colors shadow-[0_0_15px_rgba(0,255,255,0.4)]">Accept</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showRequestsModal && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-end justify-center p-0 animate-in slide-in-from-bottom" onClick={() => setShowRequestsModal(false)}>
                            <div className="bg-[#021633] rounded-t-2xl p-4 w-full max-w-md h-[50vh] flex flex-col border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-lg font-bold text-white mb-4">Mic Requests</h3>
                                <div className="flex-1 overflow-y-auto space-y-2">
                                    {micRequests.length === 0 && <p className="text-gray-400 text-center py-10">No pending requests.</p>}
                                    {micRequests.map(req => (
                                        <div key={req.uid} className="flex items-center justify-between bg-[#010B1C] p-3 rounded-xl border border-[#0AE0D0]/10">
                                            <div className="flex items-center gap-2 text-white font-bold text-sm">
                                                <div className="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center">{req.name[0]}</div>
                                                <div>
                                                    <p>{req.name}</p>
                                                    <p className="text-[10px] text-gray-400 font-normal">Requests Seat {req.seatNum}</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setMicRequests(prev => prev.filter(r => r.uid !== req.uid))} className="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-xs font-bold">Reject</button>
                                                <button onClick={() => { sendBroadcast('approve_seat', { target_uid: req.uid, seatNum: req.seatNum }); setMicRequests(prev => prev.filter(r => r.uid !== req.uid)); }} className="bg-[#00FFFF] text-[#010B1C] px-3 py-1.5 rounded-lg text-xs font-bold shadow-[0_0_10px_rgba(0,255,255,0.4)]">Approve</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    {showParticipantsModal && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4 animate-in slide-in-from-bottom" onClick={() => setShowParticipantsModal(false)}>
                            <div className="bg-[#021633] w-full max-w-md h-[70vh] sm:rounded-2xl rounded-t-2xl p-4 flex flex-col shadow-[0_-10px_30px_rgba(0,255,255,0.1)] border border-[#0AE0D0]/30" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b border-[#0AE0D0]/20 pb-3">
                                    <h3 className="text-lg font-bold text-white">Participants ({participants.length})</h3>
                                    <button onClick={() => setShowParticipantsModal(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3">
                                    {participants.map(p => (
                                        <div key={p.id} className="flex items-center justify-between bg-[#010B1C] p-3 rounded-xl border border-[#0AE0D0]/10">
                                            <div className="flex items-center gap-3">
                                                {p.photo_url ? <img src={p.photo_url} className="w-10 h-10 rounded-full object-cover" /> : <div className="w-10 h-10 rounded-full bg-[#00FFFF] text-[#010B1C] font-bold flex items-center justify-center">{p.user_name[0]}</div>}
                                                <div>
                                                    <p className="text-white font-bold text-sm">{p.user_name} {p.user_id === activeRoom.host_user_id && <i className="fa-solid fa-crown text-yellow-400 text-xs ml-1"></i>}</p>
                                                    <p className="text-[#A4DFE6] text-[10px]">{p.seat_number !== null ? `Seat ${p.seat_number}` : 'Audience'}</p>
                                                </div>
                                            </div>
                                            {isHost && p.user_id !== String(tgUser.id) && (
                                                <div className="flex gap-2">
