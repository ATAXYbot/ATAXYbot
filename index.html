                                </div>
                            )}
                            
                            {activeBatch.link && (
                                <div className="flex gap-3">
                                    <a href={activeBatch.link} target="_blank" rel="noreferrer" className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-center hover:bg-blue-700 transition-colors shadow-md flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-external-link"></i> Visit Official
                                    </a>
                                </div>
                            )}
                            
                            <div className="bg-gray-100 dark:bg-gray-800 p-3 rounded-lg text-center">
                                <p className="text-[10px] text-gray-500 dark:text-gray-400">Scraped from pwjarvis.com</p>
                                <p className="text-[9px] text-gray-400 dark:text-gray-500 mt-1">Last updated: {activeBatch.scrapedAt ? new Date(activeBatch.scrapedAt).toLocaleString() : 'Recently'}</p>
                            </div>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="pb-24 pt-[60px] animate-in fade-in">
                    <div className="fixed top-0 w-full max-w-md bg-white dark:bg-gray-900 px-4 py-3 flex items-center justify-between shadow-sm border-b border-gray-200 dark:border-gray-800 pt-[60px] z-20">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white shadow-inner"><i className="fa-solid fa-book"></i></div>
                            <div>
                                <h2 className="font-bold text-gray-900 dark:text-white leading-tight">PW Jarvis Batches</h2>
                                <p className="text-[10px] text-blue-500 font-bold tracking-wide">{batches.count || 0} Free Batches</p>
                            </div>
                        </div>
                        <button onClick={onRefresh} disabled={loading} className="text-blue-600 hover:text-blue-700 disabled:opacity-50"><i className={`fa-solid fa-refresh ${loading ? 'fa-spin' : ''}`}></i></button>
                    </div>
                    
                    <div className="px-4 space-y-4">
                        {error && (
                            <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-2xl p-4 mt-4">
                                <p className="text-sm text-red-700 dark:text-red-300"><i className="fa-solid fa-exclamation-circle"></i> {error}</p>
                            </div>
                        )}
                        
                        {loading && (
                            <div className="flex justify-center items-center py-12">
                                <div className="flex flex-col items-center gap-3">
                                    <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                                    <p className="text-sm text-gray-500 dark:text-gray-400">Loading batches...</p>
                                </div>
                            </div>
                        )}
                        
                        {!loading && (!batches.batches || batches.batches.length === 0) && (
                            <div className="flex flex-col items-center justify-center py-12 px-4">
                                <div className="w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mb-4">
                                    <i className="fa-solid fa-inbox text-gray-400 text-2xl"></i>
                                </div>
                                <h3 className="text-lg font-bold text-gray-900 dark:text-white mb-2">No Batches Loaded</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 text-center mb-4">Click refresh to fetch the latest batches from PW Jarvis</p>
                                <button onClick={onRefresh} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors shadow-md">
                                    <i className="fa-solid fa-download mr-2"></i> Fetch Batches
                                </button>
                            </div>
                        )}
                        
                        {!loading && batches.batches && batches.batches.map((batch, idx) => (
                            <div key={idx} onClick={() => setActiveBatch(batch)} className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer hover:-translate-y-1">
                                {batch.imageUrl && (
                                    <img src={batch.imageUrl} alt={batch.title} className="w-full h-32 object-cover" onError={(e) => e.target.style.display = 'none'} />
                                )}
                                <div className="p-4">
                                    <h3 className="font-bold text-gray-900 dark:text-white text-base mb-1 line-clamp-2">{batch.title}</h3>
                                    {batch.description && <p className="text-xs text-gray-600 dark:text-gray-400 line-clamp-2 mb-3">{batch.description}</p>}
                                    
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {batch.category && <span className="bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 text-[10px] px-2.5 py-1 rounded-full font-bold">{batch.category}</span>}
                                        {batch.price && <span className="bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300 text-[10px] px-2.5 py-1 rounded-full font-bold">{batch.price}</span>}
                                        {batch.rating && <span className="bg-yellow-50 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300 text-[10px] px-2.5 py-1 rounded-full font-bold flex items-center gap-1"><i className="fa-solid fa-star text-[9px]"></i> {batch.rating}</span>}
                                    </div>
                                    
                                    <div className="flex items-center gap-2 text-[11px] text-gray-500 dark:text-gray-400">
                                        {batch.duration && <span><i className="fa-solid fa-clock"></i> {batch.duration}</span>}
                                        {batch.instructor && <span><i className="fa-solid fa-user"></i> {batch.instructor.substring(0, 20)}</span>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // �🚀 MAIN APP & NAVIGATION ROUTER
        // ==========================================
        function App() {
          const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('ataxy_theme') === 'dark');
          useEffect(() => {
              if (isDarkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('ataxy_theme', 'dark'); } 
              else { document.documentElement.classList.remove('dark'); localStorage.setItem('ataxy_theme', 'light'); }
          }, [isDarkMode]);

          const [isVerified, setIsVerified] = useState(localStorage.getItem('ataxy_verified') === 'true');
          const [tgUser, setTgUser] = useState(window.Telegram?.WebApp?.initDataUnsafe?.user || { first_name: "Student", id: "1001" });
          
          const [currentTab, setCurrentTab] = useState('home'); 
          const [activeBatch, setActiveBatch] = useState(null);
          const [activeSubBatch, setActiveSubBatch] = useState(null);
          const [activeSubject, setActiveSubject] = useState(null);
          const [activeChapter, setActiveChapter] = useState(null);
          const [activeVideo, setActiveVideo] = useState(null);
          const [activePracticeSubject, setActivePracticeSubject] = useState(null);
          const [activePracticeChapter, setActivePracticeChapter] = useState(null);
          const [practiceSelectedTopic, setPracticeSelectedTopic] = useState(null);
          const [practiceAttempts, setPracticeAttempts] = useState(() => JSON.parse(localStorage.getItem('ataxy_practice_perf')) || {});
          const [practiceShowPalette, setPracticeShowPalette] = useState(false);
          const [neetprepConnected, setNeetprepConnected] = useState(() => JSON.parse(localStorage.getItem('ataxy_neetprep_connected')) || false);
          const [neetprepUser, setNeetprepUser] = useState(() => localStorage.getItem('ataxy_neetprep_user') || '');
          const [neetprepAuthToken, setNeetprepAuthToken] = useState(() => localStorage.getItem('ataxy_neetprep_token') || '');
          const [neetprepData, setNeetprepData] = useState(() => {
              const saved = localStorage.getItem('ataxy_neetprep_data');
              return saved ? JSON.parse(saved) : null;
          });
          const [showNeetprepModal, setShowNeetprepModal] = useState(false);
          const [neetprepLoginInput, setNeetprepLoginInput] = useState('');
          const [neetprepOtpInput, setNeetprepOtpInput] = useState('');
          const [neetprepStatus, setNeetprepStatus] = useState('');
          const [activePdf, setActivePdf] = useState(null);
          
          // 🟢 PWJarvis State
          const [pwjarvisbatches, setPWJarvisBatches] = useState(() => {
              const saved = localStorage.getItem('ataxy_pwjarvis_batches');
              return saved ? JSON.parse(saved) : { batches: [], scrapedAt: null, count: 0 };
          });
          const [pwjarvisLoading, setPWJarvisLoading] = useState(false);
          const [pwjarvisError, setPWJarvisError] = useState('');
          const [activePWBatch, setActivePWBatch] = useState(null); 

          // 🟢 Dynamic QBank State
          const [qbankData, setQbankData] = useState([]);
          const [isUploadingPdf, setIsUploadingPdf] = useState(false);

          const practiceQuestions = useMemo(() => {
              if (!activePracticeChapter) return [];
              let flat = [];
              let gIdx = 1;
              activePracticeChapter.topics.forEach(t => {
                  t.questions.forEach(q => flat.push({ ...q, globalIndex: gIdx++, topicId: t.id, topicName: t.name }));
              });
              return flat;
          }, [activePracticeChapter]);

          // Daily Targets
          const getTodayStr = () => new Date().toISOString().split('T')[0];
          const [selectedDate, setSelectedDate] = useState(getTodayStr());
          const [targetsData, setTargetsData] = useState(() => JSON.parse(localStorage.getItem('ataxy_targets')) || {});
          const [newTarget, setNewTarget] = useState("");

          useEffect(() => { localStorage.setItem('ataxy_targets', JSON.stringify(targetsData)); }, [targetsData]);
          useEffect(() => { if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); } }, []);
          useEffect(() => { localStorage.setItem('ataxy_practice_perf', JSON.stringify(practiceAttempts)); }, [practiceAttempts]);
          useEffect(() => { localStorage.setItem('ataxy_neetprep_connected', JSON.stringify(neetprepConnected)); localStorage.setItem('ataxy_neetprep_user', neetprepUser); localStorage.setItem('ataxy_neetprep_token', neetprepAuthToken); }, [neetprepConnected, neetprepUser, neetprepAuthToken]);
          useEffect(() => { localStorage.setItem('ataxy_pwjarvis_batches', JSON.stringify(pwjarvisbatches)); }, [pwjarvisbatches]);
          
          // 🟢 Load QBank on Mount
          useEffect(() => {
              const fetchQbank = async () => {
                  try {
                      const res = await fetch('http://localhost:5000/api/qbank');
                      if (res.ok) {
                          const json = await res.json();
                          setQbankData(json.data || []);
                      }
                  } catch (e) {
                      console.error("Failed to load Qbank", e);
                  }
              };
              fetchQbank();
          }, []);

          // 🟢 Load PWJarvis batches from backend
          useEffect(() => {
              const loadPWJarvisBatches = async () => {
                  try {
                      const response = await fetch('http://localhost:5000/api/pwjarvis/batches');
                      if (response.ok) {
                          const data = await response.json();
                          if (data.data && data.data.batches) {
                              setPWJarvisBatches(data.data);
                              localStorage.setItem('ataxy_pwjarvis_batches', JSON.stringify(data.data));
                          }
                      }
                  } catch (error) {
                      console.error('Failed to load PWJarvis batches:', error);
                  }
              };
              loadPWJarvisBatches();
          }, []);
          useEffect(() => { setPracticeSelectedTopic(null); setPracticeShowPalette(false); }, [activePracticeChapter]);
          useEffect(() => {
              const loadNeetprepData = async () => {
                  // Try to restore from localStorage first
                  const savedData = localStorage.getItem('ataxy_neetprep_data');
                  if (savedData) {
                      try {
                          setNeetprepData(JSON.parse(savedData));
                      } catch (e) {
                          console.error('Failed to parse saved NEETPrep data');
                      }
                  }
                  
                  // Then try to fetch fresh data from backend
                  const url = neetprepAuthToken ? 'http://localhost:5000/api/neetprep/data' : `http://localhost:5000/api/neetprep/data?identifier=${encodeURIComponent(neetprepUser)}`;
                  if (!neetprepAuthToken && !neetprepUser) return;
                  try {
                      const response = await fetch(url, {
                          headers: neetprepAuthToken ? { 'Authorization': `Bearer ${neetprepAuthToken}` } : {}
                      });
                      const payload = await response.json();
                      if (response.ok) {
                          setNeetprepData(payload.data || payload);
                          localStorage.setItem('ataxy_neetprep_data', JSON.stringify(payload.data || payload));
                      }
                  } catch (error) {
                      console.error('Failed to fetch NEETPrep data from backend');
                  }
              };
              loadNeetprepData();
          }, [neetprepAuthToken, neetprepUser]);

          const openNeetprepModal = () => {
              setNeetprepStatus('');
              setShowNeetprepModal(true);
          };

          const sendNeetprepOtp = async (e) => {
              e.preventDefault();
              if (!neetprepLoginInput.trim()) {
                  setNeetprepStatus('Enter your NEETPrep email or phone to continue.');
                  return;
              }
              try {
                  const response = await fetch('http://localhost:5000/api/neetprep/request-otp', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ identifier: neetprepLoginInput.trim() })
                  });
                  const data = await response.json();
                  setNeetprepStatus(data.message || 'OTP request sent.');
              } catch (error) {
                  setNeetprepStatus('Unable to send OTP. Backend may not be running.');
              }
          };

          const verifyNeetprepOtp = async (e) => {
              e.preventDefault();
              if (!neetprepOtpInput.trim()) {
                  setNeetprepStatus('Enter the OTP code to verify your NEETPrep connection.');
                  return;
              }
              try {
                  const response = await fetch('http://localhost:5000/api/neetprep/verify-otp', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ identifier: neetprepLoginInput.trim(), otp: neetprepOtpInput.trim() })
                  });
                  const data = await response.json();
                  if (!response.ok) {
                      setNeetprepStatus(data.message || 'OTP verification failed.');
                      return;
                  }
                  setNeetprepConnected(true);
                  setNeetprepUser(data.user?.identifier || neetprepLoginInput.trim());
                  setNeetprepAuthToken(data.token || '');
                  setNeetprepStatus('Connected to NEETPrep. Loading courses...');
                  setNeetprepOtpInput('');

                  // Fetch and store course data
                  const r2 = await fetch(`http://localhost:5000/api/neetprep/data?identifier=${encodeURIComponent(neetprepLoginInput.trim())}`);
                  if (r2.ok) {
                      const d = await r2.json();
                      setNeetprepData(d.data || null);
                      localStorage.setItem('ataxy_neetprep_data', JSON.stringify(d.data || null));
                      setNeetprepStatus('✅ Connected to NEETPrep! Courses loaded.');
                      setTimeout(() => setShowNeetprepModal(false), 1000);
                  } else {
                      setNeetprepStatus('⚠️ Connected but courses failed to load');
                  }
              } catch (error) {
                  setNeetprepStatus('Unable to verify OTP. Backend may not be running.');
              }
          };

          const disconnectNeetprep = async () => {
              try {
                  await fetch('http://localhost:5000/api/neetprep/disconnect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ identifier: neetprepUser || neetprepLoginInput.trim() }) });
              } catch (e) { /* ignore */ }
              setNeetprepConnected(false);
              setNeetprepUser('');
              setNeetprepAuthToken('');
              setNeetprepData(null);
              localStorage.removeItem('ataxy_neetprep_connected');
              localStorage.removeItem('ataxy_neetprep_user');
              localStorage.removeItem('ataxy_neetprep_token');
              localStorage.removeItem('ataxy_neetprep_data');
          };

          // 🟢 PWJarvis Functions
          const refreshPWJarvisBatches = async () => {
              setPWJarvisLoading(true);
              setPWJarvisError('');
              try {
                  const response = await fetch('http://localhost:5000/api/pwjarvis/scrape', { method: 'POST' });
                  if (response.ok) {
                      const data = await response.json();
                      if (data.data) {
                          setPWJarvisBatches(data.data);
                          localStorage.setItem('ataxy_pwjarvis_batches', JSON.stringify(data.data));
                      }
                  } else {
                      setPWJarvisError('Failed to fetch batches. Please try again later.');
                  }
              } catch (error) {
                  setPWJarvisError('Backend connection error. Make sure the server is running on http://localhost:5000');
              } finally {
                  setPWJarvisLoading(false);
              }
          };

          const handleBack = () => {
            if (activeVideo) setActiveVideo(null);
            else if (activeChapter) setActiveChapter(null);
            else if (activeSubject) setActiveSubject(null);
            else if (activeSubBatch) setActiveSubBatch(null);
            else if (activeBatch) setActiveBatch(null);
            else if (activePracticeChapter) setActivePracticeChapter(null);
            else if (activePracticeSubject) setActivePracticeSubject(null);
          };

          if (!isVerified) return <Gatekeeper onVerify={(user) => { setTgUser(user); setIsVerified(true); }} />;

          // --- VIEWS ---
          const renderHomeView = () => {
             const currentTargets = targetsData[selectedDate] || [];
             const toggleTarget = (id) => { const u = currentTargets.map(t => t.id === id ? {...t, done: !t.done} : t); setTargetsData({...targetsData, [selectedDate]: u}); };
             const removeTarget = (id) => { const u = currentTargets.filter(t => t.id !== id); setTargetsData({...targetsData, [selectedDate]: u}); };
             const addTarget = (e) => { e.preventDefault(); if(!newTarget.trim()) return; const u = [...currentTargets, { id: Date.now(), text: newTarget, done: false }]; setTargetsData({...targetsData, [selectedDate]: u}); setNewTarget(""); };

             return ( 
             <div className="pb-24 pt-[60px] animate-in fade-in">
                 <div className="bg-blue-600 p-6 rounded-3xl shadow-lg text-white mx-4 mb-6 relative overflow-hidden mt-4">
                     <div className="relative z-10 flex justify-between items-center">
                         <div><h2 className="text-2xl font-bold">Hello, {tgUser.first_name}! 👋</h2><p className="text-blue-100 text-sm mt-1">Ready to crack your goals?</p></div>
                         <div className="h-12 w-12 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold text-xl shadow-inner uppercase">{tgUser.first_name[0]}</div>
                     </div>
                 </div>
                 
                 <div className="px-5 space-y-6">
                     <div className="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
                         <div className="flex justify-between items-center mb-4">
                             <h3 className="font-bold text-gray-800 dark:text-gray-200 text-lg flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-500"></i> Daily Targets</h3>
                             <input type="date" min="2026-01-01" max="2126-12-31" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-bold px-3 py-1.5 rounded outline-none border border-blue-100 dark:border-blue-800 cursor-pointer" />
                         </div>
                         <div className="space-y-2 mb-4 min-h-[60px]">
                             {currentTargets.length === 0 ? <p className="text-xs text-gray-400 italic text-center py-2">No targets set. Add one below!</p> : currentTargets.map(t => (
                                 <div key={t.id} className={`flex items-center justify-between p-2 rounded-lg transition-colors ${t.done ? 'bg-gray-50 dark:bg-gray-800 opacity-60' : 'bg-white border border-gray-100 dark:border-gray-800'}`}>
                                     <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => toggleTarget(t.id)}>
                                        <div className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 ${t.done ? 'bg-green-500 border-green-500' : 'border-gray-300 dark:border-gray-600'}`}>{t.done && <i className="fa-solid fa-check text-white text-[10px]"></i>}</div>
                                        <span className={`text-sm font-medium ${t.done ? 'line-through text-gray-500' : 'text-gray-800 dark:text-gray-200'}`}>{t.text}</span>
                                     </div>
                                     <button onClick={() => removeTarget(t.id)} className="text-red-500 p-2 hover:bg-red-50 rounded-lg"><i className="fa-solid fa-trash text-sm"></i></button>
                                 </div>
                             ))}
                         </div>
                         <form onSubmit={addTarget} className="flex gap-2 border-t border-gray-100 dark:border-gray-800 pt-4 mt-2">
                             <input type="text" value={newTarget} onChange={(e) => setNewTarget(e.target.value)} placeholder={`Add goal for ${selectedDate}...`} className="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 dark:text-white" />
                             <button type="submit" className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-md"><i className="fa-solid fa-plus"></i></button>
                         </form>
                     </div>
                     <div className="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-800">
                         <div className="flex items-center justify-between mb-4">
                             <div className="flex items-center gap-3">
                                 <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-red-500 to-pink-500 text-white flex items-center justify-center shadow-md"><i className="fa-solid fa-graduation-cap text-lg"></i></div>
                                 <div>
                                     <h3 className="font-bold text-gray-900 dark:text-white">NEETPrep Connect</h3>
                                     <p className="text-xs text-gray-500 dark:text-gray-400">Login with your NEETPrep account and enable question + video sync.</p>
                                 </div>
                             </div>
                             <button onClick={openNeetprepModal} className={`px-4 py-2 rounded-xl font-bold text-xs ${neetprepConnected ? 'bg-green-600 text-white' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                                 {neetprepConnected ? 'Connected' : 'Connect'}
                             </button>
                         </div>
                         {neetprepConnected && (
                             <div className="rounded-2xl bg-green-50 dark:bg-green-900/20 p-3 text-sm text-green-700 dark:text-green-200 mb-3">
                                 Connected as <span className="font-bold">{neetprepUser}</span>
                             </div>
                         )}
                         {neetprepData ? (
                             <>
                                 <div className="grid grid-cols-3 gap-3 text-center text-sm">
                                     <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl">
                                         <div className="font-bold text-blue-600 dark:text-blue-400">{neetprepData.batches.length}</div>
                                         <div className="text-gray-500 dark:text-gray-400">Batches</div>
                                     </div>
                                     <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl">
                                         <div className="font-bold text-blue-600 dark:text-blue-400">{neetprepData.videos.length}</div>
                                         <div className="text-gray-500 dark:text-gray-400">Videos</div>
                                     </div>
                                     <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl">
                                         <div className="font-bold text-blue-600 dark:text-blue-400">{neetprepData.questions.length}</div>
                                         <div className="text-gray-500 dark:text-gray-400">Questions</div>
                                     </div>
                                 </div>
                                 {neetprepData.backupUrl && (
                                     <div className="mt-3 text-xs text-blue-600 dark:text-blue-400">
                                         Backup: <a href={neetprepData.backupUrl} target="_blank" rel="noreferrer" className="underline">Cloudinary</a>
                                     </div>
                                 )}
                                 {neetprepData.fetchedAt && (
                                     <div className="mt-2 text-xs text-gray-500 dark:text-gray-400">Last synced: {new Date(neetprepData.fetchedAt).toLocaleString()}</div>
                                 )}
                             </>
                         ) : (
                             <p className="text-xs text-gray-500 dark:text-gray-400">Your NEETPrep data will load after login.</p>
                         )}
                     </div>
                 </div>
             </div> 
             );
          };

          // --- PW AUTHENTIC BATCHES VIEWS ---
          const renderBatchesView = () => {
              if(activeSubject) {
                  return (
                      <div className="pb-24 pt-[60px] px-4 animate-in fade-in">
                          <button onClick={handleBack} className="mb-4 text-gray-600 dark:text-gray-300 font-bold"><i className="fa-solid fa-arrow-left"></i> Back</button>
                          <h2 className="text-2xl font-black mb-4 dark:text-white flex items-center gap-2">{activeSubject.icon} {activeSubject.name} Chapters</h2>
                          {activeSubject.chapters.map(c => (
                              <div key={c.id} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm mb-3">
                                  <h3 className="font-bold text-gray-900 dark:text-white">{c.name}</h3>
                                  <p className="text-xs text-blue-500 font-bold mb-3">{c.count}</p>
                                  <div className="space-y-2">
                                      {c.videos?.map(v => (
                                          <div key={v.id} onClick={()=>setActiveVideo(v)} className="flex items-center gap-3 p-2 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg cursor-pointer border border-gray-100 dark:border-gray-800">
                                              <div className="w-10 h-10 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center shrink-0"><i className="fa-solid fa-play"></i></div>
                                              <div>
                                                  <p className="font-bold text-sm text-gray-800 dark:text-gray-200 line-clamp-1">{v.title}</p>
                                                  <p className="text-xs text-gray-500">{v.duration}</p>
                                              </div>
                                          </div>
                                      ))}
                                  </div>
                              </div>
                          ))}
                      </div>
                  )
              }
              if(activeBatch) {
                  const s = activeBatch.subBatches ? activeBatch.subBatches[0].subjects : activeBatch.subjects;
                  return (
                      <div className="pb-24 pt-[60px] px-4 animate-in fade-in">
                          <button onClick={handleBack} className="mb-4 text-gray-600 dark:text-gray-300 font-bold"><i className="fa-solid fa-arrow-left"></i> Back</button>
                          <h2 className="text-2xl font-black mb-4 dark:text-white">{activeBatch.name} Subjects</h2>
                          <div className="space-y-3">
                              {s?.map(sub => (
                                  <div key={sub.id} onClick={() => setActiveSubject(sub)} className="bg-white dark:bg-gray-900 p-4 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 flex items-center gap-4 cursor-pointer hover:border-blue-500">
                                      <div className="text-3xl">{sub.icon}</div>
                                      <div className="flex-1"><h3 className="font-bold text-lg dark:text-white">{sub.name}</h3></div>
                                      <i className="fa-solid fa-chevron-right text-gray-400"></i>
                                  </div>
                              ))}
                          </div>
                      </div>
                  )
              }

              return ( 
                  <div className="pb-24 pt-[60px] px-4 animate-in fade-in">
                      <h2 className="text-2xl font-black text-gray-900 dark:text-white mb-1 px-1">My Study Batches</h2>
                      <p className="text-gray-500 dark:text-gray-400 text-sm mb-6 px-1">Select a batch to access lectures</p>
                      <div className="space-y-4">
                          {neetprepConnected && neetprepData && neetprepData.batches && neetprepData.batches.length > 0 && (
                              <>
                                  <div className="bg-gradient-to-r from-purple-50 to-blue-50 dark:from-purple-900/20 dark:to-blue-900/20 rounded-2xl p-4 mb-6 border-l-4 border-purple-500">
                                      <h3 className="font-bold text-purple-900 dark:text-purple-200 mb-2">📚 Your NEETPrep Courses</h3>
                                      <p className="text-sm text-purple-700 dark:text-purple-300">{neetprepData.batches.length} batch • {neetprepData.videos.length} videos • {neetprepData.questions.length} questions</p>
                                  </div>
                                  {neetprepData.batches.map(batch => (
                                      <div key={batch.id} onClick={() => setActiveBatch({...batch, isNeetprep: true})} className="bg-gradient-to-br from-purple-50 to-blue-50 dark:from-purple-900/30 dark:to-blue-900/30 rounded-3xl shadow-sm border border-purple-200 dark:border-purple-700/50 overflow-hidden cursor-pointer hover:shadow-md transition-all">
                                          <div className="bg-gradient-to-r from-purple-500 to-blue-500 h-2.5 w-full"></div>
                                          <div className="p-5">
                                              <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-1">🎓 {batch.name}</h3>
                                              <p className="text-gray-600 dark:text-gray-300 text-sm mb-2">{batch.subjects.length} subjects</p>
                                              <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">Connected to NEETPrep</p>
                                              <button className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition">Go to Batch <i className="fa-solid fa-arrow-right text-xs"></i></button>
                                          </div>
                                      </div>
                                  ))}
                              </>
                          )}
                          {BATCHES.map(batch => ( 
                              <div key={batch.id} onClick={() => setActiveBatch(batch)} className="bg-white dark:bg-gray-900 rounded-3xl shadow-sm border border-gray-200 dark:border-gray-800 overflow-hidden cursor-pointer">
                                  <div className={`${batch.color} h-2.5 w-full`}></div>
                                  <div className="p-5">
                                      <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-1">{batch.name}</h3>
                                      <p className="text-gray-500 text-sm mb-4">{batch.target}</p>
                                      <button className="w-full bg-gray-50 dark:bg-gray-800 text-blue-600 dark:text-blue-400 font-bold py-3 rounded-xl border border-gray-200 dark:border-gray-700 flex items-center justify-center gap-2">Go to Batch <i className="fa-solid fa-arrow-right text-xs"></i></button>
                                  </div>
                              </div> 
                          ))}
                      </div>
                  </div> 
              );
          };

          // --- NEETPREP PRACTICE ENGINE ---
          const renderQuestionsView = () => {
             if (activePracticeChapter) {
                 const selectedTopic = practiceSelectedTopic;
                 const attempts = practiceAttempts;
                 const showPalette = practiceShowPalette;

                 const allQuestions = practiceQuestions;

                 const displayedQuestions = selectedTopic ? allQuestions.filter(q => q.topicId === selectedTopic) : allQuestions;

                 const handleAttempt = (qId, optionIdx) => { setPracticeAttempts({...attempts, [qId]: optionIdx}); };
                 const handleClear = (qId) => { const newAttempts = {...attempts}; delete newAttempts[qId]; setPracticeAttempts(newAttempts); };

                 const scrollToQuestion = (id) => {
                     setPracticeShowPalette(false);
                     setTimeout(() => { document.getElementById(`question-card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
                 };

                 return (
                     <div className="pb-24 pt-[60px] animate-in slide-in-from-right relative min-h-screen bg-gray-50 dark:bg-gray-950">
                         <div className="px-4 pb-3 flex items-center gap-3 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 sticky top-0 z-20 pt-4">
                             <button onClick={handleBack} className="w-10 h-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-900 dark:text-white"><i className="fa-solid fa-arrow-left"></i></button>
                             <div className="flex-1">
                                 <h2 className="text-lg font-bold text-gray-900 dark:text-white leading-tight line-clamp-1">{activePracticeChapter.name}</h2>
                                 <p className="text-[10px] text-gray-500">NEET 2026 Target</p>
                             </div>
                         </div>
                         
                         <div className="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 p-3 sticky top-[60px] z-10 shadow-sm overflow-x-auto whitespace-nowrap flex gap-2 no-scrollbar">
                             <button onClick={() => setPracticeSelectedTopic(null)} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors ${selectedTopic === null ? 'bg-[#0eb582] text-white border-[#0eb582]' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-700'}`}>All Topics</button>
                             {activePracticeChapter.topics.map(t => (
                                 <button key={t.id} onClick={() => setPracticeSelectedTopic(t.id)} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors ${selectedTopic === t.id ? 'bg-[#0eb582] text-white border-[#0eb582]' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-gray-700'}`}>{t.name}</button>
                             ))}
                         </div>

                         <div className="px-4 mt-5 max-w-2xl mx-auto space-y-4">
                             {displayedQuestions.map((q) => {
                                 const isAnswered = attempts[q.id] !== undefined;
                                 return (
                                 <div key={q.id} id={`question-card-${q.id}`} className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden scroll-mt-[120px]">
                                     <div className="p-5">
                                         <div className="flex justify-between items-start mb-4 gap-2">
                                             <p className="font-bold text-gray-900 dark:text-white leading-relaxed text-[15px]"><span className="text-gray-900 dark:text-white mr-1 text-base">Q{q.globalIndex}.</span> {q.text}</p>
                                         </div>
                                         <div className="flex flex-col border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden mb-4">
                                             {q.options.map((opt, idx) => {
                                                 const isSelected = attempts[q.id] === idx;
                                                 const isCorrectChoice = idx === q.correct;
                                                 let bg = "bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200";
                                                 let numBg = "border-r border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-500";
                                                 if (isAnswered) {
                                                     if (isCorrectChoice) { bg = "bg-green-100 dark:bg-green-900/40 text-green-800 font-bold"; numBg = "border-r border-green-200 bg-green-200 text-green-800"; } 
                                                     else if (isSelected) { bg = "bg-red-100 dark:bg-red-900/40 text-red-800 font-bold"; numBg = "border-r border-red-200 bg-red-200 text-red-800"; } 
                                                     else { bg = "opacity-50 bg-white dark:bg-gray-800"; }
                                                 }
                                                 return (
                                                     <button key={idx} disabled={isAnswered} onClick={() => handleAttempt(q.id, idx)} className={`np-grid-btn w-full text-left flex items-stretch transition-colors ${bg}`}>
                                                         <div className={`w-10 flex items-center justify-center shrink-0 font-bold text-sm ${numBg}`}>{idx + 1}</div>
                                                         <div className="p-3 text-sm">{opt}</div>
                                                     </button>
                                                 );
                                             })}
                                         </div>
                                         <div className="flex gap-2">
                                             {q.ncert && <span className="bg-[#d49a4e] text-white text-[10px] font-bold px-3 py-1.5 rounded uppercase shadow-sm">From NCERT</span>}
                                             {q.accuracy && <span className="bg-[#d49a4e] text-white text-[10px] font-bold px-3 py-1.5 rounded uppercase shadow-sm">{q.accuracy} Correct</span>}
                                         </div>
                                     </div>
                                     {isAnswered && (
                                         <div className="bg-gray-50 dark:bg-gray-800 p-3 border-t border-gray-200 dark:border-gray-700 flex flex-wrap gap-2 justify-between items-center animate-in fade-in">
                                             <div className="flex gap-2">
                                                 <button className="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 text-xs font-bold px-4 py-2 rounded-full shadow-sm">View Explanation</button>
                                             </div>
                                             <button onClick={() => handleClear(q.id)} className="text-red-500 text-xs font-bold p-2"><i className="fa-solid fa-rotate-left"></i> Clear</button>
                                         </div>
                                     )}
                                 </div>
                             )})}
                         </div>

                         {/* Bottom Bar Tools */}
                         <div className="fixed bottom-0 w-full max-w-md bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 flex justify-between items-center z-20">
                             <button className="w-12 h-12 flex items-center justify-center text-gray-500 border border-gray-200 dark:border-gray-700 rounded-xl"><i className="fa-solid fa-ellipsis-vertical"></i></button>
                             <button className="w-12 h-12 flex items-center justify-center text-gray-500 border border-gray-200 dark:border-gray-700 rounded-xl"><i className="fa-regular fa-bookmark"></i></button>
                             <button onClick={() => setPracticeShowPalette(true)} className="w-12 h-12 flex items-center justify-center text-blue-600 border border-blue-200 dark:border-blue-800 rounded-xl bg-blue-50 dark:bg-blue-900/30 shadow-sm"><i className="fa-solid fa-list-check"></i></button>
                             <button className="flex-1 ml-2 bg-[#0eb582] text-white font-bold rounded-xl h-12 flex items-center justify-center gap-2 shadow-md"><i className="fa-solid fa-arrow-right"></i> Next</button>
                         </div>

                         {showPalette && (
                             <div className="fixed inset-0 bg-black/60 z-[99999] flex flex-col justify-end animate-in fade-in" onClick={() => setPracticeShowPalette(false)}>
                                 <div className="bg-white dark:bg-gray-900 rounded-t-3xl p-5 max-h-[70vh] overflow-y-auto w-full max-w-md mx-auto" onClick={e=>e.stopPropagation()}>
                                     <div className="flex justify-between items-center mb-5">
                                         <h3 className="font-bold text-gray-900 dark:text-white text-lg">Question Palette</h3>
                                         <button onClick={() => setPracticeShowPalette(false)} className="text-gray-500 w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full"><i className="fa-solid fa-xmark"></i></button>
                                     </div>
                                     <div className="grid grid-cols-6 gap-2">
                                         {allQuestions.map(q => {
                                             const isAns = attempts[q.id] !== undefined;
                                             const isCorrect = isAns && attempts[q.id] === q.correct;
                                             let bgClass = "bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300"; // Unattempted
                                             if (isAns) bgClass = isCorrect ? "bg-green-600 text-white" : "bg-red-500 text-white";
                                             return (
                                                 <button key={q.id} onClick={() => scrollToQuestion(q.id)} className={`w-full aspect-square rounded-lg flex items-center justify-center font-bold text-sm shadow-sm ${bgClass}`}>
                                                     {q.globalIndex}
                                                 </button>
                                             )
                                         })}
                                     </div>
                                 </div>
                             </div>
                         )}
                     </div>
                 );
             }

             return (
                 <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                     <div className="flex justify-between items-center mb-6">
                         <h2 className="text-2xl font-black text-gray-900 dark:text-white">Practice Hub</h2>
                     </div>
                     <div className="flex gap-2 overflow-x-auto no-scrollbar mb-5">
                         {qbankData.map(sub => (
                             <button key={sub.id} onClick={() => setActivePracticeSubject(sub)} className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap border flex items-center gap-2 ${activePracticeSubject?.id === sub.id ? 'bg-[#0eb582] text-white border-[#0eb582]' : 'bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 border-gray-200 dark:border-gray-800'}`}>
                                 {sub.icon} {sub.name}
                             </button>
                         ))}
                     </div>
                     <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider text-xs">Chapter Selection</h3>
                     <div className="space-y-3">
                         {qbankData.length > 0 && (activePracticeSubject || qbankData[0]).chapters.length > 0 ? (
                             (activePracticeSubject || qbankData[0]).chapters.map((chap, i) => (
                                 <div key={i} onClick={() => setActivePracticeChapter(chap)} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex justify-between items-center shadow-sm cursor-pointer hover:border-[#0eb582] hover:shadow-md transition-all">
                                     <div>
                                         <h4 className="font-bold text-sm text-gray-900 dark:text-white">{chap.name}</h4>
                                         <p className="text-[10px] font-bold text-[#d49a4e] mt-1 bg-orange-50 dark:bg-orange-900/20 inline-block px-2 py-0.5 rounded">{chap.topics?.length || 0} Topics</p>
                                     </div>
                                     <i className="fa-solid fa-chevron-right text-gray-400"></i>
                                 </div>
                             ))
                         ) : (
                             <p className="text-sm text-gray-500 text-center mt-8">Upload a PDF to add chapters.</p>
                         )}
                     </div>
                 </div>
             );
          };

          // --- PROFILE & PERFORMANCE ---
          const renderProfileView = () => {
             const perf = JSON.parse(localStorage.getItem('ataxy_practice_perf') || '{}');
             const watched = JSON.parse(localStorage.getItem('ataxy_lectures') || '[]');
             
             const totalAttempted = Object.keys(perf).length;
             let totalCorrect = 0;
             qbankData.forEach(sub => sub.chapters.forEach(chap => chap.topics?.forEach(top => top.questions.forEach(q => {
                 if(perf[q.id] === q.correct) totalCorrect++;
             }))));
             const accuracy = totalAttempted > 0 ? Math.round((totalCorrect/totalAttempted)*100) : 0;

             const handlePdfUpload = async (e) => {
                 const file = e.target.files[0];
                 if(!file) return;
                 setIsUploadingPdf(true);
                 const formData = new FormData();
                 formData.append('pdf', file);
                 
                 try {
                     const res = await fetch('http://localhost:5000/api/qbank/upload', {
                         method: 'POST',
                         body: formData
                     });
                     const data = await res.json();
                     if(data.ok) {
                         setQbankData(data.data);
                         alert("PDF processed and added to QBank successfully!");
                     } else {
                         alert("Error processing PDF: " + data.error);
                     }
                 } catch(err) {
                     alert("Network error during upload.");
                 }
                 setIsUploadingPdf(false);
                 e.target.value = ''; // Reset input
             };

             return (
             <div className="pb-24 pt-[60px] px-5 animate-in fade-in">
                 <div className="text-center mb-8">
                     <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full mx-auto flex items-center justify-center text-4xl font-black mb-4 uppercase shadow-inner">{tgUser.first_name[0]}</div>
                     <h2 className="text-2xl font-black text-gray-900 dark:text-white">{tgUser.first_name}</h2>
                     <p className="text-sm text-gray-500 mt-1">ATAXY UID: {tgUser.id}</p>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">Performance Dashboard</h3>
                 <div className="grid grid-cols-2 gap-3 mb-6">
                     <div className="bg-white dark:bg-gray-900 p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm flex flex-col justify-center items-center text-center">
                         <div className="w-10 h-10 bg-blue-50 dark:bg-blue-900/30 text-blue-500 rounded-full flex items-center justify-center text-lg mb-2"><i className="fa-solid fa-video"></i></div>
                         <h4 className="font-bold text-gray-900 dark:text-white text-xl">{watched.length}</h4>
                         <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">Lectures Watched</p>
                     </div>
                     <div className="bg-white dark:bg-gray-900 p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm flex flex-col justify-center items-center text-center">
                         <div className="w-10 h-10 bg-green-50 dark:bg-green-900/30 text-green-500 rounded-full flex items-center justify-center text-lg mb-2"><i className="fa-solid fa-bullseye"></i></div>
                         <h4 className="font-bold text-gray-900 dark:text-white text-xl">{accuracy}%</h4>
                         <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">{totalCorrect}/{totalAttempted} Correct</p>
                     </div>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">Admin Tools</h3>
                 <div className="bg-gradient-to-r from-[#0eb582] to-[#0ba875] p-5 rounded-2xl shadow-sm text-white mb-6 relative overflow-hidden">
                     <div className="relative z-10">
                         <h4 className="font-bold text-lg mb-1">Add Books / PDFs</h4>
                         <p className="text-xs text-white/80 mb-4">Upload a PDF. AI will automatically extract and categorize questions into the Practice Hub.</p>
                         <label className={`bg-white text-[#0eb582] font-bold text-sm px-4 py-2.5 rounded-xl cursor-pointer shadow-sm flex items-center justify-center gap-2 w-max ${isUploadingPdf ? 'opacity-70 pointer-events-none' : ''}`}>
                             {isUploadingPdf ? <><i className="fa-solid fa-spinner fa-spin"></i> Processing PDF...</> : <><i className="fa-solid fa-file-pdf"></i> Upload PDF</>}
                             <input type="file" accept="application/pdf" className="hidden" onChange={handlePdfUpload} disabled={isUploadingPdf} />
                         </label>
                     </div>
                     <i className="fa-solid fa-robot absolute -right-4 -bottom-4 text-6xl text-white/10"></i>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">App Settings</h3>
                 <div className="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm mb-6">
                     <div className="p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer" onClick={() => setIsDarkMode(!isDarkMode)}>
                         <div className="flex items-center gap-3 text-gray-800 dark:text-gray-200"><i className={`fa-solid ${isDarkMode ? 'fa-moon text-yellow-400' : 'fa-sun text-orange-500'} w-5`}></i> <span className="font-medium">Dark Mode</span></div>
                         <div className={`w-12 h-6 rounded-full flex items-center p-1 transition-colors duration-300 ${isDarkMode ? 'bg-blue-600' : 'bg-gray-300 dark:bg-gray-600'}`}>
                             <div className={`w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm ${isDarkMode ? 'translate-x-6' : ''}`}></div>
                         </div>
                     </div>
                 </div>
             </div>
             );
          };

          return (
            <div className="min-h-screen font-sans max-w-md mx-auto relative overflow-hidden bg-gray-50 dark:bg-gray-950">
              
              {activePdf && <PDFViewer url={activePdf} title="Course Material" onClose={() => setActivePdf(null)} />}

              {activeVideo ? (
                  <div className="bg-white dark:bg-gray-950 min-h-screen animate-in slide-in-from-bottom duration-300 pb-10">
                      <UniversalPlayer src={activeVideo.url} title={activeVideo.title} onBack={handleBack} user={tgUser} />
                      <div className="p-5 pt-5">
                          <h1 className="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-2">{activeVideo.title}</h1>
                          <div className="flex gap-3 mb-5">
                              <button onClick={() => setActivePdf("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf")} className="flex-1 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 text-red-600 dark:text-red-400 font-bold py-2.5 rounded-xl border border-red-100 dark:border-red-900/50 flex items-center justify-center gap-2 text-sm transition-colors shadow-sm">
                                  <i className="fa-solid fa-file-pdf"></i> Class Notes
                              </button>
                          </div>
                      </div>
                  </div>
              ) : activePracticeChapter && currentTab === 'questions' ? renderQuestionsView() : 
               activeSubject && currentTab === 'batches' ? renderBatchesView() : 
               activeBatch && currentTab === 'batches' ? renderBatchesView() : (
                <>
                  {currentTab === 'home' && renderHomeView()}
                  {currentTab === 'batches' && renderBatchesView()}
                  {currentTab === 'chat' && <ChatView user={tgUser} />}
                  {currentTab === 'ai' && <AIMentorView />}
                  {currentTab === 'questions' && renderQuestionsView()}
                  {currentTab === 'pw' && <PWJarvisView batches={pwjarvisbatches} loading={pwjarvisLoading} error={pwjarvisError} onRefresh={refreshPWJarvisBatches} activeBatch={activePWBatch} setActiveBatch={setActivePWBatch} />}
                  {currentTab === 'profile' && renderProfileView()}
                  
                  {/* Bottom Navigation */}
                  <div className="fixed bottom-0 w-full max-w-md bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 flex justify-around pb-5 pt-3 z-[45] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] overflow-x-auto">
                    <button onClick={() => { setCurrentTab('home'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'home' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-house text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Home</span></button>
                    <button onClick={() => { setCurrentTab('batches'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'batches' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-book-open text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Batches</span></button>
                    <button onClick={() => { setCurrentTab('pw'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'pw' ? 'text-cyan-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-book text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">PW</span></button>
                    <button onClick={() => { setCurrentTab('chat'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'chat' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-message text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Chat</span></button>
                    <button onClick={() => { setCurrentTab('ai'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'ai' ? 'text-purple-500' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-robot text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">AI</span></button>
                    <button onClick={() => { setCurrentTab('questions'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'questions' ? 'text-[#0eb582]' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-file-pen text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Practice</span></button>
                    <button onClick={() => { setCurrentTab('profile'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 ${currentTab === 'profile' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-user text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Me</span></button>
                  </div>
                </>
              )}
              {showNeetprepModal && (
                  <div className="fixed inset-0 bg-black/60 z-[99999] flex items-center justify-center p-4" onClick={() => setShowNeetprepModal(false)}>
                      <div className="w-full max-w-md bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-2xl border border-gray-200 dark:border-gray-800" onClick={(e) => e.stopPropagation()}>
                          <div className="flex items-center justify-between mb-4">
                              <div>
                                  <h3 className="text-xl font-bold text-gray-900 dark:text-white">NEETPrep Login</h3>
                                  <p className="text-xs text-gray-500 dark:text-gray-400">Use your official NEETPrep account to connect.</p>
                              </div>
                            <button onClick={() => setShowNeetprepModal(false)} className="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300"><i className="fa-solid fa-xmark"></i></button>
                          </div>
                          <form onSubmit={sendNeetprepOtp} className="space-y-4">
                              <div>
                                  <label className="text-xs uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">NEETPrep Email / Phone</label>
                                  <input value={neetprepLoginInput} onChange={(e) => setNeetprepLoginInput(e.target.value)} type="text" placeholder="Enter your NEETPrep email or phone" className="mt-2 w-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl px-4 py-3 text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />
                              </div>
                              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700">Send OTP</button>
                              <div className="border-t border-gray-200 dark:border-gray-800 pt-4">
                                  <label className="text-xs uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">OTP Code</label>
                                  <input value={neetprepOtpInput} onChange={(e) => setNeetprepOtpInput(e.target.value)} type="text" placeholder="Enter OTP received on NEETPrep" className="mt-2 w-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl px-4 py-3 text-sm text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />
                                  <button type="button" onClick={verifyNeetprepOtp} className="mt-4 w-full bg-green-600 text-white py-3 rounded-2xl font-bold hover:bg-green-700">Verify OTP</button>
                              </div>
                              {neetprepStatus && <p className="text-sm text-gray-600 dark:text-gray-300">{neetprepStatus}</p>}
                              {neetprepConnected && <button type="button" onClick={disconnectNeetprep} className="w-full bg-red-600 text-white py-3 rounded-2xl font-bold hover:bg-red-700">Disconnect NEETPrep</button>}
                          </form>
                      </div>
                  </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
