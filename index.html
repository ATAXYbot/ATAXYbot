                                                     numBg = "border-r border-[#fad2cf] bg-[#fad2cf] text-[#c5221f] font-semibold";
                                                 } else {
                                                     bg = "opacity-60 bg-white";
                                                 }
                                             }
                                             return (
                                                 <button key={idx} disabled={isAnswered} onClick={() => handleAttempt(currentQuestion.id, idx)} className={`np-grid-btn w-full text-left flex items-stretch transition-all border-b border-gray-300 last:border-b-0 ${bg} disabled:cursor-not-allowed`}>
                                                     <div className={`w-10 flex items-center justify-center shrink-0 font-semibold text-[15px] ${numBg}`}>({idx + 1})</div>
                                                     <div className="p-3 text-sm w-full text-left break-words overflow-hidden"><FormattedText text={opt} /></div>
                                                 </button>
                                             );
                                         })}
                                     </div>
                                 </div>
                                 {isAnswered && (
                                     <div className={`p-4 border-t ${isCorrect ? 'bg-[#e6f4ea] border-[#cce8d6]' : 'bg-[#fce8e6] border-[#fad2cf]'} animate-in fade-in`}>
                                         <div className="flex items-center justify-between mb-3">
                                             <div className="flex items-center gap-2">
                                                 <i className={`fa-solid ${isCorrect ? 'fa-check-circle text-green-600' : 'fa-times-circle text-red-600'} text-lg`}></i>
                                                 <span className={`font-semibold text-sm ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                                     {isCorrect ? 'Correct Answer' : 'Incorrect Answer'}
                                                 </span>
                                             </div>
                                             <button onClick={() => handleClear(currentQuestion.id)} className="text-xs font-semibold text-gray-600 hover:text-gray-900 border border-gray-300 bg-white px-2 py-1 rounded-sm shadow-sm transition-colors">
                                                 <i className="fa-solid fa-rotate-left"></i> Clear
                                             </button>
                                         </div>
                                         
                                         <div className="flex gap-2">
                                             <button onClick={() => setShowExplanation(!showExplanation)} className={`border text-xs font-semibold px-4 py-2 rounded-sm shadow-sm transition-colors ${showExplanation ? 'bg-blue-100 border-blue-300 text-blue-800' : 'bg-white border-gray-300 text-gray-700 hover:bg-gray-50'}`}>
                                                 {showExplanation ? 'Hide Explanation' : 'View Explanation'}
                                             </button>
                                         </div>
                                         
                                         {showExplanation && (
                                             <div className="mt-4 p-3 bg-white border border-gray-300 rounded-sm text-sm text-gray-800 shadow-sm animate-in fade-in">
                                                 <p className="font-semibold text-gray-600 mb-2 text-xs uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-lightbulb text-yellow-500"></i> Explanation</p>
                                                 {currentQuestion.explanation ? <FormattedText text={currentQuestion.explanation} /> : <span className="italic text-gray-500">No explanation provided.</span>}
                                             </div>
                                         )}
                                     </div>
                                 )}
                                 
                                 <div className="border-t border-gray-300 bg-gray-50 p-3 flex justify-between items-center">
                                     <button onClick={() => setShowNoteInput(prev => ({...prev, [currentQuestion.id]: !prev[currentQuestion.id]}))} className="text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1">
                                         <i className="fa-solid fa-pen-to-square"></i> {questionNotes[currentQuestion.id] ? 'Edit Notes' : 'Add Notes'}
                                     </button>
                                     {questionNotes[currentQuestion.id] && !showNoteInput[currentQuestion.id] && (
                                         <span className="text-[10px] bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-sm font-semibold border border-yellow-200"><i className="fa-solid fa-note-sticky"></i> Note Attached</span>
                                     )}
                                 </div>
                                 {showNoteInput[currentQuestion.id] && (
                                     <div className="p-3 bg-white border-t border-gray-300 animate-in fade-in">
                                         <textarea
                                             value={questionNotes[currentQuestion.id] || ''}
                                             onChange={(e) => setQuestionNotes(prev => ({...prev, [currentQuestion.id]: e.target.value}))}
                                             placeholder="Write down your notes here..."
                                             className="w-full bg-white border border-gray-300 rounded-sm text-sm text-gray-800 focus:border-blue-500 focus:ring-0 p-3 placeholder-gray-400 resize-none h-24 outline-none"
                                         ></textarea>
                                     </div>
                                 )}
                             </div>
                             )}
                         </div>
                         <div className="fixed bottom-0 w-full max-w-md bg-gray-100 border-t border-gray-300 p-3 flex gap-3 z-[45]">
                             <button onClick={handlePrevious} disabled={safeQuestionIndex === 0} className="flex-1 bg-white border border-gray-300 text-gray-800 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed font-semibold py-2.5 rounded-sm flex items-center justify-center gap-2 shadow-sm">
                                 <i className="fa-solid fa-arrow-left"></i> Previous
                             </button>
                             <button onClick={handleNext} disabled={safeQuestionIndex >= displayedQuestions.length - 1} className="flex-1 bg-[#2563eb] border border-[#2563eb] text-white hover:bg-[#1d4ed8] disabled:opacity-50 disabled:cursor-not-allowed font-semibold py-2.5 rounded-sm flex items-center justify-center gap-2 shadow-sm">
                                 Save & Next <i className="fa-solid fa-arrow-right"></i>
                             </button>
                         </div>
                         {showPalette && (
                             <div className="fixed inset-0 bg-black/50 z-[99999] flex flex-col justify-end animate-in fade-in" onClick={() => setPracticeShowPalette(false)}>
                                 <div className="bg-white rounded-t-sm p-4 max-h-[70vh] overflow-y-auto w-full max-w-md mx-auto" onClick={e => e.stopPropagation()}>
                                     <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-2">
                                         <h3 className="font-bold text-gray-800 text-lg">Question Palette</h3>
                                         <button onClick={() => setPracticeShowPalette(false)} className="text-gray-500 hover:text-gray-700"><i className="fa-solid fa-xmark text-xl"></i></button>
                                     </div>
                                     <div className="grid grid-cols-6 gap-2">
                                         {displayedQuestions.map((q, qIdx) => {
                                             const isAns = attempts[q.id] !== undefined;
                                             const selectedIdx = attempts[q.id];
                                             const isCorrect = isAns && ['A', 'B', 'C', 'D'][selectedIdx] === q.correctOption;
                                             let bgClass = "bg-white border border-gray-300 text-gray-700 hover:bg-gray-50";
                                             if (isAns) bgClass = isCorrect ? "bg-[#1e7e34] border-[#1e7e34] text-white" : "bg-[#c5221f] border-[#c5221f] text-white";
                                             return (
                                                 <button key={q.id} onClick={() => scrollToQuestion(qIdx)} className={`w-full aspect-square rounded-sm flex items-center justify-center font-semibold text-sm shadow-sm transition-all ${bgClass} ${safeQuestionIndex === qIdx ? 'ring-2 ring-blue-500 ring-offset-1' : ''}`}>
                                                     {qIdx + 1}
                                                 </button>
                                             );
                                         })}
                                     </div>
                                     <div className="mt-4 flex flex-wrap gap-3 text-xs text-gray-600 border-t border-gray-200 pt-3">
                                         <div className="flex items-center gap-1"><div className="w-3 h-3 bg-white border border-gray-300"></div> Not Answered</div>
                                         <div className="flex items-center gap-1"><div className="w-3 h-3 bg-[#1e7e34]"></div> Correct</div>
                                         <div className="flex items-center gap-1"><div className="w-3 h-3 bg-[#c5221f]"></div> Incorrect</div>
                                     </div>
                                 </div>
                             </div>
                         )}
                     </div>
                 );
             }

             if (activePracticeSubject) {
                 return (
                     <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-xl font-bold text-gray-900 dark:text-white">{activePracticeSubject.name}</h2>
                         </div>
                         <h3 className="font-semibold text-[#00a651] mb-3 uppercase tracking-wider text-xs bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 inline-block px-2 py-1 rounded-md">Chapter Selection</h3>
                         <div className="space-y-3">
                             {activePracticeSubject.chapters && activePracticeSubject.chapters.length > 0 ? (
                                 activePracticeSubject.chapters.map((chap, i) => (
                                     <div key={i} onClick={() => { setActivePracticeChapter(chap); setCurrentTab('questions'); }} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex justify-between items-center shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all group">
                                         <div>
                                             <h4 className="font-semibold text-sm text-gray-800 dark:text-gray-200 group-hover:text-[#00a651] transition-colors">{chap.name}</h4>
                                             <p className="text-[10px] font-semibold text-gray-500 mt-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 inline-block px-2 py-0.5 rounded-sm">{chap.topics?.length || 0} Topics</p>
                                         </div>
                                         <i className="fa-solid fa-chevron-right text-gray-400 group-hover:text-[#00a651] transition-colors"></i>
                                     </div>
                                 ))
                             ) : (
                                 <p className="text-sm text-gray-500 text-center mt-8">No chapters available</p>
                             )}
                         </div>
                     </div>
                 );
             }

             if (activePracticeFile) {
                 return (
                     <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-xl font-bold text-gray-900 dark:text-white">{activePracticeFile.name} Subjects</h2>
                         </div>
                         
                         {qbankError && (
                             <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-5 shadow-sm text-sm text-red-800 dark:text-red-200">
                                 <div className="font-bold flex items-center gap-2 mb-2">
                                     <i className="fa-solid fa-cloud"></i> Network Issue
                                 </div>
                                 <p className="mb-2 opacity-90">{qbankError}</p>
                             </div>
                         )}

                         <div className="grid grid-cols-2 gap-3">
                             {qbankData.length > 0 ? qbankData.map(sub => (
                                 <div key={sub.id} onClick={() => setActivePracticeSubject(sub)} className="bg-white dark:bg-gray-900 p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all flex flex-col items-center justify-center text-center group">
                                     <span className="text-3xl mb-2 group-hover:scale-110 transition-transform">{sub.icon}</span>
                                     <h3 className="font-bold text-gray-800 dark:text-gray-200 mt-2 group-hover:text-[#00a651] transition-colors">{sub.name}</h3>
                                     <p className="text-[10px] text-gray-500 mt-1">{sub.chapters?.length || 0} Chapters</p>
                                 </div>
                             )) : (
                                 <p className="text-sm text-gray-500 text-center col-span-2 py-8">Loading subjects...</p>
                             )}
                         </div>
                     </div>
                 );
             }

             if (activePracticeBatch) {
                 return (
                     <div className="pb-24 pt-4 px-5 animate-in fade-in min-h-screen">
                         <div className="flex items-center gap-3 mb-6">
                             <button onClick={handleBack} className="w-8 h-8 bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300"><i className="fa-solid fa-arrow-left"></i></button>
                             <h2 className="text-xl font-bold text-gray-900 dark:text-white">{activePracticeBatch.name}</h2>
                         </div>
                         <div className="space-y-3">
                             {activePracticeBatch.files.map((file, i) => (
                                 <div key={i} onClick={() => setActivePracticeFile(file)} className="bg-white dark:bg-gray-900 p-4 rounded-xl border border-gray-200 dark:border-gray-800 flex items-center gap-4 shadow-sm cursor-pointer hover:border-[#00a651] dark:hover:border-[#00a651] transition-all group">
                                     <div className="w-10 h-10 rounded-xl bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-[#00a651] flex items-center justify-center text-lg"><i className="fa-solid fa-file-alt"></i></div>
                                     <div className="flex-1">
                                         <h3 className="font-semibold text-base text-gray-800 dark:text-gray-200 group-hover:text-[#00a651] transition-colors">{file.name}</h3>
                                         <p className="text-xs text-gray-500">Practice Module</p>
                                     </div>
                                     <i className="fa-solid fa-chevron-right text-gray-400 group-hover:text-[#00a651] transition-colors"></i>
                                 </div>
                             ))}
                         </div>
                     </div>
                 );
             }

             const PRACTICE_BATCHES = [
                 { id: 'pb_allen', name: 'LN modules', type: 'ln', files: [{ id: 'pf_race', name: 'Race' }] },
                 { id: 'pb_pw', name: 'Bablu Dablu modules', type: 'pw', files: [{ id: 'pf_dpp', name: 'DPP' }] }
             ];

             return (
                     <div className="pb-24 pt-6 px-5 animate-in fade-in min-h-screen">
                     <div className="flex justify-between items-center mb-6">
                         <div className="flex items-center gap-3">
                             <AtaxyLogo className="w-10 h-10 rounded-xl shadow-md border border-gray-200" />
                             <h2 className="text-2xl font-black text-gray-900 dark:text-white tracking-wider">ATAXY BANK</h2>
                         </div>
                     </div>
                     <div className="space-y-4">
                         {PRACTICE_BATCHES.map(batch => (
                                 <div key={batch.id} onClick={() => setActivePracticeBatch(batch)} className={`p-5 rounded-2xl cursor-pointer hover:scale-[1.02] active:scale-95 transition-all relative overflow-hidden ${batch.type === 'ln' ? 'bg-[#00a651] border border-[#008c44] shadow-[0_0_15px_rgba(0,166,81,0.3)] text-white' : 'bg-black dark:bg-gray-900 border border-gray-800 shadow-lg text-white'}`}>
                                 <div className="relative z-10">
                                         <h3 className="text-xl font-black mb-1 text-white">{batch.name}</h3>
                                         <p className={`text-xs font-medium ${batch.type === 'ln' ? 'text-green-100' : 'text-gray-400'}`}>{batch.files.length} Modules Available</p>
                                 </div>
                                     <i className={`fa-solid ${batch.type === 'ln' ? 'fa-book text-green-800/30' : 'fa-layer-group text-white/5'} absolute -right-4 -bottom-4 text-6xl`}></i>
                             </div>
                         ))}
                     </div>
                 </div>
             );
          };

          // --- BOOKMARK VIEWER (ADVANCED FILTERING) ---
          const renderBookmarkViewer = () => {
              const allBookmarked = [];
              qbankData.forEach(sub => {
                  sub.chapters?.forEach(chap => {
                      chap.topics?.forEach(top => {
                          top.questions?.forEach(q => {
                              if (bookmarks.includes(q.id)) {
                                  allBookmarked.push({
                                      ...q,
                                      subjectName: sub.name,
                                      chapterName: chap.name,
                                      topicName: top.name
                                  });
                              }
                          });
                      });
                  });
              });

              let subjects = new Set();
              let chapters = new Set();
              let topics = new Set();

              allBookmarked.forEach(q => {
                  subjects.add(q.subjectName);
                  if (!bookmarkSubjectFilter || q.subjectName === bookmarkSubjectFilter) {
                      chapters.add(q.chapterName);
                      if (!bookmarkChapterFilter || q.chapterName === bookmarkChapterFilter) {
                          topics.add(q.topicName);
                      }
                  }
              });

              const filtered = allBookmarked.filter(q => {
                  if (bookmarkSearch && !q.text.toLowerCase().includes(bookmarkSearch.toLowerCase())) return false;
                  if (bookmarkSubjectFilter && q.subjectName !== bookmarkSubjectFilter) return false;
                  if (bookmarkChapterFilter && q.chapterName !== bookmarkChapterFilter) return false;
                  if (bookmarkTopicFilter && q.topicName !== bookmarkTopicFilter) return false;
                  return true;
              });

              return (
                  <div className="fixed inset-x-0 bottom-0 top-[60px] z-[100000] bg-gray-50 dark:bg-gray-950 flex flex-col animate-in slide-in-from-bottom duration-300 max-w-md mx-auto shadow-2xl">
                      <div className="flex items-center justify-between p-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm z-10">
                          <div className="flex items-center gap-3">
                              <button onClick={() => setShowBookmarkViewer(false)} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors flex items-center justify-center text-gray-800 dark:text-gray-200">
                                  <i className="fa-solid fa-arrow-left"></i>
                              </button>
                              <AtaxyLogo className="w-8 h-8 rounded-lg shadow-sm border border-yellow-200" />
                              <h2 className="font-bold text-lg text-gray-900 dark:text-white leading-tight">ATAXY Bookmarks</h2>
                          </div>
                          <span className="text-xs font-bold bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-500 px-2 py-1 rounded shadow-sm">{filtered.length} Qs</span>
                      </div>

                      <div className="p-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 space-y-3 z-10">
                          <div className="relative">
                              <i className="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                              <input type="text" placeholder="Search saved questions..." value={bookmarkSearch} onChange={e => setBookmarkSearch(e.target.value)} className="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-xl pl-9 pr-4 py-2.5 text-sm text-gray-900 dark:text-white focus:ring-2 focus:ring-yellow-500 outline-none transition-all" />
                          </div>
                          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                              <select value={bookmarkSubjectFilter} onChange={e => {setBookmarkSubjectFilter(e.target.value); setBookmarkChapterFilter(''); setBookmarkTopicFilter('');}} className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold px-3 py-2 rounded-lg border-none outline-none shrink-0">
                                  <option value="">All Subjects</option>
                                  {[...subjects].map(s => <option key={s} value={s}>{s}</option>)}
                              </select>
                              <select value={bookmarkChapterFilter} onChange={e => {setBookmarkChapterFilter(e.target.value); setBookmarkTopicFilter('');}} className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold px-3 py-2 rounded-lg border-none outline-none shrink-0">
                                  <option value="">All Chapters</option>
                                  {[...chapters].map(c => <option key={c} value={c}>{c}</option>)}
                              </select>
                              <select value={bookmarkTopicFilter} onChange={e => setBookmarkTopicFilter(e.target.value)} className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold px-3 py-2 rounded-lg border-none outline-none shrink-0">
                                  <option value="">All Topics</option>
                                  {[...topics].map(t => <option key={t} value={t}>{t}</option>)}
                              </select>
                          </div>
                      </div>

                      <div className="flex-1 overflow-y-auto p-4 space-y-4">
                          {filtered.length === 0 ? (
                              <div className="text-center py-12">
                                  <i className="fa-regular fa-bookmark text-4xl text-gray-300 dark:text-gray-600 mb-3"></i>
                                  <p className="text-gray-500 dark:text-gray-400 font-medium">No bookmarks match your search.</p>
                              </div>
                          ) : filtered.map(q => {
                              const isExpanded = activeBookmarkId === q.id;
                              return (
                                  <div key={q.id} className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm overflow-hidden">
                                      <div className="p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" onClick={() => setActiveBookmarkId(isExpanded ? null : q.id)}>
                                          <div className="flex flex-wrap gap-2 mb-2">
                                              <span className="text-[9px] bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded font-bold uppercase tracking-wider">{q.subjectName}</span>
                                              <span className="text-[9px] bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded font-bold uppercase tracking-wider truncate max-w-[200px]">{q.topicName}</span>
                                          </div>
                                          <div className="text-[15px] font-medium text-gray-800 dark:text-gray-200 line-clamp-3 mb-3">
                                              <FormattedText text={q.text} className="inline" />
                                          </div>
                                          <div className="flex justify-between items-center text-xs">
                                              <button onClick={(e) => { e.stopPropagation(); setBookmarks(prev => prev.filter(id => id !== q.id)); }} className="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 px-2 py-1.5 rounded-lg font-bold transition-colors">
                                                  <i className="fa-solid fa-trash"></i> Remove
                                              </button>
                                              <span className="text-blue-600 font-bold bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-lg">{isExpanded ? 'Hide Details' : 'View Question'} <i className={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} ml-1`}></i></span>
                                          </div>
                                      </div>
                                      
                                      {isExpanded && (
                                          <div className="border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 p-4 animate-in fade-in">
                                              {q.imageUrl && (
                                                  <div className="mb-4 rounded-xl overflow-hidden bg-white dark:bg-gray-800 flex items-center justify-center border border-gray-100 dark:border-gray-700 p-2">
                                                      <img src={q.imageUrl} alt="Question" className="max-w-full max-h-48 object-contain" onError={(e) => e.target.style.display = 'none'} />
                                                  </div>
                                              )}
                                              <div className="space-y-2 mb-4">
                                                  {q.options.map((opt, i) => {
                                                      const isCorrect = ['A','B','C','D'][i] === q.correctOption;
                                                      return (
                                                          <div key={i} className={`p-3 border rounded-xl text-sm ${isCorrect ? 'bg-green-50 border-green-200 text-green-800 dark:bg-green-900/20 dark:border-green-800 dark:text-green-300 font-bold' : 'bg-white border-gray-200 text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300'}`}>
                                                              <span className="mr-2 opacity-60">({i+1})</span> <FormattedText text={opt} className="inline" />
                                                              {isCorrect && <i className="fa-solid fa-check-circle ml-2 text-green-600 dark:text-green-400 float-right mt-0.5"></i>}
                                                          </div>
                                                      )
                                                  })}
                                              </div>
                                              {q.explanation && (
                                                  <div className="p-3 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800/50 rounded-xl text-sm text-gray-800 dark:text-gray-200 shadow-inner">
                                                      <p className="font-bold text-yellow-600 dark:text-yellow-500 mb-2 text-[10px] uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-lightbulb"></i> Explanation</p>
                                                      <FormattedText text={q.explanation} />
                                                  </div>
                                              )}
                                              {questionNotes[q.id] && (
                                                  <div className="mt-3 p-3 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/50 rounded-xl text-sm text-gray-800 dark:text-gray-200 shadow-inner">
                                                      <p className="font-bold text-blue-600 dark:text-blue-500 mb-2 text-[10px] uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-note-sticky"></i> My Notes</p>
                                                      <p className="whitespace-pre-wrap leading-relaxed">{questionNotes[q.id]}</p>
                                                  </div>
                                              )}
                                          </div>
                                      )}
                                  </div>
                              )
                          })}
                      </div>
                  </div>
              );
          };

          // --- MISTAKES (INCORRECT) VIEWER ---
          const renderIncorrectViewer = () => {
              const allIncorrect = [];
              const perf = safeGetJSON('ataxy_practice_perf', null) || {};

              qbankData.forEach(sub => {
                  sub.chapters?.forEach(chap => {
                      chap.topics?.forEach(top => {
                          top.questions?.forEach(q => {
                              if (perf[q.id] !== undefined && ['A','B','C','D'][perf[q.id]] !== q.correctOption) {
                                  allIncorrect.push({
                                      ...q,
                                      subjectName: sub.name,
                                      chapterName: chap.name,
                                      topicName: top.name,
                                      userAttempt: perf[q.id]
                                  });
                              }
                          });
                      });
                  });
              });

              let subjects = new Set();
              let chapters = new Set();
              let topics = new Set();

              allIncorrect.forEach(q => {
                  subjects.add(q.subjectName);
                  if (!incorrectSubjectFilter || q.subjectName === incorrectSubjectFilter) {
                      chapters.add(q.chapterName);
                      if (!incorrectChapterFilter || q.chapterName === incorrectChapterFilter) {
                          topics.add(q.topicName);
                      }
                  }
              });

              const filtered = allIncorrect.filter(q => {
                  if (incorrectSearch && !q.text.toLowerCase().includes(incorrectSearch.toLowerCase())) return false;
                  if (incorrectSubjectFilter && q.subjectName !== incorrectSubjectFilter) return false;
                  if (incorrectChapterFilter && q.chapterName !== incorrectChapterFilter) return false;
                  if (incorrectTopicFilter && q.topicName !== incorrectTopicFilter) return false;
                  return true;
              });

              return (
                  <div className="fixed inset-x-0 bottom-0 top-[60px] z-[100000] bg-gray-50 dark:bg-gray-950 flex flex-col animate-in slide-in-from-bottom duration-300 max-w-md mx-auto shadow-2xl">
                      <div className="flex items-center justify-between p-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm z-10">
                          <div className="flex items-center gap-3">
                              <button onClick={() => setShowIncorrectViewer(false)} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors flex items-center justify-center text-gray-800 dark:text-gray-200">
                                  <i className="fa-solid fa-arrow-left"></i>
                              </button>
                              <AtaxyLogo className="w-8 h-8 rounded-lg shadow-sm border border-red-200" />
                              <h2 className="font-black text-lg text-red-500 tracking-widest drop-shadow-[0_0_8px_rgba(255,0,0,0.4)]">ATAXY</h2>
                          </div>
                          <span className="text-xs font-bold bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-500 px-2 py-1 rounded shadow-sm">{filtered.length} Qs</span>
                      </div>

                      <div className="p-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 space-y-3 z-10">
                          <div className="relative">
                              <i className="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                              <input type="text" placeholder="Search incorrect questions..." value={incorrectSearch} onChange={e => setIncorrectSearch(e.target.value)} className="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-xl pl-9 pr-4 py-2.5 text-sm text-gray-900 dark:text-white focus:ring-2 focus:ring-red-500 outline-none transition-all" />
                          </div>
                          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                              <select value={incorrectSubjectFilter} onChange={e => {setIncorrectSubjectFilter(e.target.value); setIncorrectChapterFilter(''); setIncorrectTopicFilter('');}} className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold px-3 py-2 rounded-lg border-none outline-none shrink-0">
                                  <option value="">All Subjects</option>
                                  {[...subjects].map(s => <option key={s} value={s}>{s}</option>)}
                              </select>
                              <select value={incorrectChapterFilter} onChange={e => {setIncorrectChapterFilter(e.target.value); setIncorrectTopicFilter('');}} className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold px-3 py-2 rounded-lg border-none outline-none shrink-0">
                                  <option value="">All Chapters</option>
                                  {[...chapters].map(c => <option key={c} value={c}>{c}</option>)}
                              </select>
                              <select value={incorrectTopicFilter} onChange={e => setIncorrectTopicFilter(e.target.value)} className="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-bold px-3 py-2 rounded-lg border-none outline-none shrink-0">
                                  <option value="">All Topics</option>
                                  {[...topics].map(t => <option key={t} value={t}>{t}</option>)}
                              </select>
                          </div>
                      </div>

                      <div className="flex-1 overflow-y-auto p-4 space-y-4">
                          {filtered.length === 0 ? (
                              <div className="text-center py-12">
                                  <i className="fa-solid fa-bullseye text-4xl text-green-400 mb-3"></i>
                                  <p className="text-gray-500 dark:text-gray-400 font-medium">Amazing! No incorrect questions here.</p>
                              </div>
                          ) : filtered.map(q => {
                              const isExpanded = activeIncorrectId === q.id;
                              return (
                                  <div key={q.id} className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm overflow-hidden">
                                      <div className="p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" onClick={() => setActiveIncorrectId(isExpanded ? null : q.id)}>
                                          <div className="flex flex-wrap gap-2 mb-2">
                                              <span className="text-[9px] bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-2 py-0.5 rounded font-bold uppercase tracking-wider">Mistake</span>
                                              <span className="text-[9px] bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded font-bold uppercase tracking-wider truncate max-w-[200px]">{q.topicName}</span>
                                          </div>
                                          <div className="text-[15px] font-medium text-gray-800 dark:text-gray-200 line-clamp-3 mb-3">
                                              <FormattedText text={q.text} className="inline" />
                                          </div>
                                          <div className="flex justify-end items-center text-xs">
                                              <span className="text-blue-600 font-bold bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-lg">{isExpanded ? 'Hide Solution' : 'Revise Mistake'} <i className={`fa-solid fa-chevron-${isExpanded ? 'up' : 'down'} ml-1`}></i></span>
                                          </div>
                                      </div>
                                      
                                      {isExpanded && (
                                          <div className="border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 p-4 animate-in fade-in">
                                              <div className="space-y-2 mb-4">
                                                  {q.options.map((opt, i) => {
                                                      const isCorrect = ['A','B','C','D'][i] === q.correctOption;
                                                      const wasSelected = q.userAttempt === i;
                                                      return (
                                                          <div key={i} className={`p-3 border rounded-xl text-sm ${isCorrect ? 'bg-green-50 border-green-200 text-green-800 dark:bg-green-900/20 dark:border-green-800 dark:text-green-300 font-bold' : wasSelected ? 'bg-red-50 border-red-200 text-red-800 dark:bg-red-900/20 dark:border-red-800 dark:text-red-300 font-bold' : 'bg-white border-gray-200 text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300'}`}>
                                                              <span className="mr-2 opacity-60">({i+1})</span> <FormattedText text={opt} className="inline" />
                                                              {isCorrect && <i className="fa-solid fa-check-circle ml-2 text-green-600 dark:text-green-400 float-right mt-0.5"></i>}
                                                              {wasSelected && !isCorrect && <span className="float-right text-[10px] uppercase tracking-wider text-red-500 mt-1"><i className="fa-solid fa-times"></i> Your Pick</span>}
                                                          </div>
                                                      )
                                                  })}
                                              </div>
                                              {q.explanation && (
                                                  <div className="p-3 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800/50 rounded-xl text-sm text-gray-800 dark:text-gray-200 shadow-inner">
                                                      <p className="font-bold text-yellow-600 dark:text-yellow-500 mb-2 text-[10px] uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-lightbulb"></i> Explanation</p>
                                                      <FormattedText text={q.explanation} />
                                                  </div>
                                              )}
                                          </div>
                                      )}
                                  </div>
                              )
                          })}
                      </div>
                  </div>
              );
          };

          // --- PROFILE & PERFORMANCE ---
          const renderProfileView = () => {
             const perf = safeGetJSON('ataxy_practice_perf', null) || {};
             
             const totalAttempted = Object.keys(perf).length;
             let totalCorrect = 0;
             let subjectStats = {};

             qbankData.forEach(sub => {
                 subjectStats[sub.name] = { attempted: 0, correct: 0 };
                 sub.chapters?.forEach(chap => chap.topics?.forEach(top => top.questions?.forEach(q => {
                     if(perf[q.id] !== undefined) {
                         subjectStats[sub.name].attempted++;
                         if(perf[q.id] === q.correct) {
                             totalCorrect++;
                             subjectStats[sub.name].correct++;
                         }
                     }
                 })));
             });

             const accuracy = totalAttempted > 0 ? Math.round((totalCorrect/totalAttempted)*100) : 0;
             const totalIncorrect = totalAttempted - totalCorrect;

             return (
             <div className="pb-24 pt-6 px-5 animate-in fade-in">
                 <div className="text-center mb-8 flex flex-col items-center">
                     {tgUser?.photo_url ? (
                         <img src={tgUser.photo_url} alt={tgUser.first_name} className="w-24 h-24 rounded-full border-4 border-white dark:border-slate-800 shadow-xl dark:shadow-[0_0_20px_rgba(0,243,255,0.2)] mb-4 object-cover" />
                     ) : (
                         <div className="w-24 h-24 rounded-full border-4 border-white dark:border-slate-800 shadow-xl dark:shadow-[0_0_20px_rgba(0,243,255,0.2)] mb-4 flex items-center justify-center bg-gradient-to-br from-cyan-500 to-blue-600 text-white text-4xl font-black uppercase">
                             {tgUser?.first_name ? tgUser.first_name.charAt(0) : 'S'}
                         </div>
                     )}
                     <h2 className="text-2xl font-black text-gray-900 dark:text-white">{tgUser.first_name}</h2>
                     <p className="text-sm text-gray-500 dark:text-gray-400 mt-1 font-medium bg-gray-100 dark:bg-slate-800 px-3 py-1 rounded-full">ATAXY UID: {tgUser.id}</p>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-white mb-4 px-1 flex items-center gap-2">
                     <i className="fa-solid fa-chart-line text-primary-500 dark:text-neon-cyan"></i> Analytics Engine
                 </h3>
                 <div className="grid grid-cols-2 gap-4 mb-4">
                     <div className="ataxy-card p-5 flex flex-col justify-center items-center text-center cursor-pointer group" onClick={() => setShowBookmarkViewer(true)}>
                         <div className="w-12 h-12 bg-yellow-50 dark:bg-yellow-400/10 text-yellow-500 dark:text-yellow-400 rounded-full flex items-center justify-center text-xl mb-3 group-hover:scale-110 transition-transform"><i className="fa-solid fa-bookmark"></i></div>
                         <h4 className="font-black text-gray-900 dark:text-white text-2xl">{bookmarks.length}</h4>
                         <p className="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-widest mt-1">Bookmarked</p>
                     </div>
                     <div className="ataxy-card p-5 flex flex-col justify-center items-center text-center">
                         <div className="w-12 h-12 bg-green-50 dark:bg-neon-cyan/10 text-green-500 dark:text-neon-cyan rounded-full flex items-center justify-center text-xl mb-3"><i className="fa-solid fa-bullseye"></i></div>
                         <h4 className="font-black text-gray-900 dark:text-white text-2xl">{accuracy}%</h4>
                         <p className="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-widest mt-1">{totalCorrect}/{totalAttempted} Correct</p>
                     </div>
                 </div>

                 <div className="bg-gradient-to-r from-orange-400 to-rose-500 dark:from-slate-900 dark:to-slate-800 dark:border dark:border-orange-500/30 rounded-3xl p-5 text-white shadow-lg dark:shadow-[0_0_20px_rgba(249,115,22,0.15)] flex items-center justify-between mb-8">
                     <div>
                         <h4 className="font-black text-xl flex items-center gap-2 dark:text-orange-400"><i className="fa-solid fa-fire text-yellow-200 dark:text-orange-500"></i> {studyStreak.count} Day Mastery Streak!</h4>
                         <p className="text-sm text-white/90 dark:text-gray-300 font-medium mt-1">Keep practicing every day to maintain your streak.</p>
                     </div>
                     <i className="fa-solid fa-bolt text-4xl opacity-20 dark:text-orange-500 dark:opacity-30"></i>
                 </div>

                 <div className="ataxy-card p-5 mb-6">
                     <h4 className="font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><i className="fa-solid fa-chart-pie text-purple-500"></i> Detailed Analytics</h4>
                     <div className="grid grid-cols-3 gap-2 mb-5">
                         <div className="bg-gray-50 dark:bg-gray-800 rounded-xl p-3 text-center">
                             <div className="text-lg font-black text-gray-900 dark:text-white">{totalAttempted}</div>
                             <div className="text-[9px] text-gray-500 font-bold uppercase mt-1 tracking-wider">Attempted</div>
                         </div>
                         <div className="bg-green-50 dark:bg-green-900/20 rounded-xl p-3 text-center border border-green-100 dark:border-green-900/30">
                             <div className="text-lg font-black text-green-600 dark:text-green-400">{totalCorrect}</div>
                             <div className="text-[9px] text-green-600 dark:text-green-400 font-bold uppercase mt-1 tracking-wider">Correct</div>
                         </div>
                         <div className="bg-red-50 dark:bg-red-900/20 rounded-xl p-3 text-center border border-red-100 dark:border-red-900/30">
                             <div className="text-lg font-black text-red-600 dark:text-red-400">{totalIncorrect}</div>
                             <div className="text-[9px] text-red-600 dark:text-red-400 font-bold uppercase mt-1 tracking-wider">Incorrect</div>
                         </div>
                     </div>
                     <h5 className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-3">Subject Wise Accuracy</h5>
                     <div className="space-y-4">
                         {Object.keys(subjectStats).map(subName => {
                             const s = subjectStats[subName];
                             const acc = s.attempted > 0 ? Math.round((s.correct / s.attempted) * 100) : 0;
                             let barColor = 'bg-blue-500';
                             if(subName.toLowerCase().includes('phy')) barColor = 'bg-purple-500';
                             if(subName.toLowerCase().includes('bio') || subName.toLowerCase().includes('bot') || subName.toLowerCase().includes('zoo')) barColor = 'bg-green-500';
                             if(subName.toLowerCase().includes('chem')) barColor = 'bg-orange-500';
                             return (
                                 <div key={subName}>
                                     <div className="flex justify-between text-xs mb-1.5">
                                         <span className="font-bold text-gray-700 dark:text-gray-300">{subName}</span>
                                         <span className="font-bold text-gray-900 dark:text-white">{acc}% <span className="text-gray-400 font-normal">({s.correct}/{s.attempted})</span></span>
                                     </div>
                                     <div className="w-full bg-gray-100 dark:bg-gray-800 rounded-full h-1.5 overflow-hidden">
                                         <div className={`${barColor} h-full rounded-full transition-all duration-1000`} style={{width: `${acc}%`}}></div>
                                     </div>
                                 </div>
                             );
                         })}
                         {Object.keys(subjectStats).length === 0 && <p className="text-xs text-gray-400 italic">Attempt questions to see subject data.</p>}
                     </div>
                 </div>

                 <div className="grid grid-cols-2 gap-3 mb-6">
                     <div className="ataxy-card p-4 flex items-center gap-3 cursor-pointer hover:border-yellow-500 transition-colors" onClick={() => setShowBookmarkViewer(true)}>
                         <div className="w-10 h-10 bg-yellow-50 dark:bg-yellow-900/30 text-yellow-500 rounded-full flex items-center justify-center text-lg shrink-0"><i className="fa-solid fa-bookmark"></i></div>
                         <div className="text-left">
                             <h4 className="font-bold text-gray-900 dark:text-white text-sm">Bookmarks</h4>
                             <p className="text-[9px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">{bookmarks.length} Saved</p>
                         </div>
                     </div>
                     <div className="ataxy-card p-4 flex items-center gap-3 cursor-pointer hover:border-red-500 transition-colors" onClick={() => setShowIncorrectViewer(true)}>
                         <div className="w-10 h-10 bg-red-50 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center text-lg shrink-0"><i className="fa-solid fa-times-circle"></i></div>
                         <div className="text-left">
                             <h4 className="font-bold text-gray-900 dark:text-white text-sm">Mistakes</h4>
                             <p className="text-[9px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">{totalIncorrect} Review</p>
                         </div>
                     </div>
                 </div>

                 <h3 className="font-bold text-gray-800 dark:text-gray-200 mb-3 px-1">App Settings</h3>
                 <div className="ataxy-card overflow-hidden mb-6">
                     <div className="p-4 flex items-center justify-between hover:border-ataxy-accent-primary cursor-pointer transition-colors" onClick={() => setIsDarkMode(!isDarkMode)}>
                         <div className="flex items-center gap-3 text-ataxy-text-primary"><i className={`fa-solid ${isDarkMode ? 'fa-moon text-yellow-400' : 'fa-sun text-orange-500'} w-5`}></i> <span className="font-bold uppercase tracking-widest text-[10px]">{isDarkMode ? 'Deep Space Focus' : 'Strategic Clarity'}</span></div>
                         <div className={`w-12 h-6 rounded-full flex items-center p-1 transition-colors duration-300 ${isDarkMode ? 'bg-ataxy-accent-primary shadow-neon' : 'bg-ataxy-border'}`}>
                             <div className={`w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm ${isDarkMode ? 'translate-x-6' : ''}`}></div>
                         </div>
                     </div>
                 </div>
             </div>
             );
          };

          return (
            <div className="min-h-screen font-sans max-w-md mx-auto relative overflow-hidden bg-gray-50 dark:bg-gray-950 pt-[60px]">
              <TopNavBar />
              
              {activePracticeChapter && currentTab === 'questions' ? renderQuestionsView() : (
                <>
                  {currentTab === 'home' && renderHomeView()}
                  {currentTab === 'chat' && <ChatView user={tgUser} />}
                  {currentTab === 'ai' && <AIMentorView />}
                  {currentTab === 'voice' && <VoiceRoomsTab tgUser={tgUser} handleBack={handleBack} />}
                  {currentTab === 'questions' && renderQuestionsView()}
                  {currentTab === 'profile' && renderProfileView()}
                  
                  {showBookmarkViewer && renderBookmarkViewer()}
                  {showIncorrectViewer && renderIncorrectViewer()}

                  {/* Bottom Navigation */}
                  <div className="fixed bottom-0 w-full max-w-md bg-ataxy-background/90 backdrop-blur-md border-t border-ataxy-border flex justify-around pb-5 pt-3 z-[45] overflow-x-auto">
                    <button onClick={() => { setCurrentTab('home'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 active:scale-95 ${currentTab === 'home' ? 'text-ataxy-accent-primary drop-shadow-[0_0_8px_rgba(0,255,255,0.6)]' : 'text-ataxy-text-secondary hover:text-ataxy-accent-primary'}`}><i className="fa-regular fa-compass text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Home</span></button>
                    <button onClick={() => { setCurrentTab('chat'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 active:scale-95 ${currentTab === 'chat' ? 'text-ataxy-accent-primary drop-shadow-[0_0_8px_rgba(0,255,255,0.6)]' : 'text-ataxy-text-secondary hover:text-ataxy-accent-primary'}`}><i className="fa-regular fa-comments text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Chat</span></button>
                    <button onClick={() => { setCurrentTab('voice'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 active:scale-95 ${currentTab === 'voice' ? 'text-ataxy-accent-primary drop-shadow-[0_0_8px_rgba(0,255,255,0.6)]' : 'text-ataxy-text-secondary hover:text-ataxy-accent-primary'}`}><i className="fa-solid fa-headset text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Voice</span></button>
                    <button onClick={() => { setCurrentTab('ai'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 active:scale-95 ${currentTab === 'ai' ? 'text-ataxy-accent-primary drop-shadow-[0_0_8px_rgba(0,255,255,0.6)]' : 'text-ataxy-text-secondary hover:text-ataxy-accent-primary'}`}><i className="fa-solid fa-dna text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">AI</span></button>
                    <button onClick={() => { setCurrentTab('questions'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 active:scale-95 ${currentTab === 'questions' ? 'text-ataxy-accent-primary drop-shadow-[0_0_8px_rgba(0,255,255,0.6)]' : 'text-ataxy-text-secondary hover:text-ataxy-accent-primary'}`}><i className="fa-solid fa-layer-group text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Practice</span></button>
                    <button onClick={() => { setCurrentTab('profile'); handleBack(); }} className={`flex flex-col items-center gap-1 p-2 transition-colors shrink-0 active:scale-95 ${currentTab === 'profile' ? 'text-ataxy-accent-primary drop-shadow-[0_0_8px_rgba(0,255,255,0.6)]' : 'text-ataxy-text-secondary hover:text-ataxy-accent-primary'}`}><i className="fa-regular fa-user text-[22px]"></i><span className="text-[9px] font-bold uppercase tracking-wider">Me</span></button>
                  </div>
                </>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
