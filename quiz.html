<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET Quiz | Telegram Mini App</title>

  <!-- KaTeX for Math & Chemical Formulas -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>

  <!-- 1. SDK Integration & Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #111827;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
    }

    .app-shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px 32px;
      /* 1. Fix the Overlap: Ensure content clears the system notch natively */
      padding-top: calc(var(--tg-safe-area-inset-top, env(safe-area-inset-top)) + 18px);
    }

    .app-header {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 22px 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }

    .app-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .app-header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
    }

    .app-subtitle {
      margin: 12px 0 0;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .content {
      margin-top: 18px;
    }

    .quiz-panel {
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      padding: 20px;
    }

    .quiz-header {
      margin-bottom: 20px;
    }

    .quiz-header h2 {
      margin: 0 0 4px;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .quiz-meta {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .status-message {
      padding: 18px 20px;
      color: #374151;
      font-size: 0.95rem;
      border-radius: 20px;
      background: #f3f4f6;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 16px;
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s ease;
      margin-bottom: 20px;
    }

    .back-button:hover {
      background: #dbeafe;
    }

    .questions-container {
      space-y: 20px;
    }

    .question-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .question-text {
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      padding: 12px 16px;
      border-radius: 16px;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .option:hover {
      background: #eff6ff;
      border-color: #2563eb;
    }

    /* 3. High-End Micro-Interactions */
    @keyframes sweep {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .correct-sweep {
      background: linear-gradient(120deg, #dcfce7 0%, #bbf7d0 50%, #dcfce7 100%);
      background-size: 200% auto;
      animation: sweep 0.8s ease-out forwards;
      border-color: #22c55e !important;
      color: #15803d !important;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
    .incorrect-shake {
      animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      border-color: #ef4444 !important;
      background-color: #fef2f2 !important;
      color: #b91c1c !important;
    }

    /* 4. Gamified Flow: Fade-in animation */
    .fade-in-up {
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <span class="app-badge">NEET</span>
        <h1>Quiz</h1>
      </div>
      <p class="app-subtitle">Practice questions for your selected topic.</p>
      
      <!-- 4. Gamified Flow: Glowing progress bar -->
      <div class="w-full bg-gray-100 rounded-full h-1.5 mt-4 overflow-hidden relative">
        <div id="progressBar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-500 ease-out shadow-[0_0_8px_rgba(37,99,235,0.6)]" style="width: 0%"></div>
      </div>
    </header>

    <main class="content">
      <button class="back-button" onclick="goBack()">
        <span>← Back to Practice</span>
      </button>

      <section class="quiz-panel">
        <div class="quiz-header">
          <h2 id="topicTitle">Loading quiz...</h2>
          <p class="quiz-meta" id="topicMeta"></p>
        </div>

        <div id="statusMessage" class="status-message">Loading questions…</div>
        <div id="questionsContainer" class="questions-container"></div>
      </section>
    </main>
  </div>

  <script>
    const getApiBaseUrl = () => {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return 'http://localhost:5000';
      }
      return 'http://localhost:5000'; // Update with production backend URL
    };

    const statusMessage = document.getElementById('statusMessage');
    const questionsContainer = document.getElementById('questionsContainer');
    const topicTitle = document.getElementById('topicTitle');
    const topicMeta = document.getElementById('topicMeta');
    const progressBar = document.getElementById('progressBar');

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let isAnswering = false;

    // 1. Fullscreen SDK Initialization
    const initTelegramLayout = () => {
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try {
          if (typeof tg.requestFullscreen === 'function') {
            tg.requestFullscreen();
          }
        } catch (e) {
          console.warn('Native Fullscreen not supported:', e);
        }
      }
    };

    // 2. Physical Addiction: Telegram Haptics
    const triggerHaptic = (type) => {
      const tg = window.Telegram?.WebApp;
      if (!tg?.HapticFeedback) return;
      if (type === 'tap') tg.HapticFeedback.impactOccurred('medium');
      else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
    };

    const loadQuiz = async () => {
      try {
        initTelegramLayout();
        const selection = JSON.parse(localStorage.getItem('practiceSelection') || '{}');
        
        if (!selection.subject || !selection.chapter || !selection.topic) {
          statusMessage.textContent = 'No topic selected. Please go back and select a topic.';
          return;
        }

        topicTitle.textContent = selection.topic;
        topicMeta.textContent = `${selection.subject} • ${selection.chapter}`;

        // Fetch questions from backend
        const apiBase = getApiBaseUrl();
        const encodedSubject = encodeURIComponent(selection.subject);
        const encodedChapter = encodeURIComponent(selection.chapter);
        const encodedTopic = encodeURIComponent(selection.topic);
        
        const response = await fetch(
          `${apiBase}/api/neet/quiz/${encodedSubject}/${encodedChapter}/${encodedTopic}`
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();
        const data = result.data || result;

        if (!data || data.length === 0) {
          statusMessage.textContent = 'No questions found for this topic yet.';
          return;
        }

        currentQuestions = data.slice(0, 15); // limit session size
        currentQuestionIndex = 0;
        renderSingleQuestion();
        statusMessage.textContent = '';
      } catch (error) {
        console.error('Error loading quiz:', error);
        statusMessage.textContent = 'Error: ' + error.message + '. Make sure backend is running on port 5000.';
      }
    };

    const renderSingleQuestion = () => {
      questionsContainer.innerHTML = '';
      isAnswering = false;

      // Update dynamic progress bar
      const progressPercent = (currentQuestionIndex / currentQuestions.length) * 100;
      if (progressBar) progressBar.style.width = `${progressPercent}%`;

      if (currentQuestionIndex >= currentQuestions.length) {
        questionsContainer.innerHTML = '<div class="text-center py-10 font-bold text-gray-700 fade-in-up">Quiz Complete! Outstanding effort.</div>';
        return;
      }

      const q = currentQuestions[currentQuestionIndex];

      const card = document.createElement('div');
      card.className = 'question-card fade-in-up';

        const questionText = document.createElement('div');
        questionText.className = 'question-text';
      questionText.innerHTML = `Q${currentQuestionIndex + 1}. ${q.question ? q.question.replace(/\n/g, '<br/>') : 'Question'}`;
        card.appendChild(questionText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';
      
      // Determine correct index safely based on backend schema
      let correctIdx = parseInt(q.correct_answer || q.correct || 0, 10);
      if (isNaN(correctIdx) && q.correct_option) correctIdx = ['A', 'B', 'C', 'D'].indexOf(q.correct_option);
      if (isNaN(correctIdx)) correctIdx = 0;

        const options = [q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean);
        options.forEach((opt, optIdx) => {
          const btn = document.createElement('button');
        btn.className = 'option active:scale-95 transition-transform duration-200';
          btn.innerHTML = `<b>${String.fromCharCode(65 + optIdx)}.</b> ${opt.replace(/\n/g, '<br/>')}`;
        
        btn.onclick = () => {
            if (isAnswering) return;
            isAnswering = true;
            
            triggerHaptic('tap');
            
            if (optIdx === correctIdx) {
                btn.classList.add('correct-sweep');
                triggerHaptic('success');
            } else {
                btn.classList.add('incorrect-shake');
                triggerHaptic('error');
                
                // Reveal the correct option automatically
                const allBtns = optionsDiv.querySelectorAll('.option');
                if (allBtns[correctIdx]) {
                    allBtns[correctIdx].classList.add('correct-sweep', 'opacity-75');
                }
            }

            // Auto-advance with fade-in-up transition after viewing the animation
            setTimeout(() => {
                currentQuestionIndex++;
                renderSingleQuestion();
            }, 1200);
        };
        
          optionsDiv.appendChild(btn);
        });

        card.appendChild(optionsDiv);
        questionsContainer.appendChild(card);

      const applyMath = () => {
        if (window.renderMathInElement) {
          window.renderMathInElement(questionsContainer, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
          });
        } else {
          setTimeout(applyMath, 100);
        }
      };
      applyMath();
    };

    const goBack = () => {
      window.location.href = 'practice.html';
    };

    document.addEventListener('DOMContentLoaded', loadQuiz);
  </script>
</body>
</html>
