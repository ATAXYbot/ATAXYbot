<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET Quiz | Telegram Mini App</title>

  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #111827;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
    }

    .app-shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px 32px;
    }

    .app-header {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 22px 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }

    .app-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .app-header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
    }

    .app-subtitle {
      margin: 12px 0 0;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .content {
      margin-top: 18px;
    }

    .quiz-panel {
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      padding: 20px;
    }

    .quiz-header {
      margin-bottom: 20px;
    }

    .quiz-header h2 {
      margin: 0 0 4px;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .quiz-meta {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .status-message {
      padding: 18px 20px;
      color: #374151;
      font-size: 0.95rem;
      border-radius: 20px;
      background: #f3f4f6;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 16px;
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s ease;
      margin-bottom: 20px;
    }

    .back-button:hover {
      background: #dbeafe;
    }

    .questions-container {
      space-y: 20px;
    }

    .question-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .question-text {
      font-weight: 600;
      color: #111827;
      margin-bottom: 12px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      padding: 12px 16px;
      border-radius: 16px;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .option:hover {
      background: #eff6ff;
      border-color: #2563eb;
    }

    .option.selected {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <span class="app-badge">NEET</span>
        <h1>Quiz</h1>
      </div>
      <p class="app-subtitle">Practice questions for your selected topic.</p>
    </header>

    <main class="content">
      <button class="back-button" onclick="goBack()">
        <span>← Back to Practice</span>
      </button>

      <section class="quiz-panel">
        <div class="quiz-header">
          <h2 id="topicTitle">Loading quiz...</h2>
          <p class="quiz-meta" id="topicMeta"></p>
        </div>

        <div id="statusMessage" class="status-message">Loading questions…</div>
        <div id="questionsContainer" class="questions-container"></div>
      </section>
    </main>
  </div>

  <script>
    const supabaseUrl = 'https://kwzpnupjtvfrevpwfaao.supabase.co';
    const supabaseAnonKey = 'sb_publishable_BQ3FzD6jag0nHhYmUu0Bcw_Qq1CEeal';
    const tableName = 'Raceee testttingg checkinggg';

    const statusMessage = document.getElementById('statusMessage');
    const questionsContainer = document.getElementById('questionsContainer');
    const topicTitle = document.getElementById('topicTitle');
    const topicMeta = document.getElementById('topicMeta');

    const loadQuiz = async () => {
      try {
        const selection = JSON.parse(localStorage.getItem('practiceSelection') || '{}');
        
        if (!selection.subject || !selection.chapter || !selection.topic) {
          statusMessage.textContent = 'No topic selected. Please go back and select a topic.';
          return;
        }

        topicTitle.textContent = selection.topic;
        topicMeta.textContent = `${selection.subject} • ${selection.chapter}`;

        // Fetch questions for this topic
        const encodedTableName = encodeURIComponent(tableName);
        const query = `select=*&subject=eq.${encodeURIComponent(selection.subject)}&chapter=eq.${encodeURIComponent(selection.chapter)}&topic=eq.${encodeURIComponent(selection.topic)}`;
        const apiUrl = `${supabaseUrl}/rest/v1/${encodedTableName}?${query}`;

        const response = await fetch(apiUrl, {
          method: 'GET',
          headers: {
            'apikey': supabaseAnonKey,
            'Content-Type': 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data || data.length === 0) {
          statusMessage.textContent = 'No questions found for this topic yet.';
          return;
        }

        renderQuestions(data);
        statusMessage.textContent = '';
      } catch (error) {
        console.error('Error loading quiz:', error);
        statusMessage.textContent = 'Unable to load questions: ' + error.message;
      }
    };

    const renderQuestions = (questions) => {
      questionsContainer.innerHTML = '';

      questions.slice(0, 10).forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        const questionText = document.createElement('div');
        questionText.className = 'question-text';
        questionText.textContent = `Q${idx + 1}. ${q.question || 'Question'}`;
        card.appendChild(questionText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        const options = [q.option_a, q.option_b, q.option_c, q.option_d].filter(Boolean);
        options.forEach((opt, optIdx) => {
          const btn = document.createElement('button');
          btn.className = 'option';
          btn.textContent = `${String.fromCharCode(65 + optIdx)}. ${opt}`;
          optionsDiv.appendChild(btn);
        });

        card.appendChild(optionsDiv);
        questionsContainer.appendChild(card);
      });
    };

    const goBack = () => {
      window.location.href = 'practice.html';
    };

    document.addEventListener('DOMContentLoaded', loadQuiz);
  </script>
</body>
</html>
